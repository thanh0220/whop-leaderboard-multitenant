<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Check-in — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:960px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .upsell{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));
    border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px}
  .upsell b{color:var(--gold)}

  .bal{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .b{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;text-align:center}
  .b.main{border-color:var(--line2);box-shadow:0 0 22px rgba(39,227,255,.18)}
  .b .v{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1}
  .b.main .v{color:var(--cyan);text-shadow:0 0 16px rgba(39,227,255,.4)}
  .b .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}

  .sect{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--gold);margin:22px 2px 12px}

  .panel{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;position:relative}
  .panel.locked{opacity:.55;filter:saturate(.5)}
  .streak-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .streak-big{font-family:'Oswald',sans-serif;font-size:32px;color:#fff;font-weight:700}
  .streak-big span{color:var(--cyan);text-shadow:0 0 16px rgba(39,227,255,.4)}
  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:700;
    padding:11px 20px;border-radius:10px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.22);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.45;cursor:not-allowed;border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:var(--muted)}
  .btn.gold{border-color:rgba(244,196,65,.5);background:rgba(244,196,65,.12);color:var(--gold)}
  .btn.gold:hover:not(:disabled){background:rgba(244,196,65,.22);box-shadow:0 0 14px rgba(244,196,65,.3)}

  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  @media(max-width:560px){.calendar{grid-template-columns:repeat(5,1fr)}}
  .day{position:relative;aspect-ratio:1;border-radius:10px;border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px}
  .day .n{font-size:10px;color:var(--muted);letter-spacing:.05em}
  .day .r{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#fff}
  .day.done{background:rgba(39,227,255,.08);border-color:var(--line2)}
  .day.done::after{content:"✓";position:absolute;top:4px;right:6px;color:var(--cyan);font-size:11px;font-weight:700}
  .day.next{border-color:var(--gold);background:rgba(244,196,65,.1);box-shadow:0 0 12px rgba(244,196,65,.2)}
  .day.next .r{color:var(--gold)}
  .day.big .r{font-size:16px}
  .day.big{border-color:rgba(244,196,65,.3)}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:#0e1622;border:1px solid var(--line2);border-radius:12px;padding:14px 22px;color:var(--cyan);
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(39,227,255,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--muted);
    background:rgba(10,14,24,.7);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html" class="on">📅 Daily</a>
    <a href="/store.html">🎁 Store</a>
    <a href="/events.html">🗓 Events</a>
    <a href="/mailbox.html">📬 Mailbox</a>
    <a href="/milestones.html">🎯 Milestones</a>
    <a href="/spin.html">🎰 Lucky Spin</a>
    <a href="/auction.html">🔨 Auction</a>
  </div>
  <div class="top"><span class="s">♦</span> Daily <b>Check-in</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>Number(n||0).toLocaleString('en-US');
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}

/* Mọi request gửi kèm experienceId/companyId Whop truyền vào URL khi nhúng
   app trong iframe — backend dùng để biết đang phục vụ business nào. */
function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){
  return fetch(path + tenantQS(), opts);
}

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/me');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.tier==='paid'&&j.branding?.logoUrl)?'none':'block';
    render(j);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function calendarHTML(ck){
  const cal=ck.calendar||[];
  return cal.map((rw,i)=>{
    const dayNum=i+1;
    const cur=((ck.streak-1)%cal.length+cal.length)%cal.length+1;
    let cls='day';
    if(rw>=50) cls+=' big';
    if(dayNum<=ck.streak && ck.streak>0 && !ck.canClaim && dayNum<=cur) cls+=' done';
    else if(dayNum<=ck.streak && ck.streak>0 && ck.canClaim===false) cls+=' done';
    if(ck.canClaim && dayNum===ck.nextStreak%cal.length||(ck.canClaim&&dayNum===((ck.nextStreak-1)%cal.length+1))) cls+=' next';
    return `<div class="${cls}"><div class="n">Day ${dayNum}</div><div class="r">+${rw}</div></div>`;
  }).join('');
}

function render(d){
  const ck=d.checkin, se=d.season||{};
  const locked = d.tier==='free';
  const upsell = locked ? `<div class="upsell">🔒 Daily check-in is a <b>paid</b> feature. Upgrade in Whop to unlock it and start earning XU every day.</div>` : '';
  const html=`
    ${upsell}
    <div class="bal">
      <div class="b main"><div class="v">${fmt(d.available)}</div><div class="l">🪙 Available XU</div></div>
      <div class="b"><div class="v">${fmt(ck.streak)}</div><div class="l">🔥 Day streak</div></div>
      <div class="b"><div class="v">${fmt(d.bonus||0)}</div><div class="l">🎁 Bonus XU earned</div></div>
    </div>

    <div class="sect">📅 Daily check-in</div>
    <div class="panel ${locked?'locked':''}">
      <div class="streak-head">
        <div class="streak-big"><span>${ck.streak}</span>-day streak</div>
        <button class="btn gold" id="claim-ck" ${(locked||!ck.canClaim)?'disabled':''}>
          ${locked?'🔒 Upgrade to unlock':(ck.canClaim?`Claim +${ck.nextReward} XU`:'Claimed today')}
        </button>
      </div>
      <div class="calendar">${calendarHTML(ck)}</div>
      <p style="font-size:12px;color:var(--muted);margin-top:12px;text-align:center">
        Breaking the streak resets you to day 1. Milestone days have bigger rewards 🎉
      </p>
    </div>

    <div class="sect">🏆 Season ${se.label||''}</div>
    <div class="panel">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase">Time left</div>
        <div id="cd" style="font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 16px rgba(244,196,65,.35)">--</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${(se.topRewards||[]).map(t=>`
          <div style="display:flex;justify-content:space-between;gap:10px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;font-size:13px">
            <b style="color:var(--gold)">${t.rank}</b><span style="color:var(--muted);text-align:right">${t.prize}</span>
          </div>`).join('')}
      </div>
    </div>`;
  $('content').innerHTML=html;

  if(!locked){
    $('claim-ck').onclick=async ()=>{
      $('claim-ck').disabled=true;
      try{
        const r=await tenantFetch('/.netlify/functions/checkin',{method:'POST'});
        const j=await r.json();
        if(!r.ok) throw new Error(j.error||'Error');
        toast(j.message||`+${j.reward} XU`);
        setTimeout(load,400);
      }catch(e){toast('⚠ '+e.message);$('claim-ck').disabled=false;}
    };
  }

  // countdown
  if(se.endsAt){
    const end=new Date(se.endsAt).getTime();
    const tick=()=>{
      const ms=Math.max(0,end-Date.now());
      const s=Math.floor(ms/1000);
      const d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sec=s%60;
      const cd=$('cd'); if(cd) cd.textContent=`${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };
    tick(); setInterval(tick,1000);
  }
}

load();
</script>
</body>
</html>
