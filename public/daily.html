<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Check-in — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3);
    --ctrl-bg:rgba(255,255,255,.03);--ctrl-border:rgba(255,255,255,.12);
    --card1:#16202f;--card2:#0a0f18;--card-border:rgba(255,255,255,.08);
    --card-text:#eef2f8;--card-muted:#8a93a6;--chip-bg:rgba(0,0,0,.25);
    --modal-bg:#0e1622;--modal-border:rgba(255,255,255,.12)}
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f7;--muted:#5d6478;--text:#161c2c;--red:#e0123a;--cyan:#0098bb;--gold:#c9860a;
      --line2:rgba(0,152,187,.32);--ctrl-bg:rgba(22,28,44,.04);--ctrl-border:rgba(22,28,44,.14);
      --card1:#ffffff;--card2:#eef2f9;--card-border:rgba(22,28,44,.09);
      --card-text:#161c2c;--card-muted:#5d6478;--chip-bg:#e4e9f2;
      --modal-bg:#ffffff;--modal-border:rgba(22,28,44,.12)}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:960px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{position:relative;font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid var(--ctrl-border);
    background:var(--ctrl-bg);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .nav-badge{position:absolute;top:-5px;right:-5px;background:#e53935;color:#fff;border-radius:999px;font-size:9px;font-family:'Oswald',sans-serif;font-weight:700;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none;line-height:1}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .upsell{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));
    border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px}
  .upsell b{color:var(--gold)}

  .bal{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .b{background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:14px;padding:14px;text-align:center;color:var(--card-text)}
  .b.main{border-color:var(--line2);box-shadow:0 0 22px rgba(39,227,255,.18)}
  .b .v{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--card-text);line-height:1}
  .b.main .v{color:var(--cyan);text-shadow:0 0 16px rgba(39,227,255,.4)}
  .b .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--card-muted);margin-top:6px}

  .sect{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--gold);margin:22px 2px 12px}

  .panel{background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:16px;padding:18px;position:relative;color:var(--card-text)}
  .panel.locked{opacity:.55;filter:saturate(.5)}
  .streak-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .streak-big{font-family:'Oswald',sans-serif;font-size:32px;color:var(--card-text);font-weight:700}
  .streak-big span{color:var(--cyan);text-shadow:0 0 16px rgba(39,227,255,.4)}
  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:700;
    padding:11px 20px;border-radius:10px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.22);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.45;cursor:not-allowed;border-color:var(--card-border);background:var(--chip-bg);color:var(--card-muted)}
  .btn.gold{border-color:rgba(244,196,65,.5);background:rgba(244,196,65,.12);color:var(--gold)}
  .btn.gold:hover:not(:disabled){background:rgba(244,196,65,.22);box-shadow:0 0 14px rgba(244,196,65,.3)}

  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  @media(max-width:560px){.calendar{grid-template-columns:repeat(5,1fr)}}
  .day{position:relative;aspect-ratio:1;border-radius:10px;border:1px solid var(--card-border);
    background:var(--chip-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px}
  .day .n{font-size:10px;color:var(--card-muted);letter-spacing:.05em}
  .day .r{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:var(--card-text)}
  .day.done{background:rgba(39,227,255,.08);border-color:var(--line2)}
  .day.done::after{content:"✓";position:absolute;top:4px;right:6px;color:var(--cyan);font-size:11px;font-weight:700}
  .day.next{border-color:var(--gold);background:rgba(244,196,65,.1);box-shadow:0 0 12px rgba(244,196,65,.2)}
  .day.next .r{color:var(--gold)}
  .day.big .r{font-size:16px}
  .day.big{border-color:rgba(244,196,65,.3)}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:var(--modal-bg);border:1px solid var(--line2);border-radius:12px;padding:14px 22px;color:var(--cyan);
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(39,227,255,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--card-muted);
    background:var(--chip-bg);border:1px solid var(--card-border);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}

  @media (prefers-color-scheme: light){
    body{background:radial-gradient(120% 70% at 50% -10%,rgba(224,18,58,.10),#f4f1fb 45%,#eef1f7 100%);background-attachment:fixed}
    .b{box-shadow:0 4px 14px rgba(22,28,44,.07)}
    .panel{box-shadow:0 4px 14px rgba(22,28,44,.07)}
    .day{box-shadow:0 2px 8px rgba(22,28,44,.05)}
    .err{color:#9a2030}
  }
  /* Milestone day cells (day 5,10,15…) */
  .day.milestone{background:linear-gradient(150deg,#0e0028 0%,#1e0050 50%,#0a0018 100%)!important;border-color:#7c3aed!important;box-shadow:0 0 12px #7c3aed66,inset 0 0 14px #ffffff05;overflow:hidden}
  .day.milestone .n{color:#c4b5fd}
  .day.milestone .r{background:linear-gradient(170deg,#e8d5ff 0%,#a855f7 50%,#6d28d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px #a855f7);font-size:20px!important;animation:ms-glow 2.2s ease-in-out infinite alternate}
  .day.milestone::before{content:'';position:absolute;top:-100%;left:-70%;width:40%;height:300%;background:linear-gradient(90deg,transparent,#ffffff10,transparent);transform:skewX(-15deg);animation:ms-shimmer 4s ease-in-out infinite;pointer-events:none}
  .day.milestone.done .r{-webkit-text-fill-color:var(--cyan);background:none;filter:none;font-size:18px!important;animation:none}
  @keyframes ms-glow{from{filter:drop-shadow(0 0 5px #a855f7)}to{filter:drop-shadow(0 0 20px #c084fc) drop-shadow(0 0 35px #7c3aed)}}
  @keyframes ms-shimmer{0%{left:-70%}100%{left:130%}}
  .day.day30{background:linear-gradient(150deg,#1a1000 0%,#3a2800 50%,#1a1000 100%)!important;border-color:var(--gold)!important;box-shadow:0 0 16px rgba(244,196,65,.5),inset 0 0 14px rgba(255,255,255,.03)!important;overflow:hidden}
  .day.day30 .n{color:#fcd34d}
  .day.day30 .r{background:linear-gradient(170deg,#fff8e0,#f4c441,#c8860a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px #f4c441);font-size:20px!important;animation:d30-glow 2s ease-in-out infinite alternate}
  .day.day30::before{content:'';position:absolute;top:-100%;left:-70%;width:40%;height:300%;background:linear-gradient(90deg,transparent,rgba(244,196,65,.15),transparent);transform:skewX(-15deg);animation:ms-shimmer 3s ease-in-out infinite;pointer-events:none}
  .day.day30.done .r{-webkit-text-fill-color:var(--cyan);background:none;filter:none;font-size:18px!important;animation:none}
  @keyframes d30-glow{from{filter:drop-shadow(0 0 6px #f4c441)}to{filter:drop-shadow(0 0 22px #fcd34d) drop-shadow(0 0 40px #e88c10)}}

  /* ── Milestone Bonus Modal ── */
  .mb-overlay{position:fixed;inset:0;z-index:980;display:flex;align-items:flex-start;justify-content:center;background:rgba(4,0,16,.95);backdrop-filter:blur(14px);padding:8px 4px;overflow-y:auto;cursor:pointer}
  .mb-modal{background:linear-gradient(150deg,#0a0a18,#12101e);border:1px solid rgba(124,58,237,.4);border-radius:20px;max-width:520px;width:100%;margin:auto;overflow:hidden;cursor:default;animation:pop-in .35s cubic-bezier(.34,1.56,.64,1)}
  .mb-modal.mb-wide{max-width:min(1360px,98vw);width:98vw}
  .mb-video-title{font-family:'Oswald',sans-serif;font-size:clamp(16px,2.8vw,32px);font-weight:700;color:#fff;text-align:center;padding:4px 24px 18px;letter-spacing:.05em;text-wrap:balance}
  .mb-video-wrap{position:relative;padding-top:56.25%;background:#000}
  .mb-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
  .mb-body{padding:24px}
  .mb-close-row{display:flex;justify-content:flex-end;padding:14px 14px 0}
  .mb-close-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.6);font-size:15px;line-height:1;transition:.15s;flex-shrink:0}
  .mb-close-btn:hover{background:rgba(255,255,255,.18);color:#fff}
  .mb-offer{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(39,227,255,.04));border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:18px 18px 18px 22px;margin-bottom:12px;position:relative;overflow:hidden}
  .mb-offer::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#7c3aed,#27e3ff);border-radius:3px 0 0 3px}
  .mb-badge{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.14em;font-weight:700;color:#a78bfa;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.35);border-radius:4px;padding:2px 8px;display:inline-block;margin-bottom:8px;text-transform:uppercase}
  .mb-offer-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--card-text);letter-spacing:.04em;margin-bottom:4px}
  .mb-offer-price{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--gold);margin-bottom:6px;text-shadow:0 0 16px rgba(244,196,65,.3)}
  .mb-offer-desc{font-size:13px;color:var(--card-muted);line-height:1.55}
  .mb-cta{display:block;width:100%;text-align:center;font-family:'Oswald',sans-serif;letter-spacing:.1em;font-size:15px;font-weight:700;padding:16px;border-radius:12px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;cursor:pointer;text-decoration:none;transition:.2s;box-shadow:0 4px 20px rgba(34,197,94,.3)}
  .mb-cta:hover{background:linear-gradient(135deg,#4ade80,#22c55e);box-shadow:0 0 28px rgba(34,197,94,.5);transform:translateY(-2px)}
  .day.milestone.done.has-bonus::after,.day.day30.done.has-bonus::after{content:"★";position:absolute;top:4px;right:6px;color:#a78bfa;font-size:9px}
  /* Expand button below video */
  .mb-expand-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(124,58,237,.12);border:none;border-top:1px solid rgba(124,58,237,.2);color:#c4b5fd;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;padding:13px 16px;cursor:pointer;transition:.2s;text-transform:uppercase}
  .mb-expand-btn:hover{background:rgba(124,58,237,.24);color:#ddd6fe}
  .mb-expand-icon{display:inline-block;font-size:10px;transition:transform .3s ease}
  .mb-expandable{overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
  /* Countdown timer */
  .mb-countdown{display:flex;align-items:center;gap:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:rgba(255,100,100,.9)}
  .mb-cd-time{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:#ef4444;letter-spacing:.08em;min-width:60px;text-align:right;margin-left:auto}
  /* Coupon code */
  .mb-coupon{background:linear-gradient(135deg,rgba(244,196,65,.08),rgba(244,196,65,.03));border:1px dashed rgba(244,196,65,.4);border-radius:12px;padding:16px;text-align:center;margin-top:12px}
  .mb-coupon-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.12em;color:rgba(244,196,65,.6);margin-bottom:8px;font-weight:700}
  .mb-coupon-code{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:.18em;background:rgba(0,0,0,.3);border:1px solid rgba(244,196,65,.25);border-radius:8px;padding:10px 16px;cursor:pointer;user-select:all;transition:.15s;margin-bottom:6px;display:inline-block;width:100%}
  .mb-coupon-code:hover{background:rgba(244,196,65,.1)}
  .mb-coupon-hint{font-size:11px;color:rgba(255,255,255,.28)}

  /* ── Daily Card Popup ── */
  .dc-overlay{position:fixed;inset:0;z-index:950;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(4,0,16,.93);backdrop-filter:blur(12px);padding:20px}
  .dc-label{color:var(--gold);font-size:11px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:28px;font-family:'Oswald',sans-serif;font-weight:700;text-align:center}
  .dc-cards{display:flex;gap:18px;align-items:center;justify-content:center;perspective:1100px}
  .dc-card-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer}
  .dc-card-wrap.dc-locked{cursor:default;pointer-events:none}
  .dc-float{transform-style:preserve-3d;animation:dc-bob 4.5s ease-in-out infinite alternate}
  .dc-float.stop{animation:none!important;transform:none!important;transition:transform .4s ease}
  .dc-card-wrap:hover:not(.dc-locked) .dc-float:not(.stop){transform:translateY(-14px) rotateY(-7deg) scale(1.05)!important;animation-play-state:paused}
  .dc-card-wrap.dc-missed .dc-float{filter:saturate(.12) brightness(.35)}
  .dc-card-inner{width:140px;height:210px;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.34,1.1,.64,1);position:relative}
  .dc-card-inner.dc-flipped{transform:rotateY(180deg)}
  .dc-single .dc-float{animation-duration:5.5s}
  .dc-single .dc-card-inner{width:200px;height:290px}
  .dc-face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px;overflow:hidden}
  .dc-back{background:linear-gradient(150deg,#0e0028 0%,#1e0050 50%,#0a0018 100%);border:1.5px solid #7c3aed;box-shadow:0 0 24px #7c3aed88,0 0 60px #4c008055,inset 0 0 36px #ffffff05}
  .dc-front{transform:rotateY(180deg);background:linear-gradient(150deg,#1a1000 0%,#3a2800 50%,#1a1000 100%);border:1.5px solid rgba(244,196,65,.65);box-shadow:0 0 24px rgba(244,196,65,.4),inset 0 0 24px rgba(244,196,65,.06)}
  .dc-card-wrap.dc-chosen .dc-front{border-color:var(--gold)!important;box-shadow:0 0 40px rgba(244,196,65,.7),inset 0 0 24px rgba(244,196,65,.1)!important}
  .dc-shimmer{position:absolute;top:-100%;left:-70%;width:40%;height:300%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:skewX(-15deg);animation:dc-shimmer 3.5s ease-in-out infinite;pointer-events:none}
  @keyframes dc-shimmer{0%{left:-70%}100%{left:130%}}
  .dc-rune{position:absolute;font-size:12px;opacity:.3;color:#a78bfa;animation:dc-blink 3s ease-in-out infinite alternate;line-height:1}
  .dc-rune.tl{top:10px;left:10px}.dc-rune.tr{top:10px;right:10px}.dc-rune.bl{bottom:10px;left:10px}.dc-rune.br{bottom:10px;right:10px}
  @keyframes dc-blink{0%{opacity:.1}60%{opacity:.45}100%{opacity:.1}}
  .dc-q{font-family:'Oswald',sans-serif;font-size:72px;font-weight:700;background:linear-gradient(170deg,#e8d5ff 0%,#a855f7 50%,#6d28d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 14px #a855f7);animation:dc-qpulse 2.5s ease-in-out infinite alternate;line-height:1;user-select:none}
  .dc-single .dc-q{font-size:96px}
  @keyframes dc-qpulse{from{filter:drop-shadow(0 0 8px #a855f7)}to{filter:drop-shadow(0 0 32px #c084fc) drop-shadow(0 0 64px #7c3aed)}}
  .dc-day-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.12em;font-family:'Oswald',sans-serif;text-transform:uppercase}
  .dc-xu{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(244,196,65,.6);line-height:1}
  .dc-single .dc-xu{font-size:48px}
  .dc-xu-unit{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;color:rgba(244,196,65,.55);text-transform:uppercase;margin-top:-4px}
  .dc-tag-row{display:flex;gap:18px;justify-content:center;margin-top:14px;min-height:18px}
  .dc-tag{width:140px;text-align:center;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:0;transition:opacity .35s}
  .dc-tag.show{opacity:1}
  .dc-tag.dc-chosen{color:var(--gold)}
  .dc-tag.dc-missed{color:rgba(255,255,255,.3)}
  .dc-hint{color:#ffffff30;font-size:12px;letter-spacing:1px;margin-top:22px;animation:c3d-hint-blink 2s ease-in-out infinite;transition:opacity .35s}
  .dc-hint.hidden{opacity:0!important;pointer-events:none}
  .dc-collect{font-family:'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:14px;font-weight:700;padding:12px 36px;border-radius:10px;border:2px solid var(--gold);background:rgba(244,196,65,.12);color:var(--gold);cursor:pointer;transition:.15s;margin-top:22px;display:none}
  .dc-collect.show{display:inline-block}
  .dc-collect:hover{background:rgba(244,196,65,.28);box-shadow:0 0 20px rgba(244,196,65,.4)}
  @keyframes dc-bob{0%{transform:translateY(0) rotateY(-12deg) rotateX(5deg)}100%{transform:translateY(-14px) rotateY(12deg) rotateX(-5deg)}}
  @keyframes c3d-hint-blink{0%,100%{opacity:.25}50%{opacity:.75}}
  .c3d-burst{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:999;animation:c3d-burst-fly var(--dur,.7s) ease-out forwards}
  @keyframes c3d-burst-fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:var(--tx) scale(0)}}
  .chest-popup{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)}

  const offerDelay=bonus.offerDelay??300;

  const bodyInner=countdownBar+priceHtml+offersHtml+ctaHtml+couponHtml;

    mbStartCd(ov,offerCd);
  }

function spawnC3DBurst(scene){
  const rect=scene.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const cols=['#4ade80','#86efac','#a855f7','#c084fc','#fcd34d','#ffffff'];
  for(let i=0;i<28;i++){
    const dot=document.createElement('div');
    dot.className='c3d-burst';
    const ang=Math.random()*360,dist=70+Math.random()*110;
    const tx=`translate(${Math.cos(ang*Math.PI/180)*dist}px,${Math.sin(ang*Math.PI/180)*dist}px)`;
    const dur=(.5+Math.random()*.5)+'s';
    dot.style.cssText=`left:${cx}px;top:${cy}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${tx};--dur:${dur};animation-delay:${Math.random()*.12}s`;
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),1100);
  }
}


/* Mọi request gửi kèm experienceId/companyId Whop truyền vào URL khi nhúng
   app trong iframe — backend dùng để biết đang phục vụ business nào. */
function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  if (exp) sessionStorage.setItem('whop_exp', exp); else exp = sessionStorage.getItem('whop_exp') || '';
  if (co)  sessionStorage.setItem('whop_co',  co);  else co  = sessionStorage.getItem('whop_co')  || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){
  return fetch(path + tenantQS(), opts);
}
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,

      '/daily.html': j.dailyEnabled, '/store.html': j.storeEnabled, '/mailbox.html': j.mailboxEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) { a.remove(); return; }
      const badge = href === '/daily.html' && j.dailyPending ? 1
                  : href === '/mailbox.html' && j.mailboxCount > 0 ? j.mailboxCount : 0;
      if (badge) { const b = document.createElement('span'); b.className = 'nav-badge'; b.textContent = badge > 99 ? '99+' : String(badge); a.appendChild(b); }
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;

function calendarHTML(ck, milestoneBonus, milestoneDays){
  const cal=ck.calendar||[];
  const bonus=milestoneBonus||[];
  const msSet=new Set(milestoneDays??[5,10,15,20,25,30]);
  return cal.map((rw,i)=>{
    const dayNum=i+1;
    const cur=((ck.streak-1)%cal.length+cal.length)%cal.length+1;
    let cls='day';
    const isDone=(dayNum<=ck.streak && ck.streak>0 && !ck.canClaim && dayNum<=cur)||(dayNum<=ck.streak && ck.streak>0 && ck.canClaim===false);
    if(rw>=50) cls+=' big';
    if(isDone) cls+=' done';
    if(ck.canClaim && dayNum===ck.nextStreak%cal.length||(ck.canClaim&&dayNum===((ck.nextStreak-1)%cal.length+1))) cls+=' next';
    const isDay30Gold = dayNum === 30 && msSet.has(30);
    const isMilestone = msSet.has(dayNum) && !isDay30Gold;
    if(isDay30Gold) cls+=' day30';
    else if(isMilestone) cls+=' milestone';
    const rContent = isDay30Gold && !isDone ? '🏅' : isMilestone && !isDone ? '?' : '+'+rw;
    const b=bonus[i];
    const hasBonus=isDone&&b&&b.type&&b.type!=='none';
    if(hasBonus) cls+=' has-bonus';
    return '<div class="'+cls+'"><div class="n">Day '+dayNum+'</div><div class="r">'+rContent+'</div></div>';
  }).join('');
}

      <div class="b main"><div class="v">${fmt(d.available)}</div><div class="l">🪙 Available XU</div></div>
      <div class="b"><div class="v">${fmt(ck.streak)}</div><div class="l">🔥 Day streak</div></div>
      <div class="b"><div class="v">${fmt(d.bonus||0)}</div><div class="l">🎁 Bonus XU earned</div></div>
    </div>

    <div class="sect">📅 Daily check-in</div>
    <div class="panel">
      <div class="streak-head">
        <div class="streak-big"><span>${ck.streak}</span>-day streak</div>
        <button class="btn gold" id="claim-ck" ${!ck.canClaim?'disabled':''}>
          ${ck.canClaim?`Claim +${ck.nextReward} XU`:'Claimed today'}
        </button>
      </div>
      <div class="calendar">${calendarHTML(ck,window.__MB,window.__MSD)}</div>
      <div style="background:rgba(245,158,11,.08);border-left:3px solid #f59e0b;border-radius:6px;padding:8px 12px;font-size:12px;color:#fcd34d;margin-top:12px">
        ⚠️ Missing a day resets your streak to Day 1. Milestone days have bigger rewards 🎉
      </div>
      ${shieldHtml}
    </div>

    <div class="sect">🏆 Season Prizes ${se.label||''}</div>
    <div class="panel">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--card-muted);letter-spacing:.15em;text-transform:uppercase">Time left</div>
        <div id="cd" style="font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 16px rgba(244,196,65,.35)">--</div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">👑 VIP Members</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
        ${(se.topRewards||[]).map(t=>`
          <div style="display:flex;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--chip-bg);border-radius:10px;font-size:13px">
            <b style="color:var(--gold)">${t.rank}</b><span style="color:var(--card-muted);text-align:right">${t.prize}</span>
          </div>`).join('')}
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px">🤝 Referrals</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${((d.seasonRef||{}).topRewards||[]).map(t=>`
          <div style="display:flex;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--chip-bg);border-radius:10px;font-size:13px">
            <b style="color:var(--cyan)">${t.rank}</b><span style="color:var(--card-muted);text-align:right">${t.prize}</span>
          </div>`).join('')}
      </div>
    </div>`;
  $('content').innerHTML=html;

  $('claim-ck').onclick=async ()=>{
    $('claim-ck').disabled=true;
    try{
      const r=await tenantFetch('/.netlify/functions/checkin',{method:'POST'});
      let j=null;
      try{ j=await r.json(); }catch(_){ j=null; }
      if(!r.ok) throw new Error((j&&j.error)||'Could not check in, please try again.');
      toast(j&&j.reward?`🎉 +${j.reward} XU received!`:'🎉 Checked in successfully!');
      showDailyCardPopup(j&&j.streak||1, j&&j.reward||0, j&&j.day30offer||null, window.__MSD);
      // Auto-show milestone bonus modal on milestone days
      const newStreak=j&&j.streak||0;
      const _msSet=new Set(window.__MSD??[5,10,15,20,25,30]);
      const _dayInCycle=((newStreak-1)%30+30)%30+1;
      if(newStreak>0&&_msSet.has(_dayInCycle)){
        const bonus=window.__MB&&window.__MB[newStreak-1];
        if(bonus&&bonus.type&&bonus.type!=='none') setTimeout(()=>showMilestoneBonusModal(bonus),900);
      }
      setTimeout(load,400);
    }catch(e){
      const friendly = /unexpected token|json|fetch|network/i.test(e.message||'')
        ? 'Could not check in, please try again.' : e.message;
      toast('⚠ '+friendly);
      $('claim-ck').disabled=false;
    }
  };

  const shieldBtn=$('shield-btn');
  if(shieldBtn){
    shieldBtn.onclick=async ()=>{
      shieldBtn.disabled=true;
      shieldBtn.textContent='Activating...';
      try{
        const r=await tenantFetch('/.netlify/functions/streak-shield',{method:'POST'});
        let j=null;
        try{ j=await r.json(); }catch(_){ j=null; }
        if(!r.ok) throw new Error((j&&j.error)||'Could not activate shield.');
        toast('🛡️ Streak Shield activated! Your streak is protected.');
        setTimeout(load,400);
      }catch(e){
        toast('⚠ '+e.message);
        shieldBtn.disabled=false;
        shieldBtn.textContent='🛡️ Activate 30-Day Streak Shield — 20 XU';
      }
    };
  }


  // countdown
  if(se.endsAt){
    const end=new Date(se.endsAt).getTime();
    const tick=()=>{
      const ms=Math.max(0,end-Date.now());
      const s=Math.floor(ms/1000);
      const d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sec=s%60;
      const cd=$('cd'); if(cd) cd.textContent=`${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };
    tick(); setInterval(tick,1000);
  }
}

load();
</script>
</body>
</html>
