<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mailbox — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--silver:#cbd5e1;--bronze:#e1955a;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:680px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .chest{display:flex;align-items:center;gap:14px;background:linear-gradient(160deg,#16202f,#0a0f18);
    border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
  .chest.wood{border-color:rgba(225,149,90,.45)}
  .chest.silver{border-color:rgba(203,213,225,.45)}
  .chest.gold{border-color:rgba(244,196,65,.5);box-shadow:0 0 18px rgba(244,196,65,.12)}
  .chest.buyer{border-color:rgba(178,102,255,.55);box-shadow:0 0 20px rgba(178,102,255,.18);
    background:linear-gradient(160deg,#1c1430,#0a0f18)}
  .chest .icon{font-size:30px;flex-shrink:0}
  .chest .info{flex:1;min-width:0}
  .chest .label{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px}
  .chest.wood .label{color:var(--bronze)} .chest.silver .label{color:var(--silver)} .chest.gold .label{color:var(--gold)}
  .chest.buyer .label{color:#d5b8ff}

  .chest3d{position:relative;width:52px;height:52px;flex-shrink:0;perspective:160px}
  .chest3d .chest-visual{position:relative;display:block;width:100%;height:100%;line-height:52px;text-align:center;font-size:30px;
    transform-style:preserve-3d;transform-origin:50% 80%;transition:transform .15s}
  .chest3d canvas.chest-visual{line-height:normal;font-size:0}
  .chest3d::before{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;
    transform:translate(-50%,-50%) scale(0);opacity:0;pointer-events:none;
    background:radial-gradient(circle,rgba(244,196,65,.95),rgba(244,196,65,0) 70%);z-index:2}
  .chest.gold .chest3d::before{background:radial-gradient(circle,rgba(244,196,65,.95),rgba(244,196,65,0) 70%)}
  .chest.silver .chest3d::before{background:radial-gradient(circle,rgba(203,213,225,.95),rgba(203,213,225,0) 70%)}
  .chest.wood .chest3d::before{background:radial-gradient(circle,rgba(225,149,90,.95),rgba(225,149,90,0) 70%)}
  .chest.buyer .chest3d::before{background:radial-gradient(circle,rgba(178,102,255,.95),rgba(178,102,255,0) 70%)}
  .chest3d.opening::before{animation:burst .7s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}60%{transform:translate(-50%,-50%) scale(7);opacity:.5}100%{transform:translate(-50%,-50%) scale(9);opacity:0}}
  .chest3d.opening .chest-visual{animation:chestShake .7s cubic-bezier(.2,.8,.2,1)}
  @keyframes chestShake{
    0%{transform:rotate(0) translateY(0)}
    15%{transform:rotate(-8deg) translateY(0)}
    30%{transform:rotate(7deg) translateY(0)}
    45%{transform:rotate(-5deg) translateY(-2px)}
    60%{transform:rotateX(-55deg) translateY(-3px) scale(1.15)}
    80%{transform:rotateX(-25deg) translateY(-1px) scale(1.1)}
    100%{transform:rotateX(0) translateY(0) scale(1)}
  }
  .spark{position:absolute;left:50%;top:50%;font-size:11px;opacity:0;pointer-events:none;z-index:2}
  .chest3d.opening .spark{animation:sparkFly .8s cubic-bezier(.15,.7,.3,1) forwards}
  @keyframes sparkFly{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
    15%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--sx,0px)),calc(-50% + var(--sy,-34px))) scale(1) rotate(var(--sr,30deg))}
  }
  .chest .desc{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chest .desc b{color:var(--text)}
  .chest .exp{font-size:10.5px;color:var(--muted);margin-top:4px;font-family:'Oswald',sans-serif;letter-spacing:.04em}
  .chest .claimed-tag{font-size:11px;color:#86efac;font-family:'Oswald',sans-serif;letter-spacing:.06em}
  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:700;
    padding:10px 18px;border-radius:10px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s;flex-shrink:0}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.22);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .pop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,9,16,.85);
    font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold);opacity:0;pointer-events:none;transition:.25s}
  .pop.show{opacity:1;transform:scale(1.05)}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:#0e1622;border:1px solid var(--line2);border-radius:12px;padding:14px 22px;color:var(--cyan);
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(39,227,255,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--muted);
    background:rgba(10,14,24,.7);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/store.html">🎁 Store</a>
    <a href="/events.html">🗓 Events</a>
    <a href="/mailbox.html" class="on">📬 Mailbox</a>
    <a href="/milestones.html">🎯 Milestones</a>
    <a href="/spin.html">🎰 Lucky Spin</a>
    <a href="/auction.html">🔨 Auction</a>
  </div>
  <div class="top"><span class="s">♦</span> <b>Mailbox</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/chest3d.module.js"></script>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}

function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/mailbox');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.isPaid&&j.branding?.logoUrl)?'none':'block';
    render(j.entries||[]);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function fmtCountdown(expiresAt){
  const ms = new Date(expiresAt).getTime() - Date.now();
  if (ms <= 0) return 'Expired';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return `Expires in ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const chestRegistry = {};

function render(entries){
  Object.values(chestRegistry).forEach(c => { try{ c.dispose(); }catch(_){} });
  for (const k in chestRegistry) delete chestRegistry[k];

  if (!entries.length){
    $('content').innerHTML = '<div class="empty">📭 Your mailbox is empty. When a member makes a purchase on Whop, the whole channel will get a chest here!</div>';
    return;
  }
  const sparkAngles = [[-26,-10,-22],[24,-8,18],[-10,-34,-14],[12,-30,26],[-34,-22,-30],[30,-20,32]];
  $('content').innerHTML = entries.map(e => `
    <div class="chest ${e.tier}" id="chest-${esc(e.id)}">
      <div class="chest3d">
        ${e.claimed
          ? `<div class="chest-visual">🪙</div>`
          : `<canvas class="chest-visual" id="cv-${esc(e.id)}" width="52" height="52"></canvas>`}
        ${sparkAngles.map(([sx,sy,sr])=>`<span class="spark" style="--sx:${sx}px;--sy:${sy}px;--sr:${sr}deg">🪙</span>`).join('')}
      </div>
      <div class="info">
        <div class="label">${esc(e.label)}</div>
        <div class="desc"><b>${esc(e.buyerName)}</b> made a purchase on Whop</div>
        ${e.claimed ? '<div class="claimed-tag">✅ Claimed +'+e.xu+' XU</div>' : `<div class="exp" data-exp="${esc(e.expiresAt)}">${fmtCountdown(e.expiresAt)}</div>`}
      </div>
      ${e.claimed ? '' : `<button class="btn" onclick="claim('${esc(e.id)}',this)">Claim</button>`}
      <div class="pop" id="pop-${esc(e.id)}"></div>
    </div>`).join('');

  entries.forEach(e => {
    if (e.claimed) return;
    const canvas = $('cv-' + e.id);
    if (canvas && window.ChestVoxel) {
      chestRegistry[e.id] = window.ChestVoxel.create(canvas, e.tier);
    }
  });

  setInterval(()=>{
    document.querySelectorAll('.exp[data-exp]').forEach(el=>{ el.textContent = fmtCountdown(el.dataset.exp); });
  }, 1000);
}

async function claim(id, btn){
  btn.disabled = true;
  const chestEl = document.getElementById('chest-'+id);
  const chest3d = chestEl ? chestEl.querySelector('.chest3d') : null;
  if (chest3d) chest3d.classList.add('opening');
  chestRegistry[id]?.open();
  const animDone = new Promise(res => setTimeout(res, 650));
  try{
    const reqPromise = tenantFetch('/.netlify/functions/mailbox', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({entryId:id})});
    const [r] = await Promise.all([reqPromise, animDone]);
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error');
    const pop = $('pop-'+id);
    pop.textContent = `+${j.xu} XU`;
    pop.classList.add('show');
    toast(j.message);
    setTimeout(load, 1200);
  }catch(e){
    if (chest3d) chest3d.classList.remove('opening');
    toast('⚠ '+e.message);
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
