<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--silver:#cbd5e1;--bronze:#e1955a;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3);
    --ctrl-bg:rgba(255,255,255,.03);--ctrl-border:rgba(255,255,255,.12);
    --card1:#16202f;--card2:#0a0f18;--card-border:rgba(255,255,255,.08);
    --card-text:#eef2f8;--card-muted:#8a93a6;--chip-bg:rgba(0,0,0,.25);
    --modal-bg:#0e1622;--modal-border:rgba(255,255,255,.12)}
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f7;--muted:#5d6478;--text:#161c2c;--red:#e0123a;--cyan:#0098bb;--gold:#c9860a;
      --silver:#5d6b80;--bronze:#a85a1f;
      --line2:rgba(0,152,187,.32);--ctrl-bg:rgba(22,28,44,.04);--ctrl-border:rgba(22,28,44,.14);
      --card1:#ffffff;--card2:#eef2f9;--card-border:rgba(22,28,44,.09);
      --card-text:#161c2c;--card-muted:#5d6478;--chip-bg:#e4e9f2;
      --modal-bg:#ffffff;--modal-border:rgba(22,28,44,.12)}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:680px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid var(--ctrl-border);
    background:var(--ctrl-bg);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .chest{display:flex;align-items:center;gap:14px;background:linear-gradient(160deg,var(--card1),var(--card2));color:var(--card-text);
    border:1px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
  .chest.wood{border-color:rgba(225,149,90,.45)}
  .chest.silver{border-color:rgba(203,213,225,.45)}
  .chest.gold{border-color:rgba(244,196,65,.5);box-shadow:0 0 18px rgba(244,196,65,.12)}
  .chest.buyer{border-color:rgba(178,102,255,.55);box-shadow:0 0 20px rgba(178,102,255,.18);
    background:linear-gradient(160deg,#1c1430,#0a0f18)}
  .chest .icon{font-size:30px;flex-shrink:0}
  .chest .info{flex:1;min-width:0}
  .chest .label{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px}
  .chest.wood .label{color:var(--bronze)} .chest.silver .label{color:var(--silver)} .chest.gold .label{color:var(--gold)}
  .chest.buyer .label{color:#d5b8ff}

  .chest3d{position:relative;width:52px;height:52px;flex-shrink:0;perspective:160px}
  .chest3d .chest-visual{position:relative;display:block;width:100%;height:100%;line-height:52px;text-align:center;font-size:30px;
    transform-style:preserve-3d;transform-origin:50% 80%;transition:transform .15s}
  .chest3d canvas.chest-visual{line-height:normal;font-size:0}
  .chest3d::before{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;
    transform:translate(-50%,-50%) scale(0);opacity:0;pointer-events:none;
    background:radial-gradient(circle,rgba(244,196,65,.95),rgba(244,196,65,0) 70%);z-index:2}
  .chest.gold .chest3d::before{background:radial-gradient(circle,rgba(244,196,65,.95),rgba(244,196,65,0) 70%)}
  .chest.silver .chest3d::before{background:radial-gradient(circle,rgba(203,213,225,.95),rgba(203,213,225,0) 70%)}
  .chest.wood .chest3d::before{background:radial-gradient(circle,rgba(225,149,90,.95),rgba(225,149,90,0) 70%)}
  .chest.buyer .chest3d::before{background:radial-gradient(circle,rgba(178,102,255,.95),rgba(178,102,255,0) 70%)}
  .chest3d.opening::before{animation:burst .7s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes burst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}60%{transform:translate(-50%,-50%) scale(7);opacity:.5}100%{transform:translate(-50%,-50%) scale(9);opacity:0}}
  .chest3d.opening .chest-visual{animation:chestShake .7s cubic-bezier(.2,.8,.2,1)}
  @keyframes chestShake{
    0%{transform:rotate(0) translateY(0)}
    15%{transform:rotate(-8deg) translateY(0)}
    30%{transform:rotate(7deg) translateY(0)}
    45%{transform:rotate(-5deg) translateY(-2px)}
    60%{transform:rotateX(-55deg) translateY(-3px) scale(1.15)}
    80%{transform:rotateX(-25deg) translateY(-1px) scale(1.1)}
    100%{transform:rotateX(0) translateY(0) scale(1)}
  }
  .spark{position:absolute;left:50%;top:50%;font-size:11px;opacity:0;pointer-events:none;z-index:2}
  .chest3d.opening .spark{animation:sparkFly .8s cubic-bezier(.15,.7,.3,1) forwards}
  @keyframes sparkFly{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
    15%{opacity:1}
    100%{opacity:0;transform:translate(calc(-50% + var(--sx,0px)),calc(-50% + var(--sy,-34px))) scale(1) rotate(var(--sr,30deg))}
  }
  .chest .desc{font-size:12.5px;color:var(--card-muted);margin-top:2px}
  .chest .desc b{color:var(--card-text)}
  .chest .exp{font-size:10.5px;color:var(--card-muted);margin-top:4px;font-family:'Oswald',sans-serif;letter-spacing:.04em}
  .chest .claimed-tag{font-size:11px;color:#86efac;font-family:'Oswald',sans-serif;letter-spacing:.06em}
  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:700;
    padding:10px 18px;border-radius:10px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s;flex-shrink:0}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.22);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .pop{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,9,16,.85);
    font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--gold);opacity:0;pointer-events:none;transition:.25s}
  .pop.show{opacity:1;transform:scale(1.05)}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:var(--modal-bg);border:1px solid var(--line2);border-radius:12px;padding:14px 22px;color:var(--cyan);
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(39,227,255,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--card-muted);
    background:var(--chip-bg);border:1px solid var(--card-border);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}

  .promo-card{display:flex;align-items:flex-start;gap:14px;background:linear-gradient(160deg,#0e1a28,#0a0f18);
    border:1px solid rgba(39,227,255,.3);border-radius:14px;padding:14px;margin-bottom:10px}
  .promo-card .promo-icon{font-size:28px;flex-shrink:0;line-height:1.2}
  .promo-card .promo-info{flex:1;min-width:0}
  .promo-card .promo-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--cyan);margin-bottom:4px}
  .promo-card .promo-sub{font-size:12px;color:var(--card-muted);margin-bottom:8px}
  .promo-code-box{background:rgba(0,0,0,.4);border:1.5px dashed rgba(39,227,255,.4);border-radius:8px;
    padding:8px 12px;font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:.1em;
    color:var(--cyan);word-break:break-all;margin-bottom:8px}
  .promo-copy-btn{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    background:rgba(39,227,255,.1);border:1px solid rgba(39,227,255,.35);color:var(--cyan);
    padding:6px 12px;border-radius:7px;cursor:pointer;transition:.15s}
  .promo-copy-btn:hover{background:rgba(39,227,255,.22)}
  .promo-warn{font-size:11px;color:#f59e0b;margin-top:6px}

  @media (prefers-color-scheme: light){
    body{background:radial-gradient(120% 70% at 50% -10%,rgba(224,18,58,.10),#f4f1fb 45%,#eef1f7 100%);background-attachment:fixed}
    .chest{box-shadow:0 4px 14px rgba(22,28,44,.07)}
    .err{color:#9a2030}
  }
</style>

<div class="wrap">

    <div><span class="s">♦</span> <b>Mailbox</b></div>
    <button id="clear-read-btn" onclick="deleteRead()" style="display:none;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,80,80,.35);background:rgba(255,80,80,.08);color:#ff6b6b;cursor:pointer">🗑 Clear Read</button>

<script type="module" src="/chest3d.module.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
  if(typeof THREE==='undefined') return;
  const TC={gold:{body:0xf4c441,dark:0xa87b08,shine:0xfff4cc},silver:{body:0xd6dae2,dark:0x8b93a3,shine:0xffffff},bronze:{body:0xe1955a,dark:0x8b5a2b,shine:0xf5c9a0}};
  function buildTrophy(canvas,tier){
    const c=TC[tier]||TC.gold;
    const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(40,1,0.1,10);
    camera.position.set(0.6,0.4,2.1);camera.lookAt(0,0,0);
    scene.add(new THREE.AmbientLight(0xffffff,0.65));
    const key=new THREE.DirectionalLight(0xffffff,1.1);key.position.set(-1.5,3,2);scene.add(key);
    const fill=new THREE.DirectionalLight(0xffeebb,0.45);fill.position.set(2.5,0.5,1);scene.add(fill);
    const mB=new THREE.MeshStandardMaterial({color:c.body,metalness:0.78,roughness:0.22});
    const mD=new THREE.MeshStandardMaterial({color:c.dark,metalness:0.60,roughness:0.30});
    const mS=new THREE.MeshStandardMaterial({color:c.shine,metalness:0.95,roughness:0.06});
    const g=new THREE.Group();
    const base=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.46,0.12,8),mB);base.position.y=-0.64;g.add(base);
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.18,0.44,8),mD);stem.position.y=-0.30;g.add(stem);
    const cup=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.19,0.58,12),mB);cup.position.y=0.24;g.add(cup);
    const rim=new THREE.Mesh(new THREE.TorusGeometry(0.42,0.055,8,16),mS);rim.rotation.x=Math.PI/2;rim.position.y=0.53;g.add(rim);
    const lh=new THREE.Mesh(new THREE.TorusGeometry(0.175,0.042,6,10,Math.PI),mD);lh.rotation.z=Math.PI/2;lh.position.set(-0.50,0.24,0);g.add(lh);
    const rh=new THREE.Mesh(new THREE.TorusGeometry(0.175,0.042,6,10,Math.PI),mD);rh.rotation.z=-Math.PI/2;rh.position.set(0.50,0.24,0);g.add(rh);
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;const s=new THREE.Mesh(new THREE.SphereGeometry(0.05,5,5),mS);s.position.set(Math.cos(a)*0.42,0.57,Math.sin(a)*0.42);g.add(s);}
    g.rotation.y=-0.35;scene.add(g);
    const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    renderer.setSize(canvas.width,canvas.height,false);
    renderer.render(scene,camera);
    let rafId=null,opening=false,t0=performance.now();
    function idleTick(now){if(opening)return;const t=(now-t0)/1000;g.rotation.y=-0.35+Math.sin(t*0.72)*0.28;g.position.y=Math.sin(t*1.1)*0.036;renderer.render(scene,camera);rafId=requestAnimationFrame(idleTick);}
    rafId=requestAnimationFrame(idleTick);
    function open(){if(opening)return;opening=true;cancelAnimationFrame(rafId);const start=performance.now(),fromY=g.rotation.y;function tick(now){const p=Math.min(1,(now-start)/700),e=1-Math.pow(1-p,3);g.rotation.y=fromY+e*Math.PI*2;g.scale.setScalar(1+Math.sin(p*Math.PI)*0.2);g.position.y=Math.sin(p*Math.PI)*0.1;renderer.render(scene,camera);if(p<1){rafId=requestAnimationFrame(tick);}else{g.scale.setScalar(1);g.position.y=0;opening=false;t0=performance.now();rafId=requestAnimationFrame(idleTick);}}rafId=requestAnimationFrame(tick);}
    function dispose(){cancelAnimationFrame(rafId);renderer.dispose();if(renderer.forceContextLoss)renderer.forceContextLoss();}
    return{open,dispose};
  }
  window.TrophyVoxel={create:buildTrophy};
})();
</script>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}

function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  if (exp) sessionStorage.setItem('whop_exp', exp); else exp = sessionStorage.getItem('whop_exp') || '';
  if (co)  sessionStorage.setItem('whop_co',  co);  else co  = sessionStorage.getItem('whop_co')  || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,

      '/daily.html': j.dailyEnabled, '/store.html': j.storeEnabled, '/mailbox.html': j.mailboxEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) a.remove();
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/mailbox');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.isPaid&&j.branding?.logoUrl)?'none':'block';
    render(j.entries||[]);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function fmtCountdown(expiresAt){
  const ms = new Date(expiresAt).getTime() - Date.now();
  if (ms <= 0) return 'Expired';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return `Expires in ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const chestRegistry = {};

function render(entries){
  Object.values(chestRegistry).forEach(c => { try{ c.dispose(); }catch(_){} });
  for (const k in chestRegistry) delete chestRegistry[k];

  if (!entries.length){
    $('content').innerHTML = '<div class="empty">📭 Your mailbox is empty. When a member makes a purchase on Whop, the whole channel will get a chest here!</div>';
    return;
  }
  const sparkAngles = [[-26,-10,-22],[24,-8,18],[-10,-34,-14],[12,-30,26],[-34,-22,-30],[30,-20,32]];
  $('content').innerHTML = entries.map(e => {
    // Admin message entries (no XU, no claim) — always deletable
    if (e.type === 'message') {
      return `<div class="promo-card" id="chest-${esc(e.id)}" style="background:rgba(39,227,255,.06);border-color:rgba(39,227,255,.25);position:relative">
        <div class="promo-icon">💬</div>
        <div class="promo-info">
          <div class="promo-lbl" style="color:var(--cyan)">${esc(e.label||'Message from Admin')}</div>
          <div class="promo-sub" style="white-space:pre-wrap;color:var(--card-text)">${esc(e.message||'')}</div>
        </div>
        <button onclick="deleteOne('${esc(e.id)}')" title="Delete" style="position:absolute;top:8px;right:8px;background:none;border:1px solid rgba(255,80,80,.3);color:#ff6b6b;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;line-height:1.4">✕</button>
      </div>`;
    }
    // Promo code entries get a special card (not a chest)
    if (e.type === 'promo') {
      const warnMsg = !e.promoCreated
        ? '<div class="promo-warn">⚠ Code pending — the app needs additional Whop permissions to generate live codes. Contact your admin.</div>'
        : '';
      return `<div class="promo-card" id="chest-${esc(e.id)}">
        <div class="promo-icon">🏷️</div>
        <div class="promo-info">
          <div class="promo-lbl">${esc(e.label)}</div>
          <div class="promo-sub">${e.discountPct ? e.discountPct+'% discount on Whop — valid for 30 days' : 'Your streak reward'}</div>
          <div class="promo-code-box" id="pc-${esc(e.id)}">${esc(e.promoCode||'')}</div>
          <button class="promo-copy-btn" onclick="copyPromoCode('${esc(e.id)}','${esc(e.promoCode||'')}',this)">📋 Copy code</button>
          ${warnMsg}
        </div>
      </div>`;
    }
    // Normal chest entry
    return `
    <div class="chest ${e.tier}" id="chest-${esc(e.id)}">
      <div class="chest3d">
        ${e.claimed
          ? `<div class="chest-visual">🪙</div>`
          : `<canvas class="chest-visual" id="cv-${esc(e.id)}" width="52" height="52"></canvas>`}
        ${sparkAngles.map(([sx,sy,sr])=>`<span class="spark" style="--sx:${sx}px;--sy:${sy}px;--sr:${sr}deg">🪙</span>`).join('')}
      </div>
      <div class="info">
        <div class="label">${esc(e.label)}</div>
        ${e.buyerName ? `<div class="desc"><b>${esc(e.buyerName)}</b> made a purchase on Whop</div>` : (e.desc ? `<div class="desc">${esc(e.desc)}</div>` : '')}
        ${e.claimed ? '<div class="claimed-tag">✅ Claimed +'+e.xu+' XU</div>' : `<div style="font-size:12px;color:#fcd34d;font-weight:600;margin-bottom:2px">+${e.xu} XU</div><div class="exp" data-exp="${esc(e.expiresAt)}">${fmtCountdown(e.expiresAt)}</div>`}
      </div>
      ${e.claimed ? '' : `<button class="btn" onclick="claim('${esc(e.id)}',this)">Claim</button>`}
      <div class="pop" id="pop-${esc(e.id)}"></div>
    </div>`;
  }).join('');

  entries.forEach(e => {
    if (e.claimed) return;
    const canvas = $('cv-' + e.id);
    if (!canvas) return;
    if (e.icon === '🏆' && window.TrophyVoxel) {
      chestRegistry[e.id] = window.TrophyVoxel.create(canvas, e.tier || 'gold');
    } else if (window.ChestVoxel) {
      chestRegistry[e.id] = window.ChestVoxel.create(canvas, e.tier);
    }
  });

  // Show "Clear Read" button only when there are deletable entries
  const hasRead = entries.some(e => e.type === 'message' || e.type === 'promo');
  const clearBtn = $('clear-read-btn');
  if (clearBtn) clearBtn.style.display = hasRead ? '' : 'none';

  setInterval(()=>{
    document.querySelectorAll('.exp[data-exp]').forEach(el=>{ el.textContent = fmtCountdown(el.dataset.exp); });
  }, 1000);
}

async function deleteOne(id) {
  try {
    const r = await tenantFetch('/.netlify/functions/mailbox', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'deleteOne', entryId: id }),
    });
    if (!r.ok) { const j = await r.json(); throw new Error(j.error || 'Error'); }
    const el = document.getElementById('chest-' + id);
    if (el) { el.style.transition = 'opacity .2s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }
    const remaining = document.querySelectorAll('[id^="chest-"]');
    if (remaining.length <= 1) load();
  } catch(e) { toast('⚠ ' + e.message); }
}

async function deleteRead() {
  const btn = $('clear-read-btn');
  if (btn) btn.disabled = true;
  try {
    const r = await tenantFetch('/.netlify/functions/mailbox', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'deleteRead' }),
    });
    if (!r.ok) { const j = await r.json(); throw new Error(j.error || 'Error'); }
    load();
  } catch(e) {
    toast('⚠ ' + e.message);
    if (btn) btn.disabled = false;
  }
}

function copyPromoCode(id, code, btn){
  if(!code) return;
  navigator.clipboard.writeText(code).then(()=>{
    const old=btn.textContent; btn.textContent='✅ Copied!';
    setTimeout(()=>{ btn.textContent=old; },1800);
  }).catch(()=>{
    const el=document.getElementById('pc-'+id);
    if(el){ const r=document.createRange(); r.selectNode(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); document.execCommand('copy'); window.getSelection().removeAllRanges(); }
    const old=btn.textContent; btn.textContent='✅ Copied!';
    setTimeout(()=>{ btn.textContent=old; },1800);
  });
}

async function claim(id, btn){
  btn.disabled = true;
  const chestEl = document.getElementById('chest-'+id);
  const chest3d = chestEl ? chestEl.querySelector('.chest3d') : null;
  if (chest3d) chest3d.classList.add('opening');
  chestRegistry[id]?.open();
  const animDone = new Promise(res => setTimeout(res, 650));
  try{
    const reqPromise = tenantFetch('/.netlify/functions/mailbox', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({entryId:id})});
    const [r] = await Promise.all([reqPromise, animDone]);
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error');
    const pop = $('pop-'+id);
    pop.textContent = `+${j.xu} XU`;
    pop.classList.add('show');
    toast(j.message);
    setTimeout(load, 1200);
  }catch(e){
    if (chest3d) chest3d.classList.remove('opening');
    toast('⚠ '+e.message);
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
