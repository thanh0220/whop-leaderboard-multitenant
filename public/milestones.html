<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Milestones — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffd966;--gold2:#f4c441;--amber:#c89b3c;--dark:#3a2308;--cream:#f3e6c8;--creamtext:#4a3414;--green:#22c55e;--muted:#cbb47a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:#fff;min-height:100vh;padding:0 0 60px;
    background:
      repeating-radial-gradient(circle at 20% 15%, rgba(255,224,130,.10) 0 2px, transparent 2px 38px),
      repeating-radial-gradient(circle at 80% 60%, rgba(255,224,130,.08) 0 2px, transparent 2px 44px),
      radial-gradient(120% 90% at 50% -10%, #f6cf5e, #c89b3c 45%, #6b4413 80%, #3a2308 100%);
    background-attachment:fixed}
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:10.5px;
    padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.18);color:#ffe9b0;text-decoration:none;transition:.15s}
  .nav a.on{border-color:#fff;background:rgba(255,255,255,.22);color:#fff;box-shadow:0 0 14px rgba(255,255,255,.3)}

  .hero{text-align:left;margin-bottom:16px}
  .hero .cta{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.06em;color:#fff7da;
    text-shadow:0 1px 3px rgba(0,0,0,.5);margin-bottom:2px}
  .hero h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;letter-spacing:.03em;color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.45);text-transform:uppercase}
  .hero .dates{font-size:12px;color:#fff0c8;margin-top:6px;opacity:.9}
  .hero .countdown{font-family:'Oswald',sans-serif;font-size:13px;color:#fff;margin-top:2px;font-weight:600}
  .hero .countdown b{color:#ffe9a8}

  .track-wrap{overflow-x:auto;padding:6px 2px 18px;margin-bottom:4px}
  .track{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;min-width:min-content;position:relative}
  .node{flex:0 0 auto;width:84px;text-align:center;position:relative;cursor:pointer;border-radius:14px;
    padding:6px 2px 2px;transition:.15s}
  .node:hover{background:rgba(255,255,255,.08)}
  .node.selected{background:rgba(255,255,255,.14);box-shadow:0 0 0 2px var(--gold2),0 0 14px rgba(244,196,65,.5)}
  .chest-box{width:64px;height:64px;margin:0 auto 6px;position:relative;perspective:300px}
  .chest-box canvas{width:64px;height:64px;display:block;animation:chestSpin 6s linear infinite}
  @keyframes chestSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
  .lock-badge{position:absolute;top:-2px;right:6px;font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
  .node .amt{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
  .node .claimed-mark{font-size:26px;line-height:64px}

  .bar-row{position:relative;height:16px;margin:0 8px 22px;border-radius:999px;background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.25);overflow:visible}
  .bar-row .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#4ade80,#22c55e);
    box-shadow:0 0 10px rgba(34,197,94,.6);transition:width .5s ease}
  .bar-row .marker{position:absolute;top:50%;font-size:18px;transform:translate(-50%,-50%);transition:left .5s ease;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}

  .panel{background:linear-gradient(160deg,var(--cream),#e9d6a6);border:1px solid rgba(0,0,0,.15);
    border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
  .panel .reward-preview{width:56px;height:56px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;
    justify-content:center;background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.12);overflow:hidden}
  .panel .reward-preview img{width:100%;height:100%;object-fit:cover}
  .panel .reward-preview .icon{font-size:28px}
  .panel .info{flex:1;min-width:0}
  .panel .reward-line{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#b8860a;margin-top:2px}
  .panel .label1{font-size:11px;color:#8a6a2e;text-transform:uppercase;letter-spacing:.06em;font-family:'Oswald',sans-serif}
  .panel .label2{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--creamtext);margin-top:1px}
  .panel .progress-txt{font-size:12px;color:#8a6a2e;margin-top:6px}
  .panel .progress-txt b{color:var(--creamtext)}
  .cta-btn{font-family:'Oswald',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:13px;font-weight:700;
    padding:13px 22px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;transition:.15s;
    background:linear-gradient(135deg,var(--gold),var(--gold2));color:#4a3000;box-shadow:0 3px 0 #b8860a,0 6px 14px rgba(0,0,0,.3)}
  .cta-btn.ready{background:linear-gradient(135deg,#4ade80,var(--green));color:#06210f;box-shadow:0 3px 0 #15803d,0 6px 14px rgba(0,0,0,.3)}
  .cta-btn:disabled{opacity:.65;cursor:not-allowed}
  .cta-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #b8860a}

  .empty{text-align:center;font-size:13px;padding:50px 20px;background:rgba(0,0,0,.22);border-radius:16px;color:#ffe9b0}
  .state{text-align:center;padding:60px 20px;color:#ffe9b0}
  .spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:#2a1c08;border:1px solid var(--gold);border-radius:12px;padding:14px 22px;color:#ffe9a8;
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(244,196,65,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:#fff0c8;
    background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
  @media(max-width:480px){
    .panel{flex-direction:column;align-items:stretch;text-align:center}
    .panel .reward-preview{margin:0 auto}
    .cta-btn{width:100%}
  }
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/store.html">🎁 Store</a>
    <a href="/events.html">🗓 Events</a>
    <a href="/mailbox.html">📬 Mailbox</a>
    <a href="/milestones.html" class="on">🎯 Milestones</a>
    <a href="/spin.html">🎰 Lucky Spin</a>
    <a href="/auction.html">🔨 Auction</a>
  </div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/gem-chest3d.module.js"></script>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
function fmtMoney(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});}

function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();

let DATA = null;
let selectedIdx = null;
const TIER_CYCLE = ['bronze','jade','gold','ruby','diamond'];
function chestTierFor(i){ return TIER_CYCLE[i % TIER_CYCLE.length]; }

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/milestones');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.branding?.logoUrl)?'none':'block';
    DATA = j;
    render(j);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function fmtCountdown(periodEnd){
  const ms = periodEnd - Date.now();
  if (ms <= 0) return 'Period ended';
  const d = Math.floor(ms/86400000), h = Math.floor((ms%86400000)/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  if (d > 0) return `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const chestRegistry = {};
function disposeChests(){
  Object.values(chestRegistry).forEach(c => { try{ c.dispose(); }catch(_){} });
  for (const k in chestRegistry) delete chestRegistry[k];
}

function selectNode(i){
  selectedIdx = i;
  render(DATA, i);
}

function render(j, selIdx){
  disposeChests();

  if (!j.enabled){
    $('content').innerHTML = '<div class="empty">🎯 This program is not active yet. Check back soon!</div>';
    return;
  }
  if (!j.tiers.length){
    $('content').innerHTML = '<div class="empty">No milestones configured yet.</div>';
    return;
  }

  const nextIdx = j.tiers.findIndex(t => !t.claimed);
  if (selIdx == null) selIdx = nextIdx === -1 ? j.tiers.length - 1 : nextIdx;
  selectedIdx = selIdx;

  const maxUsd = j.tiers[j.tiers.length-1].thresholdUsd || 1;
  const pct = Math.min(100, (j.usd / maxUsd) * 100);

  const nodes = j.tiers.map((t,i) => {
    const locked = !t.unlocked;
    return `
    <div class="node ${i===selIdx?'selected':''}" onclick="selectNode(${i})">
      <div class="chest-box">
        ${locked ? `<div class="lock-badge">🔒</div>` : ''}
        ${t.claimed
          ? `<div class="claimed-mark">🪙</div>`
          : `<canvas id="chest-${i}" width="64" height="64"></canvas>`}
      </div>
      <div class="amt">$${fmtMoney(t.thresholdUsd)}</div>
    </div>`;
  }).join('');

  const head = `
    <div class="hero">
      <div class="cta">Deposit to unlock exclusive rewards!</div>
      <h1>Deposit Rewards</h1>
      <div class="dates">Period ends ${new Date(j.periodEnd).toLocaleDateString()}</div>
      <div class="countdown">Ends in <b>${fmtCountdown(j.periodEnd)}</b></div>
    </div>
    <div class="track-wrap">
      <div class="track">${nodes}</div>
    </div>
    <div class="bar-row">
      <div class="fill" style="width:${pct}%"></div>
      <div class="marker" style="left:${pct}%">💎</div>
    </div>`;

  const t = j.tiers[selIdx];
  const ready = t.unlocked;
  const need = Math.max(0, t.thresholdUsd - j.usd);
  const previewBox = t.image
    ? `<img src="${esc(t.image)}" alt=""/>`
    : `<div class="icon">${t.xu ? '🪙' : '🎁'}</div>`;
  const rewardLine = t.xu ? `<div class="reward-line">+${fmtMoney(t.xu)} XU</div>` : '';

  let cta;
  if (t.claimed){
    cta = `<button class="cta-btn" disabled>✅ Claimed</button>`;
  } else if (ready){
    cta = `<button class="cta-btn ready" onclick="claim(${selIdx},this)">🎁 Claim</button>`;
  } else {
    cta = `<button class="cta-btn" disabled>Need $${fmtMoney(need)} more</button>`;
  }

  const panel = `
    <div class="panel">
      <div class="reward-preview">${previewBox}</div>
      <div class="info">
        <div class="label1">${t.claimed ? 'Already claimed:' : (ready ? "You've unlocked:" : 'Preview:')}</div>
        <div class="label2">${esc(t.label)}</div>
        ${rewardLine}
        <div class="progress-txt">Progress: <b>$${fmtMoney(j.usd)} / $${fmtMoney(t.thresholdUsd)}</b></div>
      </div>
      ${cta}
    </div>`;

  $('content').innerHTML = head + panel;

  j.tiers.forEach((t,i) => {
    if (t.claimed) return;
    const canvas = $('chest-'+i);
    if (canvas && window.GemChest) chestRegistry['n'+i] = window.GemChest.create(canvas, chestTierFor(i));
  });
}

async function claim(i, btn){
  btn.disabled = true;
  const animDone = new Promise(res => setTimeout(res, 650));
  chestRegistry['n'+i]?.open();
  try{
    const reqPromise = tenantFetch('/.netlify/functions/milestones', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({tierIndex:i})});
    const [r] = await Promise.all([reqPromise, animDone]);
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error');
    toast(j.xu ? `+${j.xu} XU added!` : (j.code ? `Reward unlocked: ${j.code}` : 'Reward claimed!'));
    setTimeout(load, 900);
  }catch(e){
    toast('⚠ '+e.message);
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
