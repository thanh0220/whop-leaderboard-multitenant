<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Milestones — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#ffd966;--gold2:#f4c441;--amber:#c89b3c;--dark:#3a2308;--cream:#f3e6c8;--creamtext:#4a3414;--green:#22c55e;--muted:#cbb47a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:#fff;min-height:100vh;padding:0 0 60px;
    background:
      repeating-radial-gradient(circle at 20% 15%, rgba(255,224,130,.10) 0 2px, transparent 2px 38px),
      repeating-radial-gradient(circle at 80% 60%, rgba(255,224,130,.08) 0 2px, transparent 2px 44px),
      radial-gradient(120% 90% at 50% -10%, #f6cf5e, #c89b3c 45%, #6b4413 80%, #3a2308 100%);
    background-attachment:fixed}
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:10.5px;
    padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.18);color:#ffe9b0;text-decoration:none;transition:.15s}
  .nav a.on{border-color:#fff;background:rgba(255,255,255,.22);color:#fff;box-shadow:0 0 14px rgba(255,255,255,.3)}

  .hero{text-align:left;margin-bottom:16px}
  .hero .cta{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.06em;color:#fff7da;
    text-shadow:0 1px 3px rgba(0,0,0,.5);margin-bottom:2px}
  .hero h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;letter-spacing:.03em;color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.45);text-transform:uppercase}
  .hero .dates{font-size:12px;color:#fff0c8;margin-top:6px;opacity:.9}
  .hero .countdown{font-family:'Oswald',sans-serif;font-size:13px;color:#fff;margin-top:2px;font-weight:600}
  .hero .countdown b{color:#ffe9a8}

  .track-wrap{padding:6px 2px 18px;margin-bottom:4px}
  .ms-nav{display:flex;align-items:center;gap:8px}
  .ms-arrow{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:36px;height:36px;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:inherit;transition:.15s;line-height:1}
  .ms-arrow:hover:not(.disabled){background:rgba(255,255,255,.2)}
  .ms-arrow.disabled{opacity:.25;cursor:default;pointer-events:none}
  .track{display:flex;align-items:flex-end;justify-content:center;gap:6px;flex:1;position:relative}
  .node{flex:0 0 auto;width:84px;text-align:center;position:relative;cursor:pointer;border-radius:14px;
    padding:6px 2px 2px;transition:.15s}
  .node:hover{background:rgba(255,255,255,.08)}
  .node.selected{background:rgba(255,255,255,.14);box-shadow:0 0 0 2px var(--gold2),0 0 14px rgba(244,196,65,.5)}
  .chest-box{width:64px;height:64px;margin:0 auto 6px;position:relative;perspective:300px}
  .chest-box canvas{width:64px;height:64px;display:block}
  /* Mystery card — dùng cho Custom Item milestones */
  .mcard-wrap{width:46px;height:64px;margin:0 auto}
  .mcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:mcard-float 3s ease-in-out infinite;transition:transform .55s ease}
  .mcard-face{position:absolute;inset:0;border-radius:7px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
  .mcard-front{border:1.5px solid;box-shadow:inset 0 0 8px #ffffff06}
  .mcard-back{transform:rotateY(180deg);font-size:20px;background:linear-gradient(150deg,#1a0800,#4a1e00);border:1.5px solid #f59e0b;box-shadow:0 0 8px #f59e0b44}
  .mcard-q{font-size:26px;font-weight:bold;font-family:Georgia,serif;animation:mq-pulse 2s ease-in-out infinite alternate}
  @keyframes mcard-float{0%,100%{transform:translateY(0) rotateY(-9deg)}50%{transform:translateY(-5px) rotateY(9deg)}}
  @keyframes mq-pulse{from{opacity:.65}to{opacity:1}}
  /* 5 màu */
  .mcard-c0 .mcard-front{background:linear-gradient(150deg,#0e0028,#2d006b);border-color:#7c3aed}
  .mcard-c0 .mcard-q{color:#c084fc;filter:drop-shadow(0 0 6px #7c3aed)}
  .mcard-c1 .mcard-front{background:linear-gradient(150deg,#000e28,#001a6b);border-color:#3b82f6}
  .mcard-c1 .mcard-q{color:#93c5fd;filter:drop-shadow(0 0 6px #3b82f6)}
  .mcard-c2 .mcard-front{background:linear-gradient(150deg,#180c00,#4a2800);border-color:#f59e0b}
  .mcard-c2 .mcard-q{color:#fcd34d;filter:drop-shadow(0 0 6px #f59e0b)}
  .mcard-c3 .mcard-front{background:linear-gradient(150deg,#001a10,#004d2c);border-color:#10b981}
  .mcard-c3 .mcard-q{color:#6ee7b7;filter:drop-shadow(0 0 6px #10b981)}
  .mcard-c4 .mcard-front{background:linear-gradient(150deg,#1a0008,#4a0018);border-color:#f43f5e}
  .mcard-c4 .mcard-q{color:#fda4af;filter:drop-shadow(0 0 6px #f43f5e)}
  .lock-badge{position:absolute;top:-2px;right:6px;font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
  .node .amt{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
  .node .claimed-mark{font-size:26px;line-height:64px}

  .bar-row{position:relative;height:16px;margin:0 8px 22px;border-radius:999px;background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.25);overflow:visible}
  .bar-row .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#4ade80,#22c55e);
    box-shadow:0 0 10px rgba(34,197,94,.6);transition:width .5s ease}
  .bar-row .marker{position:absolute;top:50%;font-size:18px;transform:translate(-50%,-50%);transition:left .5s ease;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}

  .panel{background:linear-gradient(160deg,var(--cream),#e9d6a6);border:1px solid rgba(0,0,0,.15);
    border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 20px rgba(0,0,0,.25)}
  .panel .reward-preview{width:56px;height:56px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;
    justify-content:center;background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.12);overflow:hidden}
  .panel .reward-preview img{width:100%;height:100%;object-fit:cover}
  .panel .reward-preview .icon{font-size:28px}
  .panel .info{flex:1;min-width:0}
  .panel .reward-line{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:#b8860a;margin-top:2px}
  .panel .label1{font-size:11px;color:#8a6a2e;text-transform:uppercase;letter-spacing:.06em;font-family:'Oswald',sans-serif}
  .panel .label2{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--creamtext);margin-top:1px}
  .panel .progress-txt{font-size:12px;color:#8a6a2e;margin-top:6px}
  .panel .progress-txt b{color:var(--creamtext)}
  .cta-btn{font-family:'Oswald',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:13px;font-weight:700;
    padding:13px 22px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;transition:.15s;
    background:linear-gradient(135deg,var(--gold),var(--gold2));color:#4a3000;box-shadow:0 3px 0 #b8860a,0 6px 14px rgba(0,0,0,.3)}
  .cta-btn.ready{background:linear-gradient(135deg,#4ade80,var(--green));color:#06210f;box-shadow:0 3px 0 #15803d,0 6px 14px rgba(0,0,0,.3)}
  .cta-btn:disabled{opacity:.65;cursor:not-allowed}
  .cta-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #b8860a}

  .empty{text-align:center;font-size:13px;padding:50px 20px;background:rgba(0,0,0,.22);border-radius:16px;color:#ffe9b0}
  .state{text-align:center;padding:60px 20px;color:#ffe9b0}
  .spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  /* Item Card — custom reward dạng thẻ */
  .item-card{border-radius:18px;overflow:hidden;position:relative;
    background:linear-gradient(180deg,#1c0f02,#2a1805);
    border:2px solid var(--gold2);
    box-shadow:0 0 0 1px rgba(255,180,0,.08),0 12px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,220,100,.1);
    margin-bottom:4px}
  .item-card::before{content:'';position:absolute;inset:7px;
    border:1px solid rgba(255,200,80,.1);border-radius:12px;pointer-events:none;z-index:1}
  .item-card-img{width:100%;height:210px;object-fit:cover;display:block}
  .item-card-img-ph{width:100%;height:210px;display:flex;align-items:center;justify-content:center;
    font-size:76px;background:radial-gradient(circle at 50% 45%,#3a2010,#1c0f02)}
  .item-card-badge{position:absolute;top:12px;left:12px;
    background:linear-gradient(135deg,#7c3700,#b85c00);
    color:#ffe9a8;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;padding:5px 12px;border-radius:6px;font-weight:700;
    box-shadow:0 2px 8px rgba(0,0,0,.55);z-index:2}
  .item-card-badge.unlocked{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff}
  .item-card-badge.claimed{background:linear-gradient(135deg,#374151,#6b7280);color:#d1d5db}
  .item-card-body{padding:16px 18px 20px;position:relative;z-index:2}
  .item-card-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,80,.28),transparent);margin-bottom:14px}
  .item-card-status{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .item-card-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;
    color:var(--gold);text-shadow:0 1px 6px rgba(0,0,0,.7);line-height:1.2;margin-bottom:12px}
  .item-card-progress{font-size:12px;color:var(--muted);
    background:rgba(0,0,0,.3);border:1px solid rgba(255,200,80,.1);
    border-radius:8px;padding:8px 12px;margin-bottom:14px}
  .item-card-progress b{color:var(--gold2)}
  .item-card .cta-btn{width:100%}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:#2a1c08;border:1px solid var(--gold);border-radius:12px;padding:14px 22px;color:#ffe9a8;
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(244,196,65,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:#fff0c8;
    background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
  @media(max-width:480px){
    .panel{flex-direction:column;align-items:stretch;text-align:center}
    .panel .reward-preview{margin:0 auto}
    .cta-btn{width:100%}
  }

  /* Light mode: giữ tinh thần "bản đồ kho báu" nhưng đổi nền nâu-tối sang
     vàng kem sáng + chữ nâu đậm để đọc được — không dùng hệ biến chung vì
     trang này có theme riêng (xem milestones.html không có :root light gốc). */
  @media (prefers-color-scheme: light){
    body{color:#4a3414;
      background:
        repeating-radial-gradient(circle at 20% 15%, rgba(201,134,10,.07) 0 2px, transparent 2px 38px),
        repeating-radial-gradient(circle at 80% 60%, rgba(201,134,10,.06) 0 2px, transparent 2px 44px),
        radial-gradient(120% 90% at 50% -10%, #fff6e0, #ffe9b0 45%, #f3cf7a 80%, #e3b454 100%);
      background-attachment:fixed}
    .nav a{border-color:rgba(0,0,0,.15);background:rgba(255,255,255,.5);color:#7a4a0a}
    .nav a.on{border-color:#c9860a;background:rgba(255,255,255,.8);color:#5a3408;box-shadow:0 0 12px rgba(201,134,10,.3)}
    .hero .cta{color:#8a5a10;text-shadow:none}
    .hero h1{color:#5a3408;text-shadow:0 1px 2px rgba(255,255,255,.5)}
    .hero .dates{color:#9a7320}
    .hero .countdown{color:#5a3408}
    .hero .countdown b{color:#c9860a}
    .node:hover{background:rgba(0,0,0,.05)}
    .node.selected{background:rgba(0,0,0,.07)}
    .ms-arrow{background:rgba(0,0,0,.1);border-color:rgba(0,0,0,.2)}
    .ms-arrow:hover:not(.disabled){background:rgba(0,0,0,.18)}
    .bar-row{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.15)}
    .empty{background:rgba(255,255,255,.55);color:#7a4a0a}
    .state{color:#7a4a0a}
    .spinner{border-color:rgba(0,0,0,.15);border-top-color:#c9860a}
    .err{background:rgba(255,255,255,.6);border-color:rgba(201,134,10,.35);color:#9a2030}
    .toast{background:#fffaf0;border-color:#c9860a;color:#7a4a0a;box-shadow:0 0 24px rgba(201,134,10,.25)}
    .powered-badge{color:#7a4a0a;background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.12)}
    .item-card{background:linear-gradient(180deg,#fff8ee,#fdf0d8);border-color:#c89b3c;
      box-shadow:0 0 0 1px rgba(200,155,60,.15),0 8px 24px rgba(0,0,0,.1)}
    .item-card::before{border-color:rgba(200,155,60,.12)}
    .item-card-img-ph{background:radial-gradient(circle at 50% 45%,#fff0d0,#fde9b8)}
    .item-card-status{color:#8a6a2e}
    .item-card-title{color:#7a4a0a;text-shadow:none}
    .item-card-progress{color:#8a6a2e;background:rgba(0,0,0,.04);border-color:rgba(200,155,60,.15)}
    .item-card-progress b{color:#c89b3c}
  }
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge" onclick="window.open('https://whop.com/apps/app_YI4gVdrJb3il0W/','_blank')" style="cursor:pointer">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/store.html">🎁 Store</a>
    <a href="/events.html">🗓 Events</a>
    <a href="/mailbox.html">📬 Mailbox</a>
    <a href="/milestones.html" class="on">🎯 Milestones</a>
  </div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/gem-chest3d.module.js"></script>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}
function fmtMoney(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});}

function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  if (exp) sessionStorage.setItem('whop_exp', exp); else exp = sessionStorage.getItem('whop_exp') || '';
  if (co)  sessionStorage.setItem('whop_co',  co);  else co  = sessionStorage.getItem('whop_co')  || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,

      '/daily.html': j.dailyEnabled, '/store.html': j.storeEnabled, '/mailbox.html': j.mailboxEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) a.remove();
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

let DATA = null;
let selectedIdx = null;
let msOffset = 0;
const MS_PAGE = 5;
const TIER_CYCLE = ['bronze','jade','gold','ruby','diamond'];
function chestTierFor(i){ return TIER_CYCLE[i % TIER_CYCLE.length]; }

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/milestones');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.branding?.logoUrl)?'none':'block';
    DATA = j;
    render(j);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function fmtCountdown(periodEnd){
  const ms = periodEnd - Date.now();
  if (ms <= 0) return 'Period ended';
  const d = Math.floor(ms/86400000), h = Math.floor((ms%86400000)/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  if (d > 0) return `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const chestRegistry = {};
function disposeChests(){
  Object.values(chestRegistry).forEach(c => { try{ c.dispose(); }catch(_){} });
  for (const k in chestRegistry) delete chestRegistry[k];
}

function selectNode(i){
  if (i < msOffset || i >= msOffset + MS_PAGE) {
    msOffset = Math.floor(i / MS_PAGE) * MS_PAGE;
  }
  selectedIdx = i;
  render(DATA, i);
}

function render(j, selIdx){
  disposeChests();

  if (!j.enabled){
    $('content').innerHTML = '<div class="empty">🎯 This program is not active yet. Check back soon!</div>';
    return;
  }
  if (!j.tiers.length){
    $('content').innerHTML = '<div class="empty">No milestones configured yet.</div>';
    return;
  }

  const nextIdx = j.tiers.findIndex(t => !t.claimed);
  if (selIdx == null) {
    selIdx = nextIdx === -1 ? j.tiers.length - 1 : nextIdx;
    msOffset = Math.floor(selIdx / MS_PAGE) * MS_PAGE;
  }
  selectedIdx = selIdx;

  const total = j.tiers.length;
  const visStart = msOffset;
  const visEnd = Math.min(msOffset + MS_PAGE, total);
  const hasPrev = msOffset > 0;
  const hasNext = visEnd < total;
  const maxOffset = Math.max(0, Math.floor((total - 1) / MS_PAGE) * MS_PAGE);

  const maxRef = j.tiers[j.tiers.length-1].thresholdReferrals || 1;
  const pct = Math.min(100, (j.referrals / maxRef) * 100);

  const nodes = j.tiers.slice(visStart, visEnd).map((t, vi) => {
    const i = visStart + vi;
    const locked = !t.unlocked;
    return `
    <div class="node ${i===selIdx?'selected':''}" onclick="selectNode(${i})">
      <div class="chest-box">
        ${locked ? `<div class="lock-badge">🔒</div>` : ''}
        ${t.claimed
          ? `<div class="claimed-mark">🪙</div>`
          : t.customItem
            ? `<div class="mcard-wrap"><div class="mcard-inner mcard-c${i%5}" id="mcard-inner-${i}"><div class="mcard-face mcard-front"><div class="mcard-q">?</div></div><div class="mcard-face mcard-back">✨</div></div></div>`
            : `<canvas id="chest-${i}" width="64" height="64"></canvas>`}
      </div>
      ${t.customItem && !t.claimed ? `<div style="font-size:9px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:2px">Mystery</div>` : ''}
      <div class="amt">${fmtMoney(t.thresholdReferrals)} ref</div>
    </div>`;
  }).join('');

  const head = `
    <div class="hero">
      <div class="cta">Refer members to unlock exclusive rewards!</div>
      <h1>Referral Rewards</h1>
    </div>
    <div class="track-wrap">
      <div class="ms-nav">
        <button class="ms-arrow${hasPrev?'':' disabled'}" onclick="msOffset=Math.max(0,msOffset-${MS_PAGE});render(DATA,selectedIdx)">&#8249;</button>
        <div class="track">${nodes}</div>
        <button class="ms-arrow${hasNext?'':' disabled'}" onclick="msOffset=Math.min(${maxOffset},msOffset+${MS_PAGE});render(DATA,selectedIdx)">&#8250;</button>
      </div>
    </div>
    <div class="bar-row">
      <div class="fill" style="width:${pct}%"></div>
      <div class="marker" style="left:${pct}%">💎</div>
    </div>`;

  const t = j.tiers[selIdx];
  const ready = t.unlocked;
  const need = Math.max(0, t.thresholdReferrals - j.referrals);
  const isCustomItem = t.xu === null && !t.spinTickets;

  let cta;
  if (t.claimed){
    cta = `<button class="cta-btn" disabled>✅ Claimed</button>`;
  } else if (ready){
    cta = `<button class="cta-btn ready" onclick="claim(${selIdx},this)">🎁 Claim</button>`;
  } else {
    cta = need === 0
      ? `<button class="cta-btn ready" onclick="claim(${selIdx},this)">🎁 Claim</button>`
      : `<button class="cta-btn" disabled>Need ${fmtMoney(need)} more referral${need===1?'':'s'}</button>`;
  }

  let panel;
  if (isCustomItem) {
    const badgeClass = t.claimed ? 'claimed' : (ready ? 'unlocked' : '');
    const badgeText  = t.claimed ? '✅ Claimed' : (ready ? '✨ Unlocked!' : '🎯 Exclusive Reward');
    panel = `
    <div class="item-card">
      ${t.image ? `<img class="item-card-img" src="${esc(t.image)}" alt="${esc(t.label)}"/>` : `<div class="item-card-img-ph">🎁</div>`}
      <div class="item-card-badge ${badgeClass}">${badgeText}</div>
      <div class="item-card-body">
        <div class="item-card-divider"></div>
        <div class="item-card-status">${t.claimed ? 'Already claimed' : (ready ? "You've unlocked" : 'Preview reward')}</div>
        <div class="item-card-title">${esc(t.label)}</div>
        <div class="item-card-progress">Progress: <b>${fmtMoney(j.referrals)} / ${fmtMoney(t.thresholdReferrals)} referrals</b></div>
        ${!ready && !t.claimed ? `<div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px">Share your referral link to unlock this reward</div>` : ''}
        ${cta}
      </div>
    </div>`;
  } else {
    const previewBox = t.image
      ? `<img src="${esc(t.image)}" alt=""/>`
      : `<div class="icon">${t.spinTickets ? '🎰' : (t.xu ? '🪙' : '🎁')}</div>`;
    const rewardLine = t.spinTickets
      ? `<div class="reward-line">+${fmtMoney(t.spinTickets)} 🎰 Lucky Spin ticket${t.spinTickets>1?'s':''}</div>`
      : (t.xu ? `<div class="reward-line">+${fmtMoney(t.xu)} XU</div>` : '');
    panel = `
    <div class="panel">
      <div class="reward-preview">${previewBox}</div>
      <div class="info">
        <div class="label1">${t.claimed ? 'Already claimed:' : (ready ? "You've unlocked:" : 'Preview:')}</div>
        <div class="label2">${esc(t.label)}</div>
        ${rewardLine}
        <div class="progress-txt">Progress: <b>${fmtMoney(j.referrals)} / ${fmtMoney(t.thresholdReferrals)} referrals</b></div>
        ${!ready && !t.claimed ? `<div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px">Share your referral link to unlock this reward</div>` : ''}
      </div>
      ${cta}
    </div>`;
  }

  $('content').innerHTML = head + panel;

  j.tiers.slice(visStart, visEnd).forEach((t, vi) => {
    const i = visStart + vi;
    if (t.claimed) return;
    if (t.customItem) {
      chestRegistry['n'+i] = {
        open() {
          const el = document.getElementById('mcard-inner-'+i);
          if (!el) return;
          el.style.animation = 'none';
          el.style.transition = 'transform .55s ease';
          el.style.transform = 'rotateY(180deg)';
        },
        dispose() {}
      };
    } else {
      const canvas = $('chest-'+i);
      if (canvas && window.GemChest) chestRegistry['n'+i] = window.GemChest.create(canvas, chestTierFor(i));
    }
  });

}

async function claim(i, btn){
  btn.disabled = true;
  const animDone = new Promise(res => setTimeout(res, 650));
  chestRegistry['n'+i]?.open();
  chestRegistry['card']?.open();
  try{
    const reqPromise = tenantFetch('/.netlify/functions/milestones', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({tierIndex:i})});
    const [r] = await Promise.all([reqPromise, animDone]);
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error');
    toast(j.tickets ? `+${j.tickets} 🎰 Lucky Spin ticket${j.tickets>1?'s':''} added!` : (j.xu ? `+${j.xu} XU added!` : (j.code ? `Reward unlocked: ${j.code}` : 'Reward claimed!')));
    setTimeout(load, 900);
  }catch(e){
    toast('⚠ '+e.message);
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
