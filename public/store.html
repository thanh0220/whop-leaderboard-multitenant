<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reward Store — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid var(--ctrl-border);
    background:var(--ctrl-bg);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a:hover{border-color:rgba(39,227,255,.3);color:var(--cyan)}
  .nav a.on{border-color:rgba(39,227,255,.3);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--purple:#7B00D4;--purple-glow:#B266FF;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3);
    --ctrl-bg:rgba(255,255,255,.03);--ctrl-border:rgba(255,255,255,.12);
    --card1:#16202f;--card2:#0a0f18;--card-border:rgba(255,255,255,.08);
    --card-text:#eef2f8;--card-muted:#8a93a6;--chip-bg:rgba(0,0,0,.25);
    --modal-bg:#0e1622;--modal-border:rgba(255,255,255,.12)}
  @media (prefers-color-scheme: light){
    :root{--bg:#eef1f7;--muted:#5d6478;--text:#161c2c;--red:#c81f3d;--cyan:#0a91a8;--gold:#9a6b00;
      --line2:rgba(10,145,168,.3);--ctrl-bg:rgba(22,28,44,.04);--ctrl-border:rgba(22,28,44,.14);
      --card1:#ffffff;--card2:#eef2f9;--card-border:rgba(22,28,44,.09);
      --card-text:#161c2c;--card-muted:#5d6478;--chip-bg:#e4e9f2;
      --modal-bg:#ffffff;--modal-border:rgba(22,28,44,.12)}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 50px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:18px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .upsell{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));
    border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:13px}
  .upsell b{color:var(--gold)}

  .bal{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
  .bal .b{background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:14px;padding:16px;text-align:center;color:var(--card-text)}
  .bal .b.main{border-color:var(--line2);box-shadow:0 0 22px rgba(39,227,255,.18)}
  .bal .v{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1;color:var(--card-text)}
  .bal .b.main .v{color:var(--cyan);text-shadow:0 0 16px rgba(39,227,255,.4)}
  .bal .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--card-muted);margin-top:6px}
  .hi{font-size:13px;color:var(--muted);margin:14px 2px 18px}
  .hi b{color:var(--text)}

  .sect{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--gold);margin:22px 2px 12px}
  .rewards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .card{position:relative;background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:16px;padding:0;display:flex;flex-direction:column;overflow:hidden;color:var(--card-text);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
  .card:hover{transform:translateY(-3px);border-color:rgba(39,227,255,.35);box-shadow:0 14px 34px rgba(0,0,0,.55),0 0 22px rgba(39,227,255,.15)}
  .card .thumb{position:relative;width:100%;aspect-ratio:1/1;background:var(--card2) center/cover no-repeat;border-bottom:1px solid var(--card-border)}
  .card .thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(10,15,24,.55) 100%);pointer-events:none}
  .card .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card h3{font-size:15px;font-weight:700;line-height:1.3}
  .card p{font-size:12.5px;color:var(--card-muted);flex:1;line-height:1.5}

  /* Badges */
  .badge{position:absolute;top:10px;left:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:5px 9px;border-radius:6px;backdrop-filter:blur(4px);z-index:2}
  .badge.hot{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}
  .badge.new{background:rgba(39,227,255,.18);color:var(--cyan);border:1px solid rgba(39,227,255,.5)}
  .badge.vip{background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.5)}
  .badge.bestseller{background:rgba(178,102,255,.2);color:#d5b8ff;border:1px solid rgba(178,102,255,.5)}
  .badge.limited{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}

  /* Stock pill */
  .stock-pill{position:absolute;top:10px;right:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:6px;background:rgba(10,15,24,.7);color:#ffb0bd;border:1px solid rgba(255,45,75,.45);backdrop-filter:blur(4px);z-index:2}

  /* Cost row with price anchor */
  .cost-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:2px}
  .cost{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:18px;letter-spacing:.04em}
  .price-anchor{font-size:11px;color:var(--card-muted);letter-spacing:.04em}
  .price-anchor s{color:rgba(255,255,255,.55)}
  .price-anchor b{color:var(--cyan);font-weight:600}

  /* Progress bar — for rewards just out of reach */
  .progress{position:relative;width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:2px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:10.5px;color:var(--card-muted);margin-top:4px;display:flex;justify-content:space-between;gap:8px}
  .progress-label b{color:var(--gold)}

  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:600;
    padding:10px 14px;border-radius:9px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s;width:100%}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.2);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.5;cursor:not-allowed;border-color:var(--card-border);background:var(--chip-bg);color:var(--card-muted)}
  .btn.primary{background:linear-gradient(135deg,rgba(244,196,65,.18),rgba(39,227,255,.18));border-color:rgba(244,196,65,.5);color:var(--gold)}
  .btn.primary:hover:not(:disabled){background:linear-gradient(135deg,rgba(244,196,65,.3),rgba(39,227,255,.25));box-shadow:0 0 18px rgba(244,196,65,.35)}
  /* Flip card (đã đổi) — gắn hiệu ứng lật bài vào chính ô quà */
  .flip-card{position:relative;perspective:1400px;border-radius:16px}
  .flip-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.2,.9,.25,1)}
  .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .flip-face.flip-front{position:relative}
  .flip-face.flip-back{position:absolute;inset:0;transform:rotateY(180deg);display:flex;flex-direction:column;
    background:linear-gradient(165deg,#0e1622 0%,#1a0a2e 100%);border:1px solid rgba(244,196,65,.55);border-radius:16px;
    box-shadow:0 0 0 1px rgba(244,196,65,.18) inset,0 14px 40px rgba(0,0,0,.55),0 0 24px rgba(244,196,65,.25);
    padding:18px 16px;overflow:hidden}
  .flip-face.flip-back::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 25%,rgba(244,196,65,.22) 0%,transparent 60%);pointer-events:none}
  .done-badge{position:absolute;top:10px;right:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;padding:5px 9px;border-radius:6px;background:rgba(34,197,94,.2);color:#86efac;border:1px solid rgba(34,197,94,.55);backdrop-filter:blur(4px);z-index:3}
  .price-anchor.done b{color:#86efac}
  .fb-hdr{text-align:center;position:relative;z-index:1}
  .fb-tag{display:inline-block;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.2em;padding:4px 10px;border-radius:6px;background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.4)}
  .fb-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-top:8px;letter-spacing:.04em;line-height:1.25}
  .fb-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1;margin:12px 0;width:100%}
  .fb-code{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.14em;background:#0a0f18;border:1.5px dashed var(--gold);border-radius:10px;padding:12px 14px;text-align:center;width:100%;word-break:break-all;text-shadow:0 0 12px rgba(244,196,65,.5)}
  .fb-copy{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:1px solid rgba(244,196,65,.5);color:var(--gold);padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
  .fb-copy:hover{background:rgba(244,196,65,.15);box-shadow:0 0 10px rgba(244,196,65,.3)}
  .fb-copy.ok{background:rgba(110,231,160,.18);border-color:#6EE7A0;color:#6EE7A0}
  .fb-link{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:linear-gradient(135deg,rgba(178,102,255,.18),rgba(244,196,65,.12));border:1px solid rgba(178,102,255,.5);color:#fff;text-decoration:none;font-weight:600;font-size:12.5px;width:100%;box-sizing:border-box}
  .fb-link:hover{border-color:var(--gold);box-shadow:0 6px 16px rgba(178,102,255,.35)}
  .fb-link small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.55);margin-top:2px}
  .btn.done{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.45);color:#86efac}
  .btn.flip-back-btn{background:rgba(178,102,255,.12);border-color:rgba(178,102,255,.5);color:#d5b8ff;margin-top:auto}

  .hist{display:flex;flex-direction:column;gap:8px}
  .hrow{display:flex;justify-content:space-between;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    border-radius:10px;padding:10px 14px;font-size:13px;flex-wrap:wrap}
  .hrow .code{font-family:'Oswald',sans-serif;color:var(--cyan);letter-spacing:.05em}
  .hrow .dt{font-size:11px;color:var(--muted)}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  a.lb{display:inline-block;margin-top:6px;font-size:12px;color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(39,227,255,.4)}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--card-muted);
    background:var(--chip-bg);border:1px solid var(--card-border);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/store.html" class="on">🎁 Store</a>
    <a href="/events.html">🗓 Events</a>
    <a href="/mailbox.html">📬 Mailbox</a>
    <a href="/milestones.html">🎯 Milestones</a>
    <a href="/spin.html">🎰 Lucky Spin</a>
    <a href="/auction.html">🔨 Auction</a>
  </div>
  <div class="top"><span class="s">♦</span> Reward <b>Store</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading your XU...</div></div>
</div>


<script>
let DATA=null;
const $=id=>document.getElementById(id);
function fmt(n){return Number(n||0).toLocaleString('en-US');}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* Mọi request gửi kèm experienceId/companyId Whop truyền vào URL khi nhúng
   app trong iframe — backend dùng để biết đang phục vụ business nào. */
function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){
  return fetch(path + tenantQS(), opts);
}
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,
      '/spin.html': j.spinEnabled, '/auction.html': j.auctionEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) a.remove();
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

// ===== Whop sign-in =====
const WHOP_SIGNIN_URL = "https://whop.com/login";
function openWhopSignin(ev){
  if(ev){ try{ev.stopPropagation();ev.preventDefault();}catch(_){ } }
  if(window.__whopOpening) return false;
  window.__whopOpening = true;
  setTimeout(()=>{ window.__whopOpening = false; }, 1500);
  try{
    const features = "width=480,height=720,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes";
    const w = window.open(WHOP_SIGNIN_URL, "whop_signin", features);
    if(w){ try{ w.focus(); }catch(_){} return false; }
    const t = window.open(WHOP_SIGNIN_URL, "whop_signin");
    if(!t){ (window.top||window).location.href = WHOP_SIGNIN_URL; }
  }catch(_){
    try{ window.top.location.href = WHOP_SIGNIN_URL; }
    catch(__){ window.location.href = WHOP_SIGNIN_URL; }
  }
  return false;
}

// ===== Demo catalog — chỉ dùng khi mở ngoài Whop (chưa có session), GENERIC,
// không phải sản phẩm của business cụ thể nào (mỗi business tự thêm quà
// riêng của họ qua trang admin). =====
const DEMO_REWARDS=[
  {id:"demo_voucher",name:"Sample Voucher",cost:200,desc:"Example discount voucher — businesses add their real rewards via the admin page.",image:null,badge:"new",originalPrice:"$50",stock:null,tier:1,payload:{kind:"code",code:"DEMO123"}},
  {id:"demo_resource",name:"Sample Resource Pack",cost:500,desc:"Example resource redeemed via link — businesses add their real rewards via the admin page.",image:null,badge:"hot",originalPrice:"$150",stock:null,tier:2,payload:{kind:"link",url:"#",label:"Open resource"}},
  {id:"demo_coaching",name:"Sample 1-on-1 Slot",cost:1500,desc:"Example limited coaching slot — businesses add their real rewards via the admin page.",image:null,badge:"limited",originalPrice:"$300",stock:5,tier:5,payload:{kind:"link",url:"#",label:"Book a slot"}}
];

function useDemo(){
  DATA={
    username:"Guest",
    available:350,
    earned:350,
    spent:0,
    paidUsd:0,
    referrals:0,
    history:[],
    rewards:DEMO_REWARDS,
    tier:"paid",
    demo:true
  };
  render();
}

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading your XU...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/me');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    DATA=j;render();
  }catch(e){
    // No Whop session → show DEMO version instead of an error block
    useDemo();
  }
}

const BADGE_LABEL={hot:'🔥 Hot',new:'⚡ New',vip:'👑 VIP',bestseller:'⭐ Bestseller',limited:'⏳ Limited'};

function render(){
  const d=DATA;
  $('powered-badge').style.display=(d.tier==='paid'&&d.branding?.logoUrl)?'none':'block';

  if(!d.rewards || d.rewards.length===0){
    $('content').innerHTML=`
      <div class="bal">
        <div class="b main"><div class="v" id="v-av">${fmt(d.available)}</div><div class="l">🪙 Available XU</div></div>
        <div class="b"><div class="v">${fmt(d.earned)}</div><div class="l">🪙 Total earned</div></div>
        <div class="b"><div class="v">${fmt(d.spent)}</div><div class="l">Spent</div></div>
      </div>
      <div class="state">This community doesn't have any rewards in the store yet. Check back later!</div>
      <div style="text-align:center;margin-top:20px"><a class="lb" href="/index.html">← Back to leaderboard</a></div>`;
    return;
  }

  // sort: affordable first, then closest-to-affordable, then by tier desc
  const redeemedIds=new Set((d.history||[]).map(h=>h.rewardId).filter(Boolean));
  const sorted=[...d.rewards].sort((a,b)=>{
    const aDone=redeemedIds.has(a.id), bDone=redeemedIds.has(b.id);
    if(aDone!==bDone) return aDone?1:-1;
    const aCan=d.available>=a.cost, bCan=d.available>=b.cost;
    if(aCan!==bCan) return aCan?-1:1;
    if(aCan) return (a.tier||0)-(b.tier||0);
    return a.cost-b.cost;
  });

  const rewards=sorted.map(rw=>{
    const done=redeemedIds.has(rw.id);
    const can=d.available>=rw.cost;
    const gap=rw.cost-d.available;
    const pct=Math.min(100,Math.round((d.available/rw.cost)*100));
    const thumb=rw.image
      ? `<div class="thumb" style="background-image:url('${esc(rw.image)}')"></div>`
      : `<div class="thumb" style="background:linear-gradient(135deg,var(--card1),var(--card2))"></div>`;
    const progress=(!can && !done)
      ? `<div class="progress"><i style="width:${pct}%"></i></div>
         <div class="progress-label"><span>Need <b>${fmt(gap)} more XU</b></span><span>${pct}%</span></div>`
      : '';
    let btnClass, btnLabel, btnDisabled, btnOnclick;
    if(d.demo){
      btnClass = rw.tier>=4 ? 'btn primary' : 'btn';
      btnLabel = '🔐 Sign in to redeem';
      btnDisabled = false;
      btnOnclick = `openWhopSignin(event)`;
    } else if(done){ btnClass='btn done'; btnLabel='🔄 Flip to view reward'; btnDisabled=false; btnOnclick=`flipCard('${rw.id}',event)`; }
    else if(can){ btnClass=rw.tier>=4?'btn primary':'btn'; btnLabel=esc(rw.buttonLabel||'GET'); btnDisabled=false; btnOnclick=`redeem('${rw.id}',this)`; }
    else { btnClass='btn'; btnLabel='Not enough XU'; btnDisabled=true; btnOnclick=''; }

    const costHtml = done
      ? `<span class="cost" style="color:#86efac">0 XU</span>
         <div class="price-anchor done"><s>${fmt(rw.cost)} XU</s> · <b>redeemed</b></div>`
      : `<span class="cost">${fmt(rw.cost)} XU</span>`;
    const doneBadge = done ? `<span class="done-badge">✅ Redeemed</span>` : '';

    const frontInner = `
      <div class="card flip-face flip-front">
        ${thumb}${doneBadge}
        <div class="body">
          <h3>${esc(rw.name)}</h3>
          <p>${esc(rw.desc)}</p>
          <div class="cost-row">${costHtml}</div>
          ${progress}
          <button class="${btnClass}" ${btnDisabled?'disabled':''} onclick="${btnOnclick}">${btnLabel}</button>
        </div>
      </div>`;

    if(!done) return frontInner;

    // ===== Back face: gắn nội dung "lật bài nhận thưởng" lên chính ô quà =====
    const p = rw.payload || {kind:'code',code:''};
    let backBody='';
    if(p.kind==='ea'){
      backBody = `
        <a class="fb-link" href="${esc(p.ea)}" target="_blank" rel="noopener">
          <span style="font-size:18px">📥</span><span>Download file<small>${esc(p.label||'')}</small></span>
        </a>
        <a class="fb-link" href="${esc(p.setup)}" target="_blank" rel="noopener">
          <span style="font-size:18px">🛠</span><span>Setup guide<small>Install &amp; activate</small></span>
        </a>`;
    } else if(p.kind==='link'){
      backBody = `<a class="fb-link" href="${esc(p.url)}" target="_blank" rel="noopener">
          <span style="font-size:18px">🔗</span><span>Open reward<small>${esc(p.label||'')}</small></span>
        </a>`;
    } else {
      const code = esc(p.code||'');
      backBody = `<div class="fb-code">${code}</div>
        <button class="fb-copy" onclick="event.stopPropagation();copyCode('${code}',this)">📋 Copy code</button>`;
    }
    const back = `
      <div class="flip-face flip-back">
        <div class="fb-hdr">
          <span class="fb-tag">🎉 Redeemed</span>
          <div class="fb-title">${esc(rw.name)}</div>
        </div>
        <div class="fb-body">${backBody}</div>
        <button class="btn flip-back-btn" onclick="flipCard('${rw.id}',event)">🔄 Flip back</button>
      </div>`;

    return `<div class="flip-card" id="fc-${esc(rw.id)}"><div class="flip-inner">${frontInner}${back}</div></div>`;
  }).join('');

  const demoBanner = d.demo ? `
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin:0 0 14px;font-size:13px;color:#fff">
      <span style="font-size:18px">👀</span>
      <span style="flex:1;min-width:200px">You're viewing a <b style="color:#f4c441">demo</b>. Sign in with Whop to earn real XU and redeem rewards.</span>
      <button onclick="openWhopSignin(event)" style="font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:12px;font-weight:700;padding:9px 16px;border-radius:9px;border:1px solid rgba(244,196,65,.6);background:linear-gradient(135deg,rgba(244,196,65,.25),rgba(178,102,255,.2));color:#fff;cursor:pointer">🔐 Sign in with Whop</button>
    </div>` : '';

  $('content').innerHTML=`
    ${demoBanner}
    <div class="bal">
      <div class="b main"><div class="v" id="v-av">${fmt(d.available)}</div><div class="l">🪙 Available XU</div></div>
      <div class="b"><div class="v">${fmt(d.earned)}</div><div class="l">🪙 Total earned</div></div>
      <div class="b"><div class="v">${fmt(d.spent)}</div><div class="l">Spent</div></div>
    </div>
    <div class="hi">Hi <b>${esc(d.username)}</b> 👋 — you have <b>🪙 ${fmt(d.available)}</b> XU. (Spent ~$${fmt(d.paidUsd)}, ${fmt(d.referrals)} referrals)</div>
    <div class="sect">🎁 Available rewards (${d.rewards.length})</div>
    <div class="rewards">${rewards}</div>
    <div style="text-align:center;margin-top:20px"><a class="lb" href="/index.html">← Back to leaderboard</a></div>`;
}


async function redeem(rewardId,btn){
  btn.disabled=true;btn.textContent='Processing...';
  try{
    const r=await tenantFetch('/.netlify/functions/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rewardId})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    await load();
    // After re-render: auto-flip the just-redeemed card to reveal the reward
    requestAnimationFrame(()=>{
      const el=document.getElementById('fc-'+rewardId);
      if(el){
        el.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>el.classList.add('flipped'),250);
      }
    });
  }catch(e){
    alert('Redeem failed: '+e.message);
    btn.disabled=false;btn.textContent='🎁 Redeem now';
  }
}

function flipCard(rewardId,ev){
  if(ev) ev.stopPropagation();
  const el=document.getElementById('fc-'+rewardId);
  if(el) el.classList.toggle('flipped');
}

function copyCode(code,btn){
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='✓ Copied';
    btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 Copy code';btn.classList.remove('ok');},1800);
  }).catch(()=>{
    btn.textContent='Copy failed';
  });
}

load();
</script>
</body>
</html>
