<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reward Store — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{position:relative;font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid var(--ctrl-border);
    background:var(--ctrl-bg);color:var(--muted);text-decoration:none;transition:.15s}
  .nav-badge{position:absolute;top:-5px;right:-5px;background:#e53935;color:#fff;border-radius:999px;font-size:9px;font-family:'Oswald',sans-serif;font-weight:700;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none;line-height:1}
  .nav a:hover{border-color:rgba(39,227,255,.3);color:var(--cyan)}
  .nav a.on{border-color:rgba(39,227,255,.3);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  :root{--bg:#F2F2F7;--red:#FF3B30;--cyan:#007AFF;--gold:#FF9500;--purple:#7B00D4;--purple-glow:#B266FF;--muted:#6D6D72;--text:#000000;--line2:rgba(0,122,255,.2);
    --ctrl-bg:rgba(0,0,0,.04);--ctrl-border:rgba(0,0,0,.12);
    --card1:#ffffff;--card2:#F2F2F7;--card-border:rgba(0,0,0,.08);
    --card-text:#000000;--card-muted:#6D6D72;--chip-bg:#E5E5EA;
    --modal-bg:#ffffff;--modal-border:rgba(0,0,0,.12);
    --done-bg:#ECFDF5;--done-border:#BBF7D0;--done-text:#065F46}
  @media(prefers-color-scheme:dark){
    :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3);
      --ctrl-bg:rgba(255,255,255,.03);--ctrl-border:rgba(255,255,255,.12);
      --card1:#16202f;--card2:#0a0f18;--card-border:rgba(255,255,255,.08);
      --card-text:#eef2f8;--card-muted:#8a93a6;--chip-bg:rgba(0,0,0,.25);
      --modal-bg:#0e1622;--modal-border:rgba(255,255,255,.12);
      --done-bg:rgba(34,197,94,.12);--done-border:rgba(34,197,94,.45);--done-text:#86efac}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 50px;
    background:var(--bg);background-attachment:fixed}
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:18px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .upsell{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));
    border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:13px}
  .upsell b{color:var(--gold)}

  .bal{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
  .bal .b{background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:14px;padding:16px;text-align:center;color:var(--card-text)}
  .bal .b.main{border-color:var(--line2);box-shadow:0 0 22px rgba(0,122,255,.18)}
  .bal .v{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1;color:var(--card-text)}
  .bal .b.main .v{color:var(--cyan);text-shadow:0 0 16px rgba(0,122,255,.4)}
  .bal .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--card-muted);margin-top:6px}
  .hi{font-size:13px;color:var(--muted);margin:14px 2px 18px}
  .hi b{color:var(--text)}

  .sect{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--gold);margin:22px 2px 12px}
  .rewards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .card{position:relative;background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:16px;padding:0;display:flex;flex-direction:column;overflow:hidden;color:var(--card-text);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}
  .card:hover{transform:translateY(-3px);border-color:rgba(0,122,255,.35);box-shadow:0 14px 34px rgba(0,0,0,.15),0 0 22px rgba(0,122,255,.15)}
  .card .thumb{position:relative;width:100%;aspect-ratio:1/1;background:var(--card2) center/cover no-repeat;border-bottom:1px solid var(--card-border)}
  .card .thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(10,15,24,.55) 100%);pointer-events:none}
  .card .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .card h3{font-size:15px;font-weight:700;line-height:1.3}
  .card p{font-size:12.5px;color:var(--card-muted);flex:1;line-height:1.5}

  /* Badges */
  .badge{position:absolute;top:10px;left:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:5px 9px;border-radius:6px;backdrop-filter:blur(4px);z-index:2}
  .badge.hot{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}
  .badge.new{background:rgba(39,227,255,.18);color:var(--cyan);border:1px solid rgba(39,227,255,.5)}
  .badge.vip{background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.5)}
  .badge.bestseller{background:rgba(178,102,255,.2);color:#d5b8ff;border:1px solid rgba(178,102,255,.5)}
  .badge.limited{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}

  /* Stock pill */
  .stock-pill{position:absolute;top:10px;right:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:6px;background:rgba(10,15,24,.7);color:#ffb0bd;border:1px solid rgba(255,45,75,.45);backdrop-filter:blur(4px);z-index:2}

  /* Cost row with price anchor */
  .cost-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:2px}
  .cost{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:18px;letter-spacing:.04em}
  .price-anchor{font-size:11px;color:var(--card-muted);letter-spacing:.04em}
  .price-anchor s{color:var(--muted)}
  .price-anchor b{color:var(--cyan);font-weight:600}

  /* Progress bar — for rewards just out of reach */
  .progress{position:relative;width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:2px}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:99px;transition:width .4s ease}
  .progress-label{font-size:10.5px;color:var(--card-muted);margin-top:4px;display:flex;justify-content:space-between;gap:8px}
  .progress-label b{color:var(--gold)}

  .btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:600;
    padding:10px 14px;border-radius:9px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);cursor:pointer;transition:.15s;width:100%}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.2);box-shadow:0 0 14px rgba(39,227,255,.3)}
  .btn:disabled{opacity:.5;cursor:not-allowed;border-color:var(--card-border);background:var(--chip-bg);color:var(--card-muted)}
  .btn.primary{background:linear-gradient(135deg,rgba(244,196,65,.18),rgba(39,227,255,.18));border-color:rgba(244,196,65,.5);color:var(--gold)}
  .btn.primary:hover:not(:disabled){background:linear-gradient(135deg,rgba(244,196,65,.3),rgba(39,227,255,.25));box-shadow:0 0 18px rgba(244,196,65,.35)}
  /* ---- FREE / VIP seg control ---- */
  .store-seg{display:flex;background:rgba(0,0,0,.45);border-radius:8px;padding:3px;gap:3px}
  .seg-btn{border:none;border-radius:6px;padding:5px 16px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--muted);transition:.15s}
  .seg-btn.on-free{background:var(--ctrl-bg);color:var(--text);border:1px solid var(--ctrl-border)}
  .seg-btn.on-vip{background:rgba(122,58,237,.85);color:#fff;border:1px solid rgba(139,92,246,.6);box-shadow:0 0 10px rgba(122,58,237,.4)}

  /* ---- VIP overlay ---- */
  .vip-overlay{position:absolute;inset:0;background:rgba(7,7,15,.82);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:opacity .28s;z-index:5}
  .vip-overlay.off{opacity:0;pointer-events:none}
  .vov-icon{font-size:26px}
  .vov-title{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#a78bfa}
  .vov-hint{font-size:10.5px;color:var(--card-muted);text-align:center;max-width:130px;line-height:1.5}
  .vov-cta{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:7px 18px;border-radius:8px;border:1px solid rgba(139,92,246,.6);background:rgba(122,58,237,.25);color:#c4b5fd;cursor:pointer;margin-top:2px;transition:.15s}
  .vov-cta:hover{background:rgba(122,58,237,.5);box-shadow:0 0 12px rgba(122,58,237,.4)}
  /* Flip card (đã đổi) — gắn hiệu ứng lật bài vào chính ô quà */
  .flip-card{position:relative;perspective:1400px;border-radius:16px}
  .flip-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .85s cubic-bezier(.2,.9,.25,1)}
  .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{backface-visibility:hidden;-webkit-backface-visibility:hidden}
  .flip-face.flip-front{position:relative}
  .flip-face.flip-back{position:absolute;inset:0;transform:rotateY(180deg);display:flex;flex-direction:column;
    background:linear-gradient(165deg,#0e1622 0%,#1a0a2e 100%);border:1px solid rgba(244,196,65,.55);border-radius:16px;
    box-shadow:0 0 0 1px rgba(244,196,65,.18) inset,0 14px 40px rgba(0,0,0,.55),0 0 24px rgba(244,196,65,.25);
    padding:18px 16px;overflow:hidden}
  .flip-face.flip-back::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 25%,rgba(244,196,65,.22) 0%,transparent 60%);pointer-events:none}
  .done-badge{position:absolute;top:10px;right:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;padding:5px 9px;border-radius:6px;background:var(--done-bg);color:var(--done-text);border:1px solid var(--done-border);backdrop-filter:blur(4px);z-index:3}
  .price-anchor.done b{color:var(--done-text)}
  .fb-hdr{text-align:center;position:relative;z-index:1}
  .fb-tag{display:inline-block;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.2em;padding:4px 10px;border-radius:6px;background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.4)}
  .fb-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-top:8px;letter-spacing:.04em;line-height:1.25}
  .fb-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1;margin:12px 0;width:100%}
  .fb-code{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.14em;background:#0a0f18;border:1.5px dashed var(--gold);border-radius:10px;padding:12px 14px;text-align:center;width:100%;word-break:break-all;text-shadow:0 0 12px rgba(244,196,65,.5)}
  .fb-copy{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:1px solid rgba(244,196,65,.5);color:var(--gold);padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s}
  .fb-copy:hover{background:rgba(244,196,65,.15);box-shadow:0 0 10px rgba(244,196,65,.3)}
  .fb-copy.ok{background:rgba(110,231,160,.18);border-color:#6EE7A0;color:#6EE7A0}
  .fb-link{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:linear-gradient(135deg,rgba(178,102,255,.18),rgba(244,196,65,.12));border:1px solid rgba(178,102,255,.5);color:#fff;text-decoration:none;font-weight:600;font-size:12.5px;width:100%;box-sizing:border-box}
  .fb-link:hover{border-color:var(--gold);box-shadow:0 6px 16px rgba(178,102,255,.35)}
  .fb-link small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.55);margin-top:2px}
  .btn.done{background:var(--done-bg);border-color:var(--done-border);color:var(--done-text)}
  .btn.flip-back-btn{background:rgba(178,102,255,.12);border-color:rgba(178,102,255,.5);color:#d5b8ff;margin-top:auto}

  .hist{display:flex;flex-direction:column;gap:8px}
  .hrow{display:flex;justify-content:space-between;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    border-radius:10px;padding:10px 14px;font-size:13px;flex-wrap:wrap}
  .hrow .code{font-family:'Oswald',sans-serif;color:var(--cyan);letter-spacing:.05em}
  .hrow .dt{font-size:11px;color:var(--muted)}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}

  a.lb{display:inline-block;margin-top:6px;font-size:12px;color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(39,227,255,.4)}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--card-muted);
    background:var(--chip-bg);border:1px solid var(--card-border);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:var(--modal-bg);border:1px solid var(--line2);border-radius:12px;padding:14px 22px;color:var(--cyan);
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(39,227,255,.35);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

  .b{box-shadow:0 4px 14px rgba(22,28,44,.07)}
  .card{box-shadow:0 4px 14px rgba(22,28,44,.07)}
  .err{color:#9a2030}
  .badge.hot,.badge.limited{color:#9a2030}
  @media(prefers-color-scheme:dark){
    body{background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
    .b{box-shadow:none}
    .card{box-shadow:none}
    .err{color:#ffd0d8}
    .badge.hot,.badge.limited{color:#ffb0bd}
  }

  /* ---- Daily Deal strip ---- */
  .deal-strip{background:linear-gradient(135deg,rgba(255,45,75,.14),rgba(244,196,65,.14));border:1.5px solid rgba(255,45,75,.45);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .deal-strip .deal-icon{font-size:28px;flex-shrink:0}
  .deal-strip .deal-info{flex:1;min-width:160px}
  .deal-strip .deal-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;color:var(--text);letter-spacing:.04em}
  .deal-strip .deal-price{display:flex;align-items:baseline;gap:8px;margin-top:3px;flex-wrap:wrap}
  .deal-strip .deal-now{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--red);letter-spacing:.04em}
  .deal-strip .deal-was{font-size:12px;color:var(--card-muted)}
  .deal-strip .deal-was s{color:rgba(128,128,128,.6)}
  .deal-strip .deal-pct{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border-radius:5px;background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.45)}
  .deal-strip .deal-cd{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--gold);text-align:right;flex-shrink:0}
  .deal-strip .deal-cd small{display:block;font-size:10px;color:var(--card-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px}

  /* ---- Scarce / low-stock pulsing border ---- */
  @keyframes scarce-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,75,.5),0 14px 34px rgba(0,0,0,.5)}50%{box-shadow:0 0 0 3px rgba(255,45,75,.3),0 14px 34px rgba(0,0,0,.5)}}
  .card.scarce{border-color:rgba(255,45,75,.65)!important;animation:scarce-pulse 1.6s ease-in-out infinite}

  /* ---- VIP lock overlay ---- */
  .vip-locked-wrap{position:relative;border-radius:16px;overflow:hidden}
  .vip-lock-overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(10,15,24,.78);backdrop-filter:blur(3px);border-radius:16px;cursor:default}
  .vip-lock-overlay .lock-icon{font-size:32px}
  .vip-lock-overlay .lock-label{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .vip-lock-overlay .lock-sub{font-size:11px;color:var(--card-muted);text-align:center;max-width:160px;line-height:1.5}

  /* ---- Lucky Box ---- */
  @keyframes lb-shake{0%,100%{transform:rotate(0)}15%{transform:rotate(-7deg)}30%{transform:rotate(7deg)}45%{transform:rotate(-4deg)}60%{transform:rotate(4deg)}75%{transform:rotate(-2deg)}90%{transform:rotate(2deg)}}
  .lb-shake{animation:lb-shake .55s ease}
  .badge.lucky{background:rgba(178,102,255,.22);color:#d5b8ff;border:1px solid rgba(178,102,255,.55)}
  .card.lucky-card{border-color:rgba(178,102,255,.45);box-shadow:0 0 22px rgba(178,102,255,.18)}
  .card.lucky-card:hover{border-color:rgba(178,102,255,.75);box-shadow:0 14px 34px rgba(0,0,0,.55),0 0 28px rgba(178,102,255,.3)}
  .btn.lucky-btn{background:linear-gradient(135deg,rgba(178,102,255,.2),rgba(244,196,65,.15));border-color:rgba(178,102,255,.6);color:#d5b8ff}
  .btn.lucky-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(178,102,255,.35),rgba(244,196,65,.25));box-shadow:0 0 18px rgba(178,102,255,.4)}
  /* Chest popup */
  .chest-popup{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)}
  .chest-inner{background:var(--card1);border:1px solid rgba(39,227,255,.3);border-radius:20px;padding:32px 28px;max-width:320px;width:90%;text-align:center;animation:pop-in .35s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop-in{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  .chest-icon{font-size:60px;margin-bottom:8px;display:block;animation:chest-shake .6s ease .1s both}
  @keyframes chest-shake{0%{transform:rotate(0)}20%{transform:rotate(-10deg) scale(1.1)}40%{transform:rotate(10deg) scale(1.15)}60%{transform:rotate(-6deg) scale(1.1)}80%{transform:rotate(3deg)}100%{transform:rotate(0) scale(1)}}
  .chest-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--card-text);margin-bottom:16px}
</style>
</head>

<div class="wrap">
  <div class="nav" data-shared></div>
  <script src="/_nav.js"></script>
  <div class="top"><span class="s">♦</span> Reward <b>Store</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>


<script>
let DATA=null;
let storeTab='free';
function setStoreTab(tab){
  storeTab=tab;
  render();
}
const $=id=>document.getElementById(id);
function fmt(n){return Number(n||0).toLocaleString('en-US');}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}

/* Mọi request gửi kèm experienceId/companyId Whop truyền vào URL khi nhúng
   app trong iframe — backend dùng để biết đang phục vụ business nào. */
function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  if (exp) sessionStorage.setItem('whop_exp', exp); else exp = sessionStorage.getItem('whop_exp') || '';
  if (co)  sessionStorage.setItem('whop_co',  co);  else co  = sessionStorage.getItem('whop_co')  || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){
  return fetch(path + tenantQS(), opts);
}
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
window.LANG='en';
function t(en,vi){return window.LANG==='vi'?vi:en;}
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    if(j.lang) window.LANG=j.lang;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,

      '/daily.html': j.dailyEnabled, '/store.html': j.storeEnabled, '/mailbox.html': j.mailboxEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) { a.remove(); return; }
      const badge = href === '/daily.html' && j.dailyPending ? 1
                  : href === '/mailbox.html' && j.mailboxCount > 0 ? j.mailboxCount : 0;
      if (badge) { const b = document.createElement('span'); b.className = 'nav-badge'; b.textContent = badge > 99 ? '99+' : String(badge); a.appendChild(b); }
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

// ===== Whop sign-in =====
const WHOP_SIGNIN_URL = "https://whop.com/login";
function openWhopSignin(ev){
  if(ev){ try{ev.stopPropagation();ev.preventDefault();}catch(_){ } }
  if(window.__whopOpening) return false;
  window.__whopOpening = true;
  setTimeout(()=>{ window.__whopOpening = false; }, 1500);
  try{
    const features = "width=480,height=720,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes";
    const w = window.open(WHOP_SIGNIN_URL, "whop_signin", features);
    if(w){ try{ w.focus(); }catch(_){} return false; }
    const t = window.open(WHOP_SIGNIN_URL, "whop_signin");
    if(!t){ (window.top||window).location.href = WHOP_SIGNIN_URL; }
  }catch(_){
    try{ window.top.location.href = WHOP_SIGNIN_URL; }
    catch(__){ window.location.href = WHOP_SIGNIN_URL; }
  }
  return false;
}

// ===== Demo catalog — chỉ dùng khi mở ngoài Whop (chưa có session), GENERIC,
// không phải sản phẩm của business cụ thể nào (mỗi business tự thêm quà
// riêng của họ qua trang admin). =====
const DEMO_REWARDS=[
  {id:"demo_voucher",name:"Sample Voucher",cost:200,desc:"Example discount voucher — businesses add their real rewards via the admin page.",image:null,badge:"new",originalPrice:"$50",stock:null,tier:1,payload:{kind:"code",code:"DEMO123"}},
  {id:"demo_resource",name:"Sample Resource Pack",cost:500,desc:"Example resource redeemed via link — businesses add their real rewards via the admin page.",image:null,badge:"hot",originalPrice:"$150",stock:null,tier:2,payload:{kind:"link",url:"#",label:"Open resource"}},
  {id:"demo_coaching",name:"Sample 1-on-1 Slot",cost:1500,desc:"Example limited coaching slot — businesses add their real rewards via the admin page.",image:null,badge:"limited",originalPrice:"$300",stock:5,tier:5,payload:{kind:"link",url:"#",label:"Book a slot"}}
];

function useDemo(){
  DATA={
    username:"Guest",
    available:350,
    earned:350,
    spent:0,
    paidUsd:0,
    referrals:0,
    history:[],
    rewards:DEMO_REWARDS,
    tier:"paid",
    demo:true
  };
  render();
}

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>${t('Loading...','Đang tải...')}</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/me');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    DATA=j;render();
  }catch(e){
    // No Whop session → show DEMO version instead of an error block
    useDemo();
  }
}

const BADGE_LABEL={hot:'🔥 Hot',new:'⚡ New',vip:'👑 VIP',bestseller:'⭐ Bestseller',limited:'⏳ Limited'};

function render(){
  const d=DATA;
  const isVip = !!d.isVip;
  const dailyDeal = d.dailyDeal || null;
  const dealId = dailyDeal?.rewardId || null;
  const dealPct = dailyDeal?.discountPct || 0;
  $('powered-badge').style.display=(d.tier==='paid'&&d.branding?.logoUrl)?'none':'block';

  if(!d.rewards || d.rewards.length===0){
    $('content').innerHTML=`
      <div class="bal">
        <div class="b main"><div class="v" id="v-av">${fmt(d.available)}</div><div class="l">🪙 ${t('Available XU','XU khả dụng')}</div></div>
        <div class="b"><div class="v">${fmt(d.earned)}</div><div class="l">🪙 ${t('Total earned','Tổng đã kiếm')}</div></div>
        <div class="b"><div class="v">${fmt(d.spent)}</div><div class="l">Spent</div></div>
      </div>
      <div class="state">This community doesn't have any rewards in the store yet. Check back later!</div>
      <div style="text-align:center;margin-top:20px"><a class="lb" href="/index.html">← Back to leaderboard</a></div>`;
    return;
  }

  // sort: affordable first, then closest-to-affordable, then by tier desc
  const redeemedIds=new Set((d.history||[]).map(h=>h.rewardId).filter(Boolean));
  const allRewards = d.rewards || [];
  const sorted=[...allRewards].sort((a,b)=>{
    const aDone=redeemedIds.has(a.id), bDone=redeemedIds.has(b.id);
    if(aDone!==bDone) return aDone?1:-1;
    const aCan=d.available>=a.cost, bCan=d.available>=b.cost;
    if(aCan!==bCan) return aCan?-1:1;
    if(aCan) return (a.tier||0)-(b.tier||0);
    return a.cost-b.cost;
  });

  const rewards=sorted.map(rw=>{
    const done = redeemedIds.has(rw.id);
    const isLucky = rw.payload?.kind === 'lucky-box';
    const isDeal = rw.id === dealId && dealPct > 0;
    const effectiveCost = isDeal ? Math.max(1, Math.round(rw.cost * (1 - dealPct/100))) : rw.cost;
    const isVipLocked = !!(rw.vipOnly && !isVip && !done && !d.demo);
    const stockLeft = rw.stockRemaining;
    const soldOut = stockLeft !== null && stockLeft === 0;
    const scarce = stockLeft !== null && stockLeft > 0 && stockLeft < 3;
    const can = !soldOut && !isVipLocked && d.available >= effectiveCost;
    const gap = effectiveCost - d.available;
    const pct = Math.min(100, Math.round((d.available/effectiveCost)*100));

    const thumb = rw.image
      ? `<div class="thumb" style="background-image:url('${esc(rw.image)}')"></div>`
      : `<div class="thumb" style="background:linear-gradient(135deg,var(--card1),var(--card2))"></div>`;

    const badgeKey = isLucky ? 'lucky' : (rw.badge||'');
    const badgeText = badgeKey==='lucky' ? '🎲 Lucky Box' : (BADGE_LABEL[badgeKey]||'');
    const badgeHtml = badgeText ? `<span class="badge ${badgeKey}">${badgeText}</span>` : '';
    const stockHtml = (stockLeft !== null && !done)
      ? `<span class="stock-pill">${soldOut ? `❌ ${t('SOLD OUT','HẾT HÀNG')}` : `📦 ${stockLeft} ${t('left','còn lại')}`}</span>` : '';
    const doneBadge = done ? `<span class="done-badge">✅ ${t('Redeemed','Đã đổi')}</span>` : '';

    const progress = (!can && !done && !soldOut && !isVipLocked)
      ? `<div class="progress"><i style="width:${pct}%"></i></div>
         <div class="progress-label"><span>Need <b>${fmt(gap)} more XU</b></span><span>${pct}%</span></div>
         <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">💡 Check in daily or refer members to earn XU</div>`
      : '';

    let btnClass, btnLabel, btnDisabled, btnOnclick;
    if (d.demo) {
      btnClass = rw.tier>=4 ? 'btn primary' : 'btn';
      btnLabel = '🔐 Sign in to redeem';
      btnDisabled = false;
      btnOnclick = `openWhopSignin(event)`;
    } else if (isVipLocked) {
      if (storeTab === 'vip') {
        btnClass = 'btn'; btnLabel = 'JOIN VIP'; btnDisabled = false; btnOnclick = 'vipUpgradeCta()';
      } else {
        btnClass = 'btn'; btnLabel = 'BUY'; btnDisabled = true; btnOnclick = '';
      }
    } else if (soldOut) {
      btnClass = 'btn'; btnLabel = '❌ Sold Out'; btnDisabled = true; btnOnclick = '';
    } else if (done) {
      btnClass = 'btn done';
      btnLabel = isLucky ? '🎲 See your prize' : '🔄 Flip to view reward';
      btnDisabled = false;
      btnOnclick = `flipCard('${esc(rw.id)}',event)`;
    } else if (can) {
      if (isLucky) { btnClass='btn lucky-btn'; btnLabel=t('🎲 Shake & Reveal!','🎲 Lắc & Khám phá!'); btnOnclick=`luckyRedeem('${esc(rw.id)}',this)`; }
      else { btnClass=rw.tier>=4?'btn primary':'btn'; btnLabel=esc(rw.buttonLabel||t('BUY','MUA')); btnOnclick=`redeem('${esc(rw.id)}',this)`; }
      btnDisabled = false;
    } else {
      btnClass='btn'; btnLabel='Not enough XU'; btnDisabled=true; btnOnclick='';
    }

    const costHtml = done
      ? `<span class="cost" style="color:var(--done-text)">0 XU</span>
         <div class="price-anchor done"><s>${fmt(rw.cost)} XU</s> · <b>redeemed</b></div>`
      : isDeal && !soldOut
        ? `<span class="cost" style="color:var(--red)">${fmt(effectiveCost)} XU</span>
           <div class="price-anchor"><s>${fmt(rw.cost)} XU</s> · <b style="color:#ff8097">-${dealPct}% today!</b></div>`
        : `<span class="cost">${fmt(effectiveCost)} XU</span>`;

    const cardClass = `card${scarce?' scarce':''}${isLucky?' lucky-card':''}`;

    const vipOverlay = isVipLocked ? `
      <div class="vip-overlay${storeTab==='vip'?' off':''}" id="vov-${esc(rw.id)}">
        <div class="vov-icon">👑</div>
        <div class="vov-title">VIP Only</div>
        <div class="vov-hint">Purchase any paid plan to unlock this reward</div>
        <button class="vov-cta" onclick="vipUpgradeCta()">JOIN VIP</button>
      </div>` : '';

    const frontInner = `
      <div class="${cardClass} flip-face flip-front" id="card-${esc(rw.id)}">
        ${thumb}${badgeHtml}${stockHtml}${doneBadge}
        <div class="body">
          <h3>${esc(rw.name)}</h3>
          <p>${esc(rw.desc)}</p>
          <div class="cost-row">${costHtml}</div>
          ${progress}
          <button class="${btnClass}" ${btnDisabled?'disabled':''} onclick="${btnOnclick}">${btnLabel}</button>
        </div>
        ${vipOverlay}
      </div>`;

    if (!done) return frontInner;

    // ===== Back face =====
    // Dùng payload snapshot lưu lúc redeem (histEntry.payload) để tránh
    // việc admin sửa reward sau đó → member thấy nội dung mới thay vì thứ họ đã mua.
    const histEntry = (d.history||[]).find(h => h.rewardId === rw.id);
    const histPayload = histEntry?.payload
      || (histEntry?.code ? {kind:'code', code: histEntry.code} : null);
    // Rules:
    // xu-prize / lucky-box / code → luôn dùng snapshot (bảo vệ member, tránh rug-pull)
    // link / ea cùng type          → dùng config hiện tại (admin có thể update link/file)
    // link / ea đổi type           → dùng snapshot (tránh double-claim exploit)
    // Không có snapshot            → fallback config hiện tại (purchase cũ trước khi fix)
    let p;
    if (!histPayload) {
      p = rw.payload || {kind:'code', code:''};
    } else if (['xu-prize','lucky-box','code'].includes(histPayload.kind)) {
      p = histPayload;
    } else if (histPayload.kind === rw.payload?.kind) {
      p = rw.payload;
    } else {
      p = histPayload;
    }
    let backBody = '';
    if (p.kind === 'xu-prize') {
      backBody = `
        <div style="text-align:center;font-size:44px;margin:8px 0;filter:drop-shadow(0 0 16px rgba(178,102,255,.8))">🎉</div>
        <div class="fb-code" style="border-color:rgba(178,102,255,.7);text-shadow:0 0 12px rgba(178,102,255,.5)">${esc(p.label||'Prize Won!')}</div>
        <div style="font-size:11.5px;color:var(--card-muted);text-align:center;margin-top:4px">XU added to your balance ✅</div>`;
    } else if (p.kind === 'lucky-box') {
      const prizeLabel = histEntry?.reward || 'Prize Won!';
      backBody = `
        <div style="text-align:center;font-size:44px;margin:8px 0;filter:drop-shadow(0 0 16px rgba(178,102,255,.8))">🎉</div>
        <div class="fb-code" style="border-color:rgba(178,102,255,.7);text-shadow:0 0 12px rgba(178,102,255,.5)">${esc(prizeLabel)}</div>
        <div style="font-size:11.5px;color:var(--card-muted);text-align:center;margin-top:4px">XU added to your balance ✅</div>`;
    } else if (p.kind === 'ea') {
      backBody = `
        <a class="fb-link" href="${esc(p.ea)}" target="_blank" rel="noopener">
          <span style="font-size:18px">📥</span><span>Download file<small>${esc(p.label||'')}</small></span>
        </a>
        <a class="fb-link" href="${esc(p.setup)}" target="_blank" rel="noopener">
          <span style="font-size:18px">🛠</span><span>Setup guide<small>Install &amp; activate</small></span>
        </a>`;
    } else if (p.kind === 'link') {
      backBody = `<a class="fb-link" href="${esc(p.url)}" target="_blank" rel="noopener">
          <span style="font-size:18px">🔗</span><span>Open reward<small>${esc(p.label||'')}</small></span>
        </a>`;
    } else {
      const code = esc(p.code||'');
      backBody = `<div class="fb-code">${code}</div>
        <button class="fb-copy" onclick="event.stopPropagation();copyCode('${code}',this)">📋 Copy code</button>`;
    }
    const back = `
      <div class="flip-face flip-back">
        <div class="fb-hdr">
          <span class="fb-tag">${p.kind==='lucky-box'?`🎲 ${t('Lucky Prize','Giải ngẫu nhiên')}`:t('🎉 Redeemed','🎉 Đã đổi')}</span>
          <div class="fb-title">${esc(rw.name)}</div>
        </div>
        <div class="fb-body">${backBody}</div>
        <button class="btn flip-back-btn" onclick="flipCard('${esc(rw.id)}',event)">🔄 Flip back</button>
      </div>`;

    return `<div class="flip-card" id="fc-${esc(rw.id)}"><div class="flip-inner">${frontInner}${back}</div></div>`;
  }).join('');

  const demoBanner = d.demo ? `
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(244,196,65,.12),rgba(178,102,255,.12));border:1px solid rgba(244,196,65,.4);border-radius:12px;padding:12px 16px;margin:0 0 14px;font-size:13px;color:#fff">
      <span style="font-size:18px">👀</span>
      <span style="flex:1;min-width:200px">You're viewing a <b style="color:#f4c441">demo</b>. Sign in with Whop to earn real XU and redeem rewards.</span>
      <button onclick="openWhopSignin(event)" style="font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:12px;font-weight:700;padding:9px 16px;border-radius:9px;border:1px solid rgba(244,196,65,.6);background:linear-gradient(135deg,rgba(244,196,65,.25),rgba(178,102,255,.2));color:#fff;cursor:pointer">🔐 Sign in with Whop</button>
    </div>` : '';

  // Daily deal strip
  let dealStripHtml = '';
  if (dailyDeal && !d.demo) {
    const dr = d.rewards.find(r => r.id === dailyDeal.rewardId);
    if (dr) {
      const ep = dealPct > 0 ? Math.max(1, Math.round(dr.cost * (1 - dealPct/100))) : dr.cost;
      dealStripHtml = `
        <div class="deal-strip">
          <div class="deal-icon">🔥</div>
          <div class="deal-info">
            <div class="deal-name">Daily Deal — ${esc(dr.name)}</div>
            <div class="deal-price">
              <span class="deal-now">${fmt(ep)} XU</span>
              <span class="deal-was"><s>${fmt(dr.cost)} XU</s></span>
              <span class="deal-pct">-${dealPct}%</span>
            </div>
          </div>
          <div class="deal-cd">
            <small>Resets in</small>
            <span id="deal-timer">--:--:--</span>
          </div>
        </div>`;
    }
  }

  $('content').innerHTML=`
    ${demoBanner}
    <div class="bal">
      <div class="b main"><div class="v" id="v-av">${fmt(d.available)}</div><div class="l">🪙 ${t('Available XU','XU khả dụng')}</div></div>
      <div class="b"><div class="v">${fmt(d.earned)}</div><div class="l">🪙 ${t('Total earned','Tổng đã kiếm')}</div></div>
      <div class="b"><div class="v">${fmt(d.spent)}</div><div class="l">Spent</div></div>
    </div>
    <div class="hi">Hi <b>${esc(d.username)}</b> 👋 — you have <b>🪙 ${fmt(d.available)}</b> XU. (Spent ~$${fmt(d.paidUsd)}, ${fmt(d.referrals)} referrals)</div>
    ${dealStripHtml}
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <div class="store-seg">
        <button class="seg-btn${storeTab==='free'?' on-free':''}" id="seg-free" onclick="setStoreTab('free')">FREE</button>
        <button class="seg-btn${storeTab==='vip'?' on-vip':''}" id="seg-vip" onclick="setStoreTab('vip')">👑 VIP</button>
      </div>
    </div>
    <div class="rewards">${rewards}</div>
    <div style="text-align:center;margin-top:20px"><a class="lb" href="/index.html">← Back to leaderboard</a></div>`;

  startDealCountdown();
}


async function redeem(rewardId,btn){
  btn.disabled=true;btn.textContent='Processing...';
  try{
    const r=await tenantFetch('/.netlify/functions/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rewardId})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    await load();
    // After re-render: auto-flip the just-redeemed card to reveal the reward
    requestAnimationFrame(()=>{
      const el=document.getElementById('fc-'+rewardId);
      if(el){
        el.scrollIntoView({behavior:'smooth',block:'center'});
        setTimeout(()=>el.classList.add('flipped'),250);
      }
    });
  }catch(e){
    toast('⚠ '+t('Redeem failed: ','Đổi thưởng thất bại: ')+e.message);
    btn.disabled=false;btn.textContent=t('🎁 Redeem now','🎁 Đổi ngay');
  }
}

function flipCard(rewardId,ev){
  if(ev) ev.stopPropagation();
  const el=document.getElementById('fc-'+rewardId);
  if(el) el.classList.toggle('flipped');
}

function copyCode(code,btn){
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='✓ Copied';
    btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 Copy code';btn.classList.remove('ok');},1800);
  }).catch(()=>{
    btn.textContent='Copy failed';
  });
}

async function luckyRedeem(rewardId, btn) {
  // Shake the card first, then reveal
  const card = document.getElementById('card-'+rewardId);
  if (card) {
    card.classList.add('lb-shake');
    await new Promise(r => setTimeout(r, 580));
    card.classList.remove('lb-shake');
  }
  btn.disabled = true; btn.textContent = '🎲 Revealing...';
  try {
    const r = await tenantFetch('/.netlify/functions/redeem', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({rewardId})});
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || ('HTTP '+r.status));
    toast('🎉 ' + (j.reward || 'Prize revealed!'));
    await load();
    requestAnimationFrame(()=>{
      const el = document.getElementById('fc-'+rewardId);
      if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>el.classList.add('flipped'),250); }
    });
  } catch(e) {
    toast('⚠ Failed: '+e.message);
    if (btn) { btn.disabled = false; btn.textContent = '🎲 Shake & Reveal!'; }
  }
}


function vipUpgradeCta() {
  toast(t('👑 Buy any paid plan (>$1) to unlock VIP rewards and redeem with XU!','👑 Mua bất kỳ gói trả phí (>$1) để mở khóa phần thưởng VIP và đổi bằng XU!'));
}

function startDealCountdown() {
  const el = document.getElementById('deal-timer');
  if (!el) return;
  if (window._dealCdInterval) clearInterval(window._dealCdInterval);
  function tick() {
    const now = new Date();
    const midnight = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+1));
    const diff = midnight - now;
    if (diff <= 0) { if (el) el.textContent = '00:00:00'; return; }
    const h = String(Math.floor(diff/3600000)).padStart(2,'0');
    const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }
  tick();
  window._dealCdInterval = setInterval(tick, 1000);
}

load();
