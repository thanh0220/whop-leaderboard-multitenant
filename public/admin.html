 onclick="openEventModal(${idx})"><span class="grip grip-l" onmousedown="event.stopPropagation();startDragMove(event,${idx})" onclick="event.stopPropagation()" title="Drag to move">⠿</span>${rptTag}${evCardHtml(e,idx)}<span class="ex" onclick="event.stopPropagation();unscheduleEvent(${idx})" title="Remove from schedule">✕</span><span class="grip grip-r" onmousedown="event.stopPropagation();startDragResize(event,${idx})" onclick="event.stopPropagation()" title="Drag to change end date">⠿</span></div></div>`);    }    return bars;  }).join('');  const bars=scheduledBars||'<div class="ev-empty">Drag a card below onto a day to schedule it.</div>';  const chips=unscheduledIdx.map(idx=>{    const e=events[idx];    const rptHint=(e.repeatCount||0)>0?` <span style="font-size:10px;opacity:0.55">×${e.repeatCount} weekly</span>`:'';    return `<span class="chip quest" draggable="true" ondragstart="onChipDragStart(event,${idx})" onclick="openEventModal(${idx})">${evCardHtml(e,idx)}${rptHint}</span>`;  }).join('')||(events.length?'<span class="hint-small">All events are scheduled.</span>':'');  const limit=eventsLimit();  const addOrMsg=events.length<limit    ?`<button class="btn" onclick="STATE.events.push({id:'event_'+Date.now().toString(36),name:'Event '+(STATE.events.length+1),image:'',date:'',endDate:'',repeatCount:0,link:'',desc:''});refreshEvents()">+ Add event slot (${events.length}/${limit})</button>`    :`<p class="hint-small">${TIER_LEVEL>0?`Limit reached (${limit} slots).`:`Free plan limit (${limit} slots) — ⭐ upgrade to Starter or Pro for more.`}</p>`;  return `<div id="events-wrap">    <div class="sect" id="events">🗓 Events</div>    <div class="panel">      ${introBlock(        "A simple calendar members see, announcing your livestreams, AMAs, or any event coming up — it doesn't give out any reward by itself, it's just a notice board.",        ["Click + Add event slot below", "Click the card to open a popup — set name, description, image, and repeat count", "Drag the card onto the day it happens; left ⠿ to move, right ⠿ to stretch across days", "Set Repeat weekly to auto-show the event on multiple weeks", "Save all"]      )}      ${toggleRow(STATE.eventsEnabled,'STATE.eventsEnabled=this.checked;refreshEvents()','Enabled — the event calendar is visible to members.','Disabled — members see an empty event calendar.')}      <p class="hint-small" style="margin-bottom:10px">Click a card to edit it in a popup, or drag/resize it directly on the calendar.</p>      <div class="events-nav">        <button class="btn" onclick="eventsWeekOffset--;refreshEvents()">‹ Previous week</button>        <span class="lbl">${week[0].slice(8,10)}/${week[0].slice(5,7)} — ${week[6].slice(8,10)}/${week[6].slice(5,7)}</span>        <button class="btn" onclick="eventsWeekOffset++;refreshEvents()">Next week ›</button>      </div>      <div class="ev-calendar" ondragover="event.preventDefault()" ondrop="onEvCalendarDrop(event)">        <div class="ev-head-row">${headCells}</div>        ${bars}      </div>      <div class="unscheduled-tray">        <div class="prev-label" style="text-align:left">📥 Unscheduled (drag onto a day above)</div>        ${chips}      </div>      ${addOrMsg}    </div>  </div>`;}function refreshEvents(){ $('events-wrap').outerHTML = renderEvents(); }function clearRecurring(idx){  delete STATE.events[idx].recurringDays;  STATE.events[idx].date = '';  STATE.events[idx].endDate = '';  refreshEvents();}function startDragMove(e, idx){  e.preventDefault();  const track = e.currentTarget.closest('.ev-track');  const cellWidth = track.getBoundingClientRect().width/7;  const item = STATE.events[idx];  const origStart = item.date;  const origEnd = evEndDate(item);  const x0 = e.clientX;  function onUp(ev){    document.removeEventListener('mouseup', onUp);    const delta = Math.round((ev.clientX - x0)/cellWidth);    if(delta){      item.date = addDays(origStart, delta);      item.endDate = addDays(origEnd, delta);      refreshEvents();    }  }  document.addEventListener('mouseup', onUp);}// Kéo tay cầm phải: chỉ đổi ngày KẾT THÚC (giãn/co độ dài event), không cho

function buildSavePayload(){  const redeemCodes = {};  (STATE.redeemCodesList||[]).forEach(c=>{    const code = (c.code||'').trim().toLowerCase();    if (!code) return;    const entry = { xu: Number(c.xu)||0 };    if (c.title) entry.title = c.title;    if (c.image) entry.image = c.image;    if (c.startDate) entry.startDate = c.startDate;    if (c.endDate) entry.endDate = c.endDate;    if (c.repeatDays) entry.repeatDays = Number(c.repeatDays);    redeemCodes[code] = entry;  });  return {    seasonVipTopRewards: (STATE.seasonVipTopRewards||[]).map((r,i)=>({rank:(['🥇','🥈','🥉'][i]||'🏅')+' Top '+(i+1),prize:Number(r.xu).toLocaleString()+' XU',xu:Number(r.xu)||0})),    seasonRefTopRewards: (STATE.seasonRefTopRewards||[]).map((r,i)=>({rank:(['🥇','🥈','🥉'][i]||'🏅')+' Top '+(i+1),prize:Number(r.xu).toLocaleString()+' XU',xu:Number(r.xu)||0})),    checkinRewards: STATE.checkinRewards,    rewards: STATE.rewards,    redeemCodes,    codesEnabled: STATE.codesEnabled,    dailyEnabled: STATE.dailyEnabled,    storeEnabled: STATE.storeEnabled,    mailboxEnabled: STATE.mailboxEnabled,    chestRules: STATE.chestRules,    events: STATE.events,    eventsEnabled: STATE.eventsEnabled,    milestoneRules: STATE.milestoneRules,    branding: STATE.branding,    onboardingCompleted: STATE.onboardingCompleted,    dailyDeal: STATE.dailyDeal || null,    checkinMilestoneBonus: STATE.checkinMilestoneBonus || [],  };}async function saveConfig(){  const r = await tenantFetch('/.netlify/functions/admin-config', {    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(buildSavePayload())  });  const j = await r.json();  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));}async function saveAll(){  const btn = $('save-all');  btn.disabled = true; const old = btn.textContent; btn.textContent = 'Saving...';  try{    await saveConfig();    btn.textContent = '✅ Saved!';    setTimeout(load, 700);  }catch(e){    alert('⚠ Save failed: '+e.message);    btn.disabled = false; btn.textContent = old;  }}
