<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Whop Community App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070910;
        --cyan: #27e3ff;
        --gold: #f4c441;
        --silver: #cbd5e1;
        --bronze: #e1955a;
        --diamond: #9beaff;
        --red: #ff2d4b;
        --muted: #a3acc2;
        --text: #eef2f8;
        --line2: rgba(39, 227, 255, 0.3);
        --ctrl-bg: rgba(255, 255, 255, 0.03);
        --ctrl-border: rgba(255, 255, 255, 0.12);
        --card1: #16202f;
        --card2: #0a0f18;
        --card-border: rgba(255, 255, 255, 0.08);
        --card-text: #eef2f8;
        --card-muted: #8a93a6;
        --chip-bg: rgba(0, 0, 0, 0.25);
        --modal-bg: #0a0f18;
        --modal-border: rgba(255, 255, 255, 0.12);
      } /* Light mode: đổi đồng bộ nền trang + nền card/panel/input/modal + màu nhấn —     giữ đúng "mood" ánh xanh-than + màu nhấn neon của bản tối, chỉ giảm độ     sáng cho đủ tương phản trên nền sáng (xem index.html cho giải thích đầy đủ). */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #eef1f7;
          --muted: #5d6478;
          --text: #161c2c;
          --red: #e0123a;
          --cyan: #0098bb;
          --gold: #c9860a;
          --silver: #5d6b80;
          --bronze: #a85a1f;
          --diamond: #0090b0;
          --line2: rgba(0, 152, 187, 0.32);
          --ctrl-bg: rgba(22, 28, 44, 0.04);
          --ctrl-border: rgba(22, 28, 44, 0.14);
          --card1: #ffffff;
          --card2: #eef2f9;
          --card-border: rgba(22, 28, 44, 0.09);
          --card-text: #161c2c;
          --card-muted: #5d6478;
          --chip-bg: #e4e9f2;
          --modal-bg: #ffffff;
          --modal-border: rgba(22, 28, 44, 0.12);
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text);
        min-height: 100vh;
        padding: 30px 18px 100px;
        background:
          radial-gradient(
            120% 70% at 50% -10%,
            rgba(255, 45, 75, 0.13),
            var(--bg) 55%
          ),
          var(--bg);
        background-attachment: fixed;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        font-family: "Oswald", sans-serif;
        font-size: 20px;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      p.hint {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 18px;
      }
      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 22px;
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 10px 0;
        z-index: 10;
      }
      .nav a {
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--ctrl-border);
        background: var(--ctrl-bg);
        color: var(--muted);
        text-decoration: none;
      }
      .nav a:hover {
        border-color: var(--line2);
        color: var(--cyan);
      }
      .nav a.active {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(244, 196, 65, 0.12);
      }
      .tab-panel {
        animation: tabIn 0.25s ease;
      }
      @keyframes tabIn {
        from {
          opacity: 0;
          transform: translateX(14px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .sect {
        font-family: "Oswald", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 16px;
        color: var(--gold);
        margin: 26px 0 12px;
        scroll-margin-top: 60px;
      }
      .panel {
        background: linear-gradient(160deg, var(--card1), var(--card2));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 8px;
        color: var(--card-text);
      }
      label {
        display: block;
        font-size: 11.5px;
        letter-spacing: 0.04em;
        color: var(--gold);
        margin: 10px 0 4px;
        text-transform: uppercase;
        font-family: "Oswald", sans-serif;
      }
      label:first-of-type {
        margin-top: 0;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 9px 11px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--chip-bg);
        color: var(--card-text);
        font:
          500 13px "Be Vietnam Pro",
          sans-serif;
        outline: none;
      }
      textarea {
        min-height: 60px;
        resize: vertical;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--cyan);
      }
      .hint-small {
        font-size: 12px;
        color: var(--card-muted);
        margin-top: 3px;
        line-height: 1.5;
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        margin-top: 10px;
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid var(--line2);
        background: rgba(39, 227, 255, 0.12);
        color: var(--cyan);
        font:
          700 13px "Oswald",
          sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .btn:hover:not(:disabled) {
        background: rgba(39, 227, 255, 0.22);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.del {
        border-color: rgba(255, 45, 75, 0.4);
        background: rgba(255, 45, 75, 0.1);
        color: #ffb0bd;
      }
      .btn.big {
        width: 100%;
        margin-top: 18px;
        padding: 13px;
        font-size: 13px;
      }
      .item {
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: var(--chip-bg);
      }
      .chest-tier-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .chest-tier-row .chest-preview {
        width: 64px;
        height: 64px;
        flex: none;
        border-radius: 10px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0) 70%
        );
      }
      .chest-tier-row .tier-fields {
        flex: 1;
        min-width: 0;
      }
      .chest-tier-row .tier-fields label:first-of-type {
        margin-top: 0;
      }
      .row3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 560px) {
        .row3 {
          grid-template-columns: 1fr;
        }
      }
      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .item-head b {
        font-size: 13px;
      }
      details.item summary {
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        list-style: none;
      }
      details.item summary::-webkit-details-marker {
        display: none;
      }
      details.item summary::before {
        content: "▸ ";
        color: var(--cyan);
      }
      details.item[open] summary::before {
        content: "▾ ";
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        min-height: 1.2em;
      }
      .msg.ok {
        color: #7ee787;
      }
      .msg.err {
        color: #ff8896;
      }
      .state {
        text-align: center;
        padding: 40px 0;
        color: var(--muted);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 10px;
      }
      .status.on {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.4);
      }
      .status.off {
        background: rgba(255, 45, 75, 0.12);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.4);
      }
      .calgrid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .calgrid .cell {
        text-align: center;
      }
      .calgrid .cell label {
        margin: 0 0 2px;
        font-size: 9px;
      }
      .calgrid input {
        padding: 6px;
        text-align: center;
        font-size: 12px;
      }
      .calgrid .cell.milestone {
        background: linear-gradient(135deg,rgba(244,196,65,.12),rgba(244,196,65,.04));
        border: 1px solid rgba(244,196,65,.45);
        border-radius: 8px;
        cursor: pointer;
        transition: border-color .2s, box-shadow .2s;
        padding: 4px;
      }
      .calgrid .cell.milestone:hover {
        border-color: rgba(244,196,65,.85);
        box-shadow: 0 0 10px rgba(244,196,65,.3);
      }
      .calgrid .cell.milestone label {
        color: var(--gold);
        font-size: 8px;
      }
      .calgrid .cell.day30m {
        background: linear-gradient(135deg,rgba(244,196,65,.2),rgba(244,196,65,.08));
        border-color: rgba(244,196,65,.7);
      }
      @media (max-width: 560px) {
        .calgrid {
          grid-template-columns: repeat(5, 1fr);
        }
        .row2 {
          grid-template-columns: 1fr;
        }
      }
      .thumb {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        background: var(--card2);
        object-fit: cover;
        display: block;
        margin-bottom: 6px;
        border: 1px solid var(--card-border);
      }
      .save-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 18px;
        background: var(--modal-bg);
        border-top: 1px solid var(--card-border);
        display: flex;
        justify-content: center;
        gap: 10px;
        z-index: 20;
        backdrop-filter: blur(6px);
      }
      .save-bar .btn.big {
        margin: 0;
        max-width: 400px;
      }
      .checkout-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .checkout-modal {
        background: var(--modal-bg);
        border: 1px solid var(--modal-border);
        border-radius: 16px;
        padding: 18px;
        max-width: 460px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        position: relative;
        color: var(--card-text);
      }
      .checkout-modal .x {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        color: var(--card-muted);
        font-size: 18px;
      }
      .checkout-modal .x:hover {
        color: var(--card-text);
      }
      .pricing-card {
        max-width: 340px;
        margin: 0 auto;
        border-radius: 16px;
        padding: 22px;
        text-align: center;
        position: relative;
        background: linear-gradient(
          160deg,
          rgba(244, 196, 65, 0.1),
          rgba(39, 227, 255, 0.06)
        );
        border: 1px solid rgba(244, 196, 65, 0.4);
      }
      .pricing-card.is-active {
        border-color: rgba(34, 197, 94, 0.5);
        background: linear-gradient(
          160deg,
          rgba(34, 197, 94, 0.1),
          rgba(39, 227, 255, 0.06)
        );
      }
      .pricing-badge {
        display: inline-block;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 20px;
        background: var(--gold);
        color: #1a1200;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .pricing-card.is-active .pricing-badge {
        background: #34d37a;
        color: #06210f;
      }
      .pricing-name {
        font-family: "Oswald", sans-serif;
        font-size: 18px;
        letter-spacing: 0.04em;
        color: var(--card-text);
        margin-bottom: 4px;
      }
      .pricing-price {
        font-family: "Oswald", sans-serif;
        font-size: 38px;
        font-weight: 700;
        color: var(--gold);
        line-height: 1;
      }
      .pricing-price span {
        font-size: 14px;
        color: var(--card-muted);
        font-weight: 400;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .pricing-features {
        list-style: none;
        margin: 18px 0;
        padding: 0;
        text-align: left;
        display: inline-block;
      }
      .pricing-features li {
        font-size: 13px;
        color: var(--card-text);
        padding: 5px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pricing-features li::before {
        content: "✓";
        color: #34d37a;
        font-weight: 700;
      }
      .pricing-cta {
        width: 100%;
        margin-top: 6px;
        padding: 13px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font:
          700 13px "Oswald",
          sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold), #d39a11);
        color: #1a1200;
      }
      .pricing-cta:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .pricing-cta.is-active {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.4);
        cursor: default;
      } /* ===== Live preview (mirrors store.html / index.html / daily.html markup+CSS) ===== */
      .edit-row {
        display: grid;
        grid-template-columns: 1fr 200px;
        gap: 14px;
        align-items: start;
        margin-top: 10px;
      }
      @media (max-width: 680px) {
        .edit-row {
          grid-template-columns: 1fr;
        }
      }
      .prev-col {
        position: sticky;
        top: 70px;
      }
      .prev-label {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
        text-align: center;
        font-family: "Oswald", sans-serif;
      }
      .pv-card {
        position: relative;
        background: linear-gradient(160deg, var(--card1), var(--card2));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        color: var(--card-text);
      }
      .pv-card .thumb2 {
        position: relative;
        width: 100%;
        aspect-ratio: 1/1;
        background: var(--card2) center/cover no-repeat;
        border-bottom: 1px solid var(--card-border);
      }
      .pv-card .body2 {
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      .pv-card h3 {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .pv-card p {
        font-size: 12.5px;
        color: var(--card-muted);
        flex: 1;
        line-height: 1.5;
      }
      .pv-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 5px 9px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
        z-index: 2;
      }
      .pv-badge.hot {
        background: rgba(255, 45, 75, 0.18);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.5);
      }
      .pv-badge.new {
        background: rgba(39, 227, 255, 0.18);
        color: var(--cyan);
        border: 1px solid rgba(39, 227, 255, 0.5);
      }
      .pv-badge.vip {
        background: rgba(244, 196, 65, 0.18);
        color: var(--gold);
        border: 1px solid rgba(244, 196, 65, 0.5);
      }
      .pv-badge.bestseller {
        background: rgba(178, 102, 255, 0.2);
        color: #d5b8ff;
        border: 1px solid rgba(178, 102, 255, 0.5);
      }
      .pv-badge.limited {
        background: rgba(255, 45, 75, 0.18);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.5);
      }
      .pv-stock {
        position: absolute;
        top: 10px;
        right: 10px;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 9px;
        border-radius: 6px;
        background: rgba(10, 15, 24, 0.7);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.45);
        backdrop-filter: blur(4px);
        z-index: 2;
      }
      .pv-cost-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-top: 2px;
      }
      .pv-cost {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        color: var(--gold);
        font-size: 18px;
        letter-spacing: 0.04em;
      }
      .pv-price-anchor {
        font-size: 11px;
        color: var(--card-muted);
        letter-spacing: 0.04em;
      }
      .pv-price-anchor s {
        color: rgba(255, 255, 255, 0.55);
      }
      .pv-price-anchor b {
        color: var(--cyan);
        font-weight: 600;
      }
      .pv-btn {
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        font-weight: 600;
        padding: 10px;
        border-radius: 9px;
        border: 1px solid var(--line2);
        background: rgba(39, 227, 255, 0.1);
        color: var(--cyan);
        text-align: center;
        margin-top: 4px;
      }
      .pv-btn.primary {
        background: linear-gradient(
          135deg,
          rgba(244, 196, 65, 0.18),
          rgba(39, 227, 255, 0.18)
        );
        border-color: rgba(244, 196, 65, 0.5);
        color: var(--gold);
      }
      .pv-toggle {
        margin-top: 6px;
        font-size: 10px;
        padding: 6px 10px;
      }
      .pv-back {
        position: relative;
        display: flex;
        flex-direction: column;
        background: linear-gradient(165deg, #0e1622 0%, #1a0a2e 100%);
        border: 1px solid rgba(244, 196, 65, 0.55);
        border-radius: 16px;
        box-shadow: 0 0 0 1px rgba(244, 196, 65, 0.18) inset;
        padding: 18px 16px;
        overflow: hidden;
      }
      .pv-fb-hdr {
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .pv-fb-tag {
        display: inline-block;
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(244, 196, 65, 0.18);
        color: var(--gold);
        border: 1px solid rgba(244, 196, 65, 0.4);
      }
      .pv-fb-title {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #fff;
        margin-top: 8px;
        letter-spacing: 0.04em;
        line-height: 1.25;
      }
      .pv-fb-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        z-index: 1;
        margin: 12px 0;
        width: 100%;
      }
      .pv-fb-code {
        font-family: "Oswald", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.14em;
        background: #0a0f18;
        border: 1.5px dashed var(--gold);
        border-radius: 10px;
        padding: 12px 14px;
        text-align: center;
        width: 100%;
        word-break: break-all;
      }
      .pv-fb-copy {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: transparent;
        border: 1px solid rgba(244, 196, 65, 0.5);
        color: var(--gold);
        padding: 7px 14px;
        border-radius: 8px;
        width: 100%;
      }
      .pv-fb-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 13px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(178, 102, 255, 0.18),
          rgba(244, 196, 65, 0.12)
        );
        border: 1px solid rgba(178, 102, 255, 0.5);
        color: #fff;
        font-weight: 600;
        font-size: 12.5px;
        width: 100%;
        box-sizing: border-box;
      }
      .pv-fb-link small {
        display: block;
        font-size: 10px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 2px;
      }
      .pv-prize {
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 11px;
        padding: 11px 13px;
      }
      .pv-prize .pp {
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .pv-prize .pxu {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 20px;
        line-height: 1;
      }
      .pv-prize.r1 .pp,
      .pv-prize.r1 .pxu {
        color: var(--gold);
      }
      .pv-prize.r2 .pp,
      .pv-prize.r2 .pxu {
        color: var(--silver);
      }
      .pv-prize.r3 .pp,
      .pv-prize.r3 .pxu {
        color: var(--bronze);
      }
      .pv-prize.r4 .pp,
      .pv-prize.r4 .pxu,
      .pv-prize.r5 .pp,
      .pv-prize.r5 .pxu,
      .pv-prize.r6 .pp,
      .pv-prize.r6 .pxu {
        color: var(--diamond);
      }
      .pv-quest {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 11px;
      }
      .pv-quest .ic {
        font-size: 20px;
      }
      .pv-quest .info {
        flex: 1;
        min-width: 0;
      }
      .pv-quest .nm {
        font-size: 13px;
        font-weight: 600;
        color: var(--card-text);
        margin-bottom: 2px;
      }
      .pv-quest .rw {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        color: var(--gold);
        letter-spacing: 0.05em;
      }
      .pv-day {
        position: relative;
        aspect-ratio: 1;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--chip-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        margin-top: 4px;
      }
      .pv-day .n {
        font-size: 8px;
        color: var(--card-muted);
        letter-spacing: 0.04em;
      }
      .pv-day .r {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--card-text);
      } /* ===== #events — lịch kéo-thả ===== */
      .events-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        gap: 10px;
      }
      .events-nav .lbl {
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 0.06em;
        color: var(--card-muted);
        text-transform: uppercase;
      }
      .ev-calendar {
        min-height: 90px;
        position: relative;
      }
      .ev-head-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 10px;
        user-select: none;
      }
      .ev-head-cell {
        text-align: center;
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        letter-spacing: 0.05em;
        color: var(--card-muted);
        text-transform: uppercase;
        padding: 6px 2px;
        border-radius: 6px;
      }
      .ev-head-cell.today {
        color: var(--cyan);
        background: rgba(39, 227, 255, 0.08);
      }
      .ev-head-cell .dd {
        font-size: 12px;
        color: var(--card-text);
        font-weight: 700;
        margin-top: 2px;
      }
      .ev-track {
        position: relative;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 8px;
        min-height: 34px;
      }
      .evt-bar {
        position: relative;
        border-radius: 8px;
        padding: 7px 22px;
        font-size: 12.5px;
        font-weight: 600;
        display: flex;
        align-items: center;
        overflow: hidden;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }
      .evt-bar.quest {
        background: rgba(39, 227, 255, 0.18);
        border: 1px solid rgba(39, 227, 255, 0.5);
        color: var(--cyan);
      }
      .evt-bar.code {
        background: rgba(255, 45, 75, 0.18);
        border: 1px solid rgba(255, 45, 75, 0.5);
        color: #ffb0bd;
      }
      .evt-bar .grip {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 9px;
        cursor: grab;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.04);
      }
      .evt-bar .grip:hover {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
      }
      .evt-bar .grip:active {
        cursor: grabbing;
      }
      .evt-bar .grip-l {
        left: 0;
      }
      .evt-bar .grip-r {
        right: 0;
      }
      .evt-name-inline {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .evt-bar .ex {
        font-size: 10px;
        line-height: 1;
        opacity: 0.6;
        cursor: pointer;
        padding: 2px;
        flex-shrink: 0;
        margin-left: 4px;
      }
      .evt-bar .ex:hover {
        opacity: 1;
      }
      .event-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .event-modal {
        background: var(--modal-bg);
        border: 1px solid var(--modal-border);
        border-radius: 16px;
        padding: 18px;
        max-width: 460px;
        width: 100%;
        position: relative;
        color: var(--card-text);
      }
      .event-modal .x {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        color: var(--card-muted);
        font-size: 18px;
      }
      .event-modal .x:hover {
        color: var(--card-text);
      }
      .event-modal .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
        flex-wrap: wrap;
      }
      .event-modal .modal-actions .btn {
        margin-top: 0;
        flex: 1;
      }
      .event-modal .name-input {
        font-size: 17px;
        font-weight: 700;
        font-family: "Oswald", sans-serif;
        text-align: center;
        letter-spacing: 0.02em;
      }
      .event-modal .img-box {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 10px;
        overflow: hidden;
        background: var(--chip-bg);
        border: 1px dashed var(--card-border);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .event-modal .img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .event-modal .img-box .ph {
        color: var(--card-muted);
        font-size: 12px;
        text-align: center;
        padding: 10px;
        font-style: italic;
      }
      .event-modal .img-toggle {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .event-modal .img-toggle .btn {
        flex: 1;
        margin-top: 0;
        padding: 7px 8px;
        font-size: 11px;
      }
      .event-modal .img-toggle .btn.locked {
        opacity: 0.55;
      }
      .event-modal .img-toggle .btn.on {
        background: rgba(39, 227, 255, 0.3);
        border-color: var(--cyan);
      }
      .ev-empty {
        text-align: center;
        color: var(--card-muted);
        font-size: 12px;
        padding: 10px 0;
      }
      .unscheduled-tray {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12.5px;
        font-weight: 600;
        padding: 6px 11px;
        border-radius: 999px;
        margin: 0 6px 6px 0;
        cursor: grab;
        user-select: none;
        width: 160px;
      }
      .chip .evt-name-inline {
        width: auto;
      }
      .chip .ex {
        opacity: 0.7;
        cursor: pointer;
      }
      .flash {
        animation: flash-pulse 1.5s ease-out;
        border-radius: 12px;
      }
      @keyframes flash-pulse {
        0%,
        30% {
          box-shadow: 0 0 0 2px var(--cyan);
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
      }
      .chip.quest {
        background: rgba(39, 227, 255, 0.1);
        border: 1px solid rgba(39, 227, 255, 0.4);
        color: var(--cyan);
      }
      .chip.code {
        background: rgba(255, 45, 75, 0.1);
        border: 1px solid rgba(255, 45, 75, 0.4);
        color: #ffb0bd;
      }
      /* ===== Khối giới thiệu/hướng dẫn đầu mỗi tab + cảnh báo reward rỗng + mini preview ===== */
      .intro-card {
        background: rgba(39, 227, 255, 0.06);
        border: 1px solid rgba(39, 227, 255, 0.25);
        border-radius: 12px;
        padding: 13px 15px;
        margin-bottom: 14px;
      }
      .intro-what {
        font-size: 13px;
        color: var(--card-text);
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .intro-steps {
        margin: 0;
        padding-left: 20px;
        font-size: 12.5px;
        color: var(--card-muted);
        line-height: 1.8;
      }
      .intro-steps li {
        margin-bottom: 2px;
      }
      .reward-empty {
        background: rgba(255, 45, 75, 0.08);
        border: 1px solid rgba(255, 45, 75, 0.3);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
        margin-bottom: 12px;
      }
      .reward-empty p {
        font-size: 13px;
        color: #ffd0d8;
        margin-bottom: 8px;
        line-height: 1.5;
      }
      .step-head {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 18px 0 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 14px;
      }
      .spin-pct {
        font-size: 11px;
        color: var(--cyan);
        margin-top: 4px;
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.04em;
      }
      .mini-preview {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 10px;
        margin: 8px 0;
      }
      .mini-preview img {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--card2);
      }
      .mini-preview .ic {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--card2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .mini-preview .nm {
        font-size: 13px;
        font-weight: 600;
      }
      .mini-preview .sub {
        font-size: 10.5px;
        color: var(--card-muted);
        margin-top: 1px;
      }
      /* ===== Milestone Roadmap ===== */
      .ms-track { position:relative; padding-left:28px; margin-top:8px; }
      .ms-track::before { content:''; position:absolute; left:9px; top:0; bottom:0; width:2px; background:var(--card-border); border-radius:2px; }
      .ms-node { position:relative; margin-bottom:6px; }
      .ms-node::before { content:'●'; position:absolute; left:-22px; top:11px; color:var(--gold,#f5c518); font-size:16px; line-height:1; }
      .ms-card { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--chip-bg); border:1px solid var(--card-border); border-radius:10px; }
      .ms-thresh { font-size:14px; font-weight:700; color:var(--gold,#f5c518); white-space:nowrap; }
      .ms-sep { color:var(--card-border); }
      .ms-lbl { font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .ms-rew { font-size:12px; color:var(--card-muted); white-space:nowrap; }
      .ms-actions { display:flex; gap:4px; flex-shrink:0; }
      .ms-edit-panel { background:var(--card2,#1a1a2e); border:1px solid var(--card-border); border-top:none; border-radius:0 0 10px 10px; padding:12px; margin-top:-4px; margin-bottom:8px; }
      .ms-type-row { display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
      .ms-type-row label { display:flex; align-items:center; gap:5px; font-size:12px; text-transform:none; font-family:inherit; cursor:pointer; color:var(--card-text); }
      .ms-start { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--card-muted); margin-bottom:6px; padding-left:0; }
      .ms-start::before { content:'🏁'; font-size:16px; }

      .mini-preview.big img,
      .mini-preview.big .ic {
        width: 64px;
        height: 64px;
        font-size: 30px;
      } /* ===== Khối "Mức dùng hiện tại" (giới hạn bản Free) — tab Billing ===== */
      .usage-card {
        background: rgba(255, 45, 75, 0.06);
        border: 1px solid rgba(255, 45, 75, 0.25);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .usage-card h4 {
        font-family: "Oswald", sans-serif;
        font-size: 12.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ffb0bd;
        margin-bottom: 10px;
      }
      .usage-row {
        margin-bottom: 10px;
      }
      .usage-row .lbl {
        display: flex;
        justify-content: space-between;
        font-size: 12.5px;
        color: var(--card-text);
        margin-bottom: 4px;
      }
      .usage-row .lbl b {
        color: var(--gold);
      }
      .usage-bar {
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .usage-bar .fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cyan), var(--gold));
      }
      .usage-locked {
        list-style: none;
        margin: 10px 0 4px;
        padding: 0;
      }
      .usage-locked li {
        font-size: 12.5px;
        color: var(--card-muted);
        padding: 5px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .usage-locked li:first-child {
        border-top: none;
      }
      .usage-locked b {
        color: #ffb0bd;
      }
      .usage-check-btn {
        margin-top: 4px;
      }
      .usage-member-result {
        font-size: 12px;
        color: var(--cyan);
        margin-top: 6px;
      }
      @media (prefers-color-scheme: light) {
        .panel {
          box-shadow: 0 4px 14px rgba(22, 28, 44, 0.07);
        }
        .item {
          box-shadow: 0 2px 8px rgba(22, 28, 44, 0.05);
        }
        .err,
        .btn.del,
        .status.off,
        .pv-badge.hot,
        .pv-badge.limited,
        .evt-bar.code,
        .chip.code,
        .reward-empty p,
        .usage-card h4,
        .usage-locked b {
          color: #9a2030;
        }
      }
      /* ===== Pricing Grid ===== */
      .pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
      @media(max-width:640px){.pricing-grid{grid-template-columns:1fr}}
      .pricing-card2{border-radius:14px;padding:18px;text-align:center;position:relative;background:linear-gradient(160deg,rgba(244,196,65,0.07),rgba(39,227,255,0.04));border:1px solid rgba(244,196,65,0.3)}
      .pricing-card2.is-current{border-color:rgba(34,197,94,0.55);background:linear-gradient(160deg,rgba(34,197,94,0.1),rgba(39,227,255,0.05))}
      .pricing-card2 .pc-badge{display:inline-block;font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--gold);color:#1a1200;font-weight:700;margin-bottom:10px}
      .pricing-card2.is-current .pc-badge{background:#34d37a;color:#06210f}
      .pricing-card2 .pc-name{font-family:"Oswald",sans-serif;font-size:16px;color:var(--card-text);margin-bottom:4px}
      .pricing-card2 .pc-price{font-family:"Oswald",sans-serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1}
      .pricing-card2 .pc-price span{font-size:12px;color:var(--card-muted);font-weight:400;font-family:"Be Vietnam Pro",sans-serif}
      .pricing-card2 ul{list-style:none;margin:12px 0;padding:0;text-align:left}
      .pricing-card2 ul li{font-size:11.5px;color:var(--card-text);padding:3px 0;display:flex;align-items:center;gap:6px}
      .pricing-card2 ul li::before{content:"✓";color:#34d37a;font-weight:700}
      .pricing-card2 .pc-cta{width:100%;margin-top:8px;padding:11px;border-radius:8px;border:none;cursor:pointer;font:700 12px "Oswald",sans-serif;letter-spacing:0.06em;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),#d39a11);color:#1a1200}
      .pricing-card2 .pc-cta:disabled{opacity:0.55;cursor:not-allowed}
      .pricing-card2 .pc-cta.is-active{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.4);cursor:default}
      /* ===== Wizard Modal ===== */
      .wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
      .wizard-modal{background:var(--modal-bg);border:1px solid var(--modal-border);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow:auto;padding:28px;position:relative;color:var(--card-text)}
      .wizard-modal .wz-skip{position:absolute;top:14px;right:16px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline}
      .wizard-modal .wz-skip:hover{color:var(--card-text)}
      .wz-steps{display:flex;gap:6px;margin-bottom:22px}
      .wz-step-dot{flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,0.1)}
      .wz-step-dot.done{background:var(--gold)}
      .wz-step-dot.active{background:var(--cyan)}
      .wz-title{font-family:"Oswald",sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--gold);margin-bottom:8px}
      .wz-subtitle{font-size:13px;color:var(--card-muted);margin-bottom:20px;line-height:1.5}
      .wz-actions{display:flex;gap:8px;margin-top:20px}
      .wz-actions .btn{flex:1;margin-top:0}
      /* ---- Reward Card Editor (rce) ---- */
      .rce-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:20px}
      .rce{position:relative;background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;color:var(--card-text);transition:border-color .2s}
      .rce:hover{border-color:rgba(39,227,255,.22)}
      .rce-thumb{position:relative;width:100%;aspect-ratio:1/1;background:var(--card2) center/cover no-repeat;border-bottom:1px solid var(--card-border);display:flex;align-items:flex-end;justify-content:flex-end}
      .rce-thumb-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:11.5px;text-align:center;padding:12px;pointer-events:none;line-height:1.5}
      .rce-img-btn{margin:10px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
      .rce-img-btn:hover{background:rgba(0,0,0,.92)}
      .rce-img-row{padding:8px 14px 10px;display:none;background:rgba(0,0,0,.35);border-bottom:1px solid var(--card-border)}
      .rce-img-row.show{display:block}
      .rce-img-row label{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-family:"Oswald",sans-serif;display:block;margin-bottom:5px}
      .rce-img-row input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.18);color:var(--card-text);font-size:12px;padding:4px 2px;outline:none;font-family:inherit}
      .rce-img-row input:focus{border-bottom-color:var(--cyan)}
      .rce-body{padding:14px 16px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
      .rce-f{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--card-text);width:100%;outline:none;font-family:inherit;padding:3px 0;transition:border-color .15s;border-radius:0;box-sizing:border-box}
      .rce-f::placeholder{color:var(--muted);opacity:.55}
      .rce-f:hover,.rce-f:focus{border-bottom-color:rgba(255,255,255,.18)}
      .rce-f:focus{border-bottom-color:var(--cyan)}

// ===== Preview render (pure, no DOM access) — mirrors the exact markup of store.html/index.html/daily.html =====
const BADGE_LABEL={hot:'🔥 Hot',new:'⚡ New',vip:'👑 VIP',bestseller:'⭐ Bestseller',limited:'⏳ Limited'};function storeCardHtml(r){  const thumb=r.image?`<div class="thumb2" style="background-image:url('${esc(r.image)}')"></div>`:`<div class="thumb2" style="background:linear-gradient(135deg,var(--card1),var(--card2))"></div>`;  return `<div class="pv-card">    ${thumb}    <div class="body2">      <h3>${esc(r.name||'(Unnamed)')}</h3>      <p>${esc(r.desc||'')}</p>      <div class="pv-cost-row"><span class="pv-cost">${fmt(r.cost)} XU</span></div>      <div class="pv-btn ${(r.tier>=4)?'primary':''}">${esc(r.buttonLabel||'BUY')}</div>    </div>  </div>`;}function storeBackHtml(r){  const p=r.payload||{kind:'code',code:''};  let backBody='';  if(p.kind==='ea'){    backBody=`<div class="pv-fb-link"><span style="font-size:18px">📥</span><span>Download file<small>${esc(p.label||'')}</small></span></div>      <div class="pv-fb-link"><span style="font-size:18px">🛠</span><span>Setup guide<small>Install &amp; activate</small></span></div>`;  }else if(p.kind==='link'){    backBody=`<div class="pv-fb-link"><span style="font-size:18px">🔗</span><span>Open reward<small>${esc(p.label||'')}</small></span></div>`;  }else{    backBody=`<div class="pv-fb-code">${esc(p.code||'')}</div><div class="pv-fb-copy">📋 Copy code</div>`;  }  return `<div class="pv-back">    <div class="pv-fb-hdr"><span class="pv-fb-tag">🎉 Redeemed</span><div class="pv-fb-title">${esc(r.name||'')}</div></div>    <div class="pv-fb-body">${backBody}</div>  </div>`;}function seasonTileHtml(r,i){  return `<div class="pv-prize r${i+1}"><div class="pp">${esc(r.rank||'')}</div><div class="pxu">🪙 ${esc(r.prize||'')}</div></div>`;}function dayCellHtml(v,i){  return `<div class="pv-day"><div class="n">Day ${i+1}</div><div class="r">+${fmt(v)}</div></div>`;}function tenantQS(){  const u = new URL(location.href);  let exp = u.searchParams.get('experienceId') || '';  let co  = u.searchParams.get('companyId') || '';  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }  const p = new URLSearchParams();  if (exp) p.set('experienceId', exp);  if (co)  p.set('companyId', co);  const s = p.toString();  return s ? '?' + s : '';}function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }// STATE = toàn bộ config tenant đang chỉnh trong bộ nhớ. Input đơn giản

let STATE = null;let CONFIGURED = false;let IS_PAID = false;let TIER_LEVEL = 0;let activeTab = (location.hash||'#conn').slice(1);function setPath(obj, path, value){  const parts = path.split('.');  let cur = obj;  for (let i=0;i<parts.length-1;i++) cur = cur[parts[i]];  cur[parts[parts.length-1]] = value;}async function loadOnce(){  const r = await tenantFetch('/.netlify/functions/admin-config');  const j = await r.json();  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));  return j;}async function load(){  const maxTries = 6;  let lastErr = null;  for (let i = 0; i < maxTries; i++) {    try{      const j = await loadOnce();      CONFIGURED = j.configured;      IS_PAID = !!j.isPaid; TIER_LEVEL = j.tierLevel ?? 0;      STATE = {        whopCompanyId: j.whopCompanyId || '',        seasonVipTopRewards: j.seasonVipTopRewards || [],        seasonRefTopRewards: j.seasonRefTopRewards || [],        checkinRewards: j.checkinRewards || [],        rewards: j.rewards || [],        redeemCodesList: Object.entries(j.redeemCodes || {}).map(([code,v])=>          typeof v === 'number' ? {code,xu:v} : {code,xu:v.xu,title:v.title||'',image:v.image||'',startDate:v.startDate||'',endDate:v.endDate||'',repeatDays:v.repeatDays||''}),        codesEnabled: j.codesEnabled !== false,        dailyEnabled: j.dailyEnabled !== false,        storeEnabled: j.storeEnabled !== false,        mailboxEnabled: j.mailboxEnabled !== false,        chestRules: j.chestRules || {enabled:true,thresholds:[],rewardRange:{},buyerReward:{min:0,max:0},expiryHours:48},        events: normalizeEvents(j.events, [3,10,9999,9999][TIER_LEVEL]??3),        eventsEnabled: j.eventsEnabled !== false,        milestoneRules: j.milestoneRules || {enabled:false,tiers:[]},        branding: j.branding || {displayName:'',primaryColor:'#7c3aed',logoUrl:''},        onboardingCompleted: !!j.onboardingCompleted,        dailyDeal: j.dailyDeal || null,        checkinMilestoneBonus: j.checkinMilestoneBonus || [],      };      renderAll();      if(!STATE.onboardingCompleted&&STATE.branding?.displayName==='Your Community'&&(!STATE.rewards||STATE.rewards.length===0)) showWizard();      return;    }catch(e){      lastErr = e;      $('content').innerHTML = `<div class="state">Waiting for Whop authentication... (${i+1}/${maxTries})</div>`;      await new Promise(res=>setTimeout(res,1200));    }  }  $('content').innerHTML = `<div class="panel"><div class="msg err">⚠ ${lastErr.message}</div></div>`;}// ===== Referral helpers =====

D_STATE.displayName;goWizardStep(3)">Next →</button></div>`;  if(step===3) return `<div class="wz-title">⚙️ Features</div><div class="wz-subtitle">Turn on what you want — you can always change these later.</div>${[['📅 Daily Check-in (members earn XU every day)','wz-daily',WIZARD_STATE.dailyEnabled,'WIZARD_STATE.dailyEnabled=this.checked'],['🗓 Events Calendar','wz-events',WIZARD_STATE.eventsEnabled,'WIZARD_STATE.eventsEnabled=this.checked'],['🔑 Special Codes (secret codes for XU)','wz-codes',WIZARD_STATE.codesEnabled,'WIZARD_STATE.codesEnabled=this.checked'],['🎯 Referral Milestones','wz-miles',WIZARD_STATE.milestoneRules.enabled,'WIZARD_STATE.milestoneRules.enabled=this.checked']].map(([lbl,id,chk,onch])=>`<label style="display:flex;align-items:center;gap:10px;margin:10px 0;cursor:pointer;text-transform:none;font-family:inherit;font-size:13px;color:var(--card-text)"><input id="${id}" type="checkbox" style="width:auto" ${chk?'checked':''} onchange="${esc(onch)}"/>${esc(lbl)}</label>`).join('')}<div class="wz-actions"><button class="btn" style="margin-top:0" onclick="goWizardStep(2)">← Back</button><button class="btn" style="margin-top:0" onclick="goWizardStep(4)">Next →</button></div>`;  if(step===4) return `<div class="wz-title">🚀 Ready to launch!</div><div class="wz-subtitle">Review your choices and click Launch to save and go live.</div><ul style="font-size:13px;line-height:2.2;color:var(--card-text)"><li>🏷 Name: <b>${esc(WIZARD_STATE.displayName||'(not set)')}</b></li><li>📅 Daily check-in: <b>${WIZARD_STATE.dailyEnabled?'ON':'OFF'}</b></li><li>🗓 Events: <b>${WIZARD_STATE.eventsEnabled?'ON':'OFF'}</b></li><li>🔑 Codes: <b>${WIZARD_STATE.codesEnabled?'ON':'OFF'}</b></li><li>🎯 Referral milestones: <b>${WIZARD_STATE.milestoneRules.enabled?'ON':'OFF'}</b></li></ul><div id="wz-err" class="msg err" style="min-height:0"></div><div class="wz-actions"><button class="btn" style="margin-top:0" onclick="goWizardStep(3)">← Back</button><button class="btn" id="wz-launch" style="margin-top:0;background:linear-gradient(135deg,var(--gold),#d39a11);color:#1a1200;border-color:transparent" onclick="submitWizard()">🚀 Launch!</button></div>`;  return '';}function renderWizard(){  let wrap=$('wizard-overlay');  if(!wrap){wrap=document.createElement('div');wrap.className='wizard-overlay';wrap.id='wizard-overlay';document.body.appendChild(wrap);}  wrap.innerHTML=`<div class="wizard-modal"><span class="wz-skip" onclick="skipWizard()">Skip setup ×</span><div class="wz-steps">${wizardStepDots()}</div><div id="wizard-body">${wizardStepHtml(wizardStep)}</div></div>`;}async function submitWizard(){  const btn=$('wz-launch');const errEl=$('wz-err');  if(btn){btn.disabled=true;btn.textContent='Saving…';}  try{    const payload={branding:{displayName:WIZARD_STATE.displayName,primaryColor:WIZARD_STATE.primaryColor,logoUrl:STATE.branding?.logoUrl||''},dailyEnabled:WIZARD_STATE.dailyEnabled,eventsEnabled:WIZARD_STATE.eventsEnabled,codesEnabled:WIZARD_STATE.codesEnabled,milestoneRules:WIZARD_STATE.milestoneRules,onboardingCompleted:true};    const r=await tenantFetch('/.netlify/functions/admin-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});    const j=await r.json();    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));    STATE.onboardingCompleted=true;    closeWizard();    load();  }catch(e){    if(errEl) errEl.textContent='⚠ '+e.message;    if(btn){btn.disabled=false;btn.textContent='🚀 Launch!';}  }}const TAB_RENDERERS = {  conn: renderConn, billing: renderBilling,  season: renderSeason, daily: renderDaily, store: renderStore,  codes: renderCodes, events: renderEvents, chests: renderChests,  milestones: renderMilestones,};function toggleRow(checked, onchange, labelOn, labelOff){  return `<label class="hint-small" style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px">    <input type="checkbox" style="width:auto" ${checked?'checked':''} onchange="${esc(onchange)}"/>    <span>${checked ? '✅ '+labelOn : '⛔ '+labelOff}</span>  </label>`;}// Khối "cái này là gì + làm theo mấy bước" — đặt ngay đầu mỗi tab, viết bằng

function miniPreview(reward, big){  if (!reward) return '';  const visual = reward.image    ? `<img src="${esc(reward.image)}" alt=""/>`    : `<div class="ic">🎁</div>`;  return `<div class="mini-preview${big?' big':''}">${visual}    <div><div class="nm">${esc(reward.name||'(Unnamed)')}</div><div class="sub">👀 Members will see exactly this item</div></div>  </div>`;}function switchTab(id){  activeTab = id;  history.replaceState(null, '', '#'+id);  renderAll();}function applyNavActive(){  document.querySelectorAll('.nav a').forEach(a=>{    a.classList.toggle('active', a.getAttribute('href') === '#'+activeTab);  });}function renderAll(){  const fn = TAB_RENDERERS[activeTab] || renderConn;  $('content').innerHTML =    `<div class="tab-panel">${fn()}</div>` +    `<div class="save-bar"><button class="btn big" id="save-all">💾 Save all</button></div>`;  $('save-all').onclick = saveAll;  applyNavActive();  if (activeTab === 'chests') initChestPreviews();}// Rương 3D dùng làm preview tĩnh (không animate) cho mỗi tier — dispose canvas cũ

const chestPreviewRegistry = {};function initChestPreviews(){  Object.values(chestPreviewRegistry).forEach(c => { try{ c.dispose(); }catch(_){} });  for (const k in chestPreviewRegistry) delete chestPreviewRegistry[k];  document.querySelectorAll('.chest-preview[data-tier]').forEach(canvas => {    if (window.ChestVoxel) chestPreviewRegistry[canvas.id] = window.ChestVoxel.create(canvas, canvas.dataset.tier);  });}// ===== #conn =====
function renderConn(){  const statusHtml=CONFIGURED?`<span class="status on">✅ Connected — Company ID: ${esc(STATE.whopCompanyId)}</span>`:`<span class="status off">⚠ Not connected yet — close this and reopen the app inside Whop</span>`;  return `    <div class="sect" id="conn">🔌 Connect Whop</div>    <div class="panel">      ${introBlock("This app automatically connects to YOUR Whop community as soon as you open it from inside Whop — there is nothing for you to set up here.",["Just make sure you opened this Settings page from inside your own Whop dashboard (not a link someone else sent you)","The status below should say \"Connected\" — if it doesn't, close and reopen the app"])}      ${statusHtml}    </div>    </div>`;}// ===== #billing =====
// Khối "Mức dùng hiện tại" — chỉ hiện khi đang Free, cho admin thấy rõ đang
// chạm giới hạn nào. Event/Reward đếm thẳng từ STATE (miễn phí, không gọi

// tốn 30-70 API call thật tới Whop mỗi lần chạy), chỉ gọi khi admin chủ động
// bấm kiểm tra.
function usageBarRow(label,used,limit){  const pct=Math.min(100,(used/limit)*100);  return `<div class="usage-row"><div class="lbl"><span>${label}</span><b>${used}/${limit}</b></div><div class="usage-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;}function renderUsagePanel(){  if(TIER_LEVEL>0) return '';  const eventsUsed=(STATE.events||[]).length;  const rewardsUsed=(STATE.rewards||[]).length;  return `<div class="usage-card">    <h4>⚠ You're on the Free plan — here's what's limited right now</h4>    ${usageBarRow('🗓 Event slots',eventsUsed,3)}    ${usageBarRow('🎁 Reward Store items',rewardsUsed,2)}    <div class="usage-row">      <div class="lbl"><span>👥 Members shown on leaderboard</span><b>up to 50</b></div>      <button class="btn usage-check-btn" type="button" onclick="checkMemberCap(this)">🔄 Check how many of my real members are hidden</button>      <div class="usage-member-result" id="usage-member-result"></div>    </div>    <ul class="usage-locked">      <li>🔒 <b>Reward Store</b> — only 2 items visible, upgrade to show more</li>    </ul>  </div>`;}async function checkMemberCap(btn){  btn.disabled=true;const old=btn.textContent;btn.textContent='Checking…';  const out=$('usage-member-result');  try{    const r=await tenantFetch('/.netlify/functions/whop-data');const j=await r.json();    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));    const real=j.stats?.totalMembersReal??0;const shown=j.stats?.totalMembers??0;const hidden=Math.max(0,real-shown);    out.textContent=hidden>0?`You have ${real} real members — ${hidden} are currently hidden from the leaderboard.`:`You have ${real} real members — none are hidden yet.`;  }catch(e){out.textContent='⚠ '+e.message;}finally{btn.disabled=false;btn.textContent=old;}}

function renderBilling(){  const tierDefs=[    {id:'free',name:'Free',price:'$0',badge:'',isCurrent:TIER_LEVEL===0,features:['3 event slots','2 reward items','50 members on leaderboard','Daily check-in & streaks','Redeem codes','Reward store (2 items)'],ctaLabel:null},    {id:'growth',name:'Starter',price:'$9.99',badge:TIER_LEVEL===1?'Current Plan':'',isCurrent:TIER_LEVEL===1,features:['10 event slots','10 reward items','500 members on leaderboard','Daily check-in & streaks','Reward store + redeem codes','Custom logo & branding'],ctaLabel:TIER_LEVEL<1?'Upgrade to Starter':null},    {id:'pro',name:'Pro',price:'$29',badge:TIER_LEVEL===2?'Current Plan':'🔥 Best Value',isCurrent:TIER_LEVEL===2,features:['Unlimited events','Unlimited rewards','Unlimited members','Everything in Starter','Custom logo & branding','Priority support'],ctaLabel:TIER_LEVEL<2?'Upgrade to Pro':null},  ];  const cardsHtml=tierDefs.map(t=>{    const btnHtml=t.isCurrent?`<button class="pc-cta is-active" disabled>✅ Current plan</button>`:t.ctaLabel?`<button class="pc-cta" onclick="startUpgrade('${t.id}',this)">⭐ ${esc(t.ctaLabel)}</button>`:'';    return `<div class="pricing-card2 ${t.isCurrent?'is-current':''}">      ${t.badge?`<div class="pc-badge">${esc(t.badge)}</div><br>`:'<div style="height:24px"></div>'}      <div class="pc-name">${esc(t.name)}</div>      <div class="pc-price">${esc(t.price)}<span>/mo</span></div>      <ul>${t.features.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>      ${btnHtml}    </div>`;  }).join('');  return `    <div class="sect" id="billing">💎 Billing</div>    <div class="panel">      ${introBlock("This is YOUR subscription as the community owner — it upgrades what you can do in the admin panel (more events, more rewards, branding). Members' purchases are separate.",["Pick a plan that fits your community","Click Upgrade — you'll go to a secure Whop checkout","After payment the plan activates automatically"])}      ${renderUsagePanel()}      <div class="pricing-grid">${cardsHtml}</div>    </div>`;}async function startUpgrade(targetTier,btn){  if(btn){btn.disabled=true;btn.textContent='Loading…';}  try{    const r=await tenantFetch('/.netlify/functions/create-upgrade-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({targetTier:targetTier||'growth'})});    const j=await r.json();    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));    openCheckoutModal(j.sessionId,j.planId);  }catch(e){    alert('⚠ Could not start checkout: '+e.message);    if(btn){btn.disabled=false;btn.textContent='⭐ Upgrade';}  }}function openCheckoutModal(sessionId,planId){  const wrap=document.createElement('div');  wrap.className='checkout-overlay';wrap.id='checkout-overlay';  wrap.innerHTML=`<div class="checkout-modal"><span class="x" onclick="closeCheckoutModal()">✕</span><div data-whop-checkout-session="${esc(sessionId)}" data-whop-checkout-plan-id="${esc(planId)}" data-whop-checkout-return-url="${esc(location.origin+location.pathname)}"></div></div>`;  wrap.addEventListener('click',(e)=>{if(e.target===wrap)closeCheckoutModal();});  document.body.appendChild(wrap);}function closeCheckoutModal(){const el=$('checkout-overlay');if(el)el.remove();load();}// ===== #season =====
function szRankLabel(i){return(['🥇','🥈','🥉'][i]||'🏅')+' Top '+(i+1);}function szPoolHtml(key,title,icon,accentColor){  const items=STATE[key]||[];  const rows=items.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--chip-bg);border-radius:10px;margin-bottom:8px"><span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:${accentColor};min-width:72px;flex-shrink:0">${szRankLabel(i)}</span><input type="number" min="0" step="50" value="${Number(r.xu)||0}" style="width:90px;text-align:center;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);color:var(--card-text);padding:6px 8px" oninput="STATE['${key}'][${i}].xu=Number(this.value)||0"/><span style="font-size:13px;color:var(--card-muted);font-family:'Oswald',sans-serif;letter-spacing:.06em">XU</span><button onclick="STATE['${key}'].splice(${i},1);renderAll()" style="margin-left:auto;background:none;border:1px solid rgba(255,80,80,.4);color:#ff6b6b;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;flex-shrink:0">✕</button></div>`).join('');  return `<div style="font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:${accentColor};letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">${icon} ${title}</div>${rows||'<p class="hint-small">No ranks yet. Add one below.</p>'}<button class="btn" style="margin-top:4px" onclick="STATE['${key}'].push({rank:'',prize:'',xu:0});renderAll()">+ Add rank</button>`;}function renderSeason(){  return `<div class="sect" id="season">🏆 Season Prizes</div><div class="panel">${introBlock("Every month, top members automatically receive XU in their Mailbox — no action needed from you.",["Enter how many XU each rank wins","Top 1 earns the most, add as many ranks as you want","Click Save when done"])}<div style="margin-bottom:24px">${szPoolHtml('seasonVipTopRewards','VIP Members','👑','var(--gold)')}</div><hr style="border:none;border-top:1px solid rgba(255,255,255,.08);margin:0 0 24px"/><div>${szPoolHtml('seasonRefTopRewards','Referrals','🤝','var(--cyan)')}</div></div>`;}function toEmbedUrl(u){if(!u)return'';let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);if(m)return'https://www.youtube.com/embed/'+m[1];m=u.match(/vimeo\.com\/(\d+)/);if(m)return'https://player.vimeo.com/video/'+m[1];return u;}function msSwitchTab(tab){const t1=document.getElementById('ms-tab1-content');const t2=document.getElementById('ms-tab2-content');const b1=document.getElementById('ms-tab-btn1');const b2=document.getElementById('ms-tab-btn2');if(!t1||!t2)return;const isOne=tab===1;t1.style.display=isOne?'':'none';t2.style.display=isOne?'none':'';b1.style.color=isOne?'var(--gold)':'rgba(255,255,255,.4)';b1.style.borderBottom=isOne?'2px solid var(--gold)':'2px solid transparent';b2.style.color=isOne?'rgba(255,255,255,.4)':'var(--gold)';b2.style.borderBottom=isOne?'2px solid transparent':'2px solid var(--gold)';}function msBonusRefresh(){const sel=document.getElementById('ms-bonus-type');const wrap=document.getElementById('ms-bonus-url-wrap');const prev=document.getElementById('ms-bonus-prev');const urlInp=document.getElementById('ms-bonus-url');if(!sel)return;const type=sel.value;const url=urlInp?urlInp.value:'';if(wrap)wrap.style.display=type==='none'?'none':'';if(urlInp)urlInp.placeholder=type==='video'?'https://www.youtube.com/watch?v=...':'https://drive.google.com/file/d/...';if(!prev)return;if(type==='video'){const embed=toEmbedUrl(url);prev.innerHTML=embed?'<div style="position:relative;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#000"><iframe src="'+embed+'" style="position:absolute;inset:0;width:100%;height:100%;border:none" allowfullscreen></iframe></div>':'<div style="color:rgba(255,255,255,.35);font-size:12px;text-align:center;padding:20px 0">Nhập link YouTube hoặc Vimeo để xem preview</div>';}else if(type==='ebook'){if(!url){prev.innerHTML='<div style="color:rgba(255,255,255,.35);font-size:12px;text-align:center;padding:20px 0">Nhập link Google Drive để xem preview</div>';return;}const idM=url.match(/\/file\/d\/([^/?#]+)/);const thumb=idM?'<img src="https://drive.google.com/thumbnail?id='+idM[1]+'&sz=w400" style="max-width:100%;border-radius:8px;margin-bottom:10px;display:block" onerror="this.style.display=\'none\'">':'';prev.innerHTML='<div style="text-align:center">'+thumb+'<a href="'+url+'" target="_blank" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),#d39a11);color:#1a1200;padding:10px 20px;border-radius:8px;font-family:\'Oswald\',sans-serif;font-weight:700;font-size:14px;text-decoration:none;letter-spacing:.06em">📥 Download Free Ebook</a></div>';}else{prev.innerHTML='';}}function showMilestoneEdit(i){const day=i+1;const v=(STATE.checkinRewards||[])[i]||0;const isDay30=day===30;const title=isDay30?'🏆 Day 30 — Grand Finale':`⭐ Day ${day} — Milestone`;const bonus=(STATE.checkinMilestoneBonus||[])[i]||{type:'none',url:''};function ranges(base){const lo=Math.max(1,Math.round(base*.8)),hi=Math.max(1,Math.round(base*1.2));const m1=Math.max(1,Math.round(base*1.5)),m2=Math.max(1,Math.round(base*2.5));const h1=Math.max(1,Math.round(base*3)),h2=Math.max(1,Math.round(base*5));return {c1:`${lo}–${hi}`,c2:`${m1}–${m2}`,c3:`${h1}–${h2}`};}const r=ranges(v);const cardStyle='width:100px;height:148px;background:linear-gradient(150deg,#0e0028,#1e0050);border:1.5px solid #7c3aed;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;flex-shrink:0';const cards=[[r.c1,'Card 1'],[r.c2,'Card 2'],[r.c3,'Card 3']].map(([rng,lbl])=>`<div style="${cardStyle}"><div style="position:absolute;inset:0;background:linear-gradient(120deg,transparent 0%,rgba(124,58,237,.25) 50%,transparent 100%)"></div><div style="font-size:46px;font-weight:700;color:#fff;text-shadow:0 0 20px #7c3aed;line-height:1">?</div><div style="font-size:9px;color:rgba(255,255,255,.5);font-family:'Oswald',sans-serif;letter-spacing:.06em;text-align:center;padding:0 6px">${rng} XU</div></div>`).join('');const ov=document.createElement('div');ov.id='ms-edit-ov';ov.style.cssText='position:fixed;inset:0;z-index:1200;display:flex;align-items:center;justify-content:center;background:rgba(4,0,16,.93);backdrop-filter:blur(10px)';ov.onclick=e=>{if(e.target===ov)ov.remove();};const btnBase="flex:1;padding:10px 4px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;transition:color .2s,border-color .2s";const bonus2Sub=bonus.type==='video'?'Video đặc biệt':bonus.type==='ebook'?'Free Ebook':'Chưa cấu hình';const bUrlVis=bonus.type==='none'?'display:none;':'';ov.innerHTML=`<div style="background:linear-gradient(150deg,#0e0028,#1a0040);border:1px solid rgba(124,58,237,.6);border-radius:18px;padding:28px;max-width:460px;width:92%;text-align:center"><div style="font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.08em;margin-bottom:16px">${title}</div><div style="display:flex;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:20px"><button id="ms-tab-btn1" style="${btnBase};color:var(--gold);border-bottom:2px solid var(--gold)" onclick="msSwitchTab(1)">🎴 Lựa chọn 1<div style="font-size:9px;font-weight:400;margin-top:2px;opacity:.7">Thẻ bí ẩn XU</div></button><button id="ms-tab-btn2" style="${btnBase};color:rgba(255,255,255,.4)" onclick="msSwitchTab(2)">🎁 Lựa chọn 2<div style="font-size:9px;font-weight:400;margin-top:2px;opacity:.7">${bonus2Sub}</div></button></div><div id="ms-tab1-content"><div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:20px">Members choose 1 of 3 mystery cards — each hides a different XU prize</div><div id="ms-cards" style="display:flex;gap:10px;justify-content:center;margin-bottom:22px">${cards}</div><div style="background:rgba(255,255,255,.05);border-radius:10px;padding:14px 18px;margin-bottom:18px;text-align:left"><label style="font-size:10px;letter-spacing:.07em;color:var(--gold);margin-bottom:8px;display:block">BASE XU REWARD (Day ${day})</label><div style="display:flex;align-items:center;gap:10px"><input id="ms-xu-inp" type="number" min="0" value="${v}" style="flex:1;font-size:22px;font-weight:700;text-align:center;font-family:'Oswald',sans-serif;background:rgba(0,0,0,.4);border:1px solid rgba(124,58,237,.4);border-radius:8px;color:var(--gold);padding:8px;outline:none" oninput="updateMilestonePreview(${i})"/><span style="font-family:'Oswald',sans-serif;font-size:13px;color:rgba(255,255,255,.4)">XU</span></div><div id="ms-range-lbl" style="font-size:11px;color:rgba(255,255,255,.35);margin-top:8px;line-height:1.9">Card 1: ${r.c1} XU &nbsp;|&nbsp; Card 2: ${r.c2} XU &nbsp;|&nbsp; Card 3: ${r.c3} XU</div></div></div><div id="ms-tab2-content" style="display:none;text-align:left"><div style="font-size:12px;color:rgba(255,255,255,.45);margin-bottom:16px;text-align:center">Thêm nội dung giá trị cao — member thấy khi chọn lựa chọn này</div><div style="background:rgba(255,255,255,.05);border-radius:10px;padding:14px 18px;margin-bottom:12px"><label style="font-size:10px;letter-spacing:.07em;color:var(--gold);margin-bottom:10px;display:block">LOẠI NỘI DUNG</label><select id="ms-bonus-type" onchange="msBonusRefresh()" style="width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(124,58,237,.4);border-radius:8px;color:var(--card-text);padding:8px 10px;font-size:14px;outline:none;cursor:pointer"><option value="none" ${bonus.type==='none'?'selected':''}>Không có (chỉ thẻ XU)</option><option value="video" ${bonus.type==='video'?'selected':''}>📹 Video (YouTube / Vimeo)</option><option value="ebook" ${bonus.type==='ebook'?'selected':''}>📥 Free Ebook (Google Drive)</option></select></div><div id="ms-bonus-url-wrap" style="${bUrlVis}background:rgba(255,2 function eventsLimit(){ return [3,10,9999,9999][TIER_LEVEL]??3; }function eventRepeatLimit(){ return [5,20,9999,9999][TIER_LEVEL]??5; }function normalizeEvents(raw, limit){  const today=new Date().toISOString().slice(0,10);  const list=Array.isArray(raw)?raw:[];  return list.slice(0,limit).map((e,i)=>{    const date=e.date||e.startDate||'';    const endDate=e.endDate||date;    const expired=date&&endDate<today;    return {      id:e.id||('event_'+(i+1)),      name:e.name||('Event '+(i+1)),      image:e.image||'',      date:expired?'':date,      endDate:expired?'':endDate,      repeatCount:Math.max(0,Number(e.repeatCount)||0),      link:e.link||'',      desc:e.desc||'',    };  });}function evEndDate(e){ return e.endDate || e.date; }// Cột hiển thị trong lịch tuần đang xem, CLIP theo tuần nếu event dài hơn/lệch

function weekOverlapCols(e, week){  const start = e.date, end = evEndDate(e);  if(!start) return null;  const weekStart = week[0], weekEnd = week[6];  if(end < weekStart || start > weekEnd) return null;  const clipStart = start < weekStart ? weekStart : start;  const clipEnd = end > weekEnd ? weekEnd : end;  return { startCol: week.indexOf(clipStart), endCol: week.indexOf(clipEnd) };}function evWeekDates(offset){  const todayKey = new Date().toISOString().slice(0,10);  const t = new Date(todayKey+'T00:00:00Z');  const start = new Date(t); start.setUTCDate(t.getUTCDate() - t.getUTCDay() + offset*7);  const days = [];  for(let i=0;i<7;i++){ const d=new Date(start); d.setUTCDate(start.getUTCDate()+i); days.push(d.toISOString().slice(0,10)); }  return days;}function addDays(dateKey, n){  const d = new Date(dateKey+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+n);  return d.toISOString().slice(0,10);}function evCardHtml(e, idx){  return `    <span class="evt-name-inline">${esc(e.name)}</span>    <span class="ex" onclick="event.stopPropagation();deleteEventSlot(${idx})" title="Delete this event slot">🗑</span>  `;}function deleteEventSlot(idx){  if(!confirm('Delete this event?')) return;  STATE.events.splice(idx,1);  closeEventModal();  refreshEvents();}let eventImageTab = 'link';function eventImgBoxHtml(e){  return e.image    ? `<div class="img-box"><img src="${esc(e.image)}"/></div>`    : `<div class="img-box"><span class="ph">Suggested size: landscape, ~600×300px</span></div>`;}function normalizeImgUrl(url){  url=(url||'').trim();  let m=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1000`;  m=url.match(/drive\.google\.com\/.*[?&]id=([a-zA-Z0-9_-]+)/);  if(m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1000`;  return url;}function updateEventImgBox(idx){  const box = $('ev-img-box-'+idx);  if (box) box.innerHTML = eventImgBoxHtml(STATE.events[idx]);}function eventModalBodyHtml(idx){  const e = STATE.events[idx];  const uploadLocked = !IS_PAID;  const imgControl = (eventImageTab === 'upload' && IS_PAID)    ? `<input type="file" accept="image/*" onchange="onEventImageFileChange(event,${idx})"/>`    : `<input type="text" placeholder="Paste Google Drive or any image link..." value="${esc(e.image||'')}" oninput="STATE.events[${idx}].image=normalizeImgUrl(this.value);updateEventImgBox(${idx})"/>`;  const maxRpt=eventRepeatLimit();  const maxRptDisplay=maxRpt>=9999?'∞ unlimited':`max ${maxRpt}`;  const maxRptAttr=maxRpt>=9999?9999:maxRpt;  return `    <span class="x" onclick="closeEventModal()">✕</span>    <div class="sect" style="margin-top:0">Edit event</div>    <label>Name</label>    <input type="text" class="name-input" value="${esc(e.name)}" oninput="STATE.events[${idx}].name=this.value"/>    <label>Event link <span style="font-size:10px;font-weight:400;color:#888">(Zoom, Meet, livestream…)</span></label>    <input type="url" placeholder="https://zoom.us/j/..." value="${esc(e.link||'')}" oninput="STATE.events[${idx}].link=this.value.trim()"/>    <label>Repeat weekly <span style="font-size:10px;font-weight:400;color:#888">(${maxRptDisplay})</span></label>    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">      <input type="number" min="0" max="${maxRptAttr}" value="${e.repeatCount||0}" style="width:80px" oninput="STATE.events[${idx}].repeatCount=Math.min(${maxRptAttr},Math.max(0,Number(this.value)||0))"/>      <span class="hint-small">times after first date</span>    </div>    <label>Description</label>    <textarea oninput="STATE.events[${idx}].desc=this.value">${esc(e.desc||'')}</textarea>    <label>Image (optional)</label>    <div id="ev-img-box-${idx}">${eventImgBoxHtml(e)}</div>    <div class="img-toggle">      <button class="btn ${eventImageTab==='link'?'on':''}" onclick="switchEventImageTab(${idx},'link')">🔗 Paste link</button>      <button class="btn ${eventImageTab==='upload'?'on':''} ${uploadLocked?'locked':''}" onclick="switchEventImageTab(${idx},'upload')">${uploadLocked?'🔒':'⬆'} Upload from device</button>    </div>    <div id="ev-img-control-${idx}">${imgControl}</div>    <div class="modal-actions">      <button class="btn del" onclick="deleteEventSlot(${idx})">🗑 Delete event</button>      <button class="btn" onclick="closeEventModal();refreshEvents()">✅ Done</button>    </div>`;}function toggleEventDow(idx,dow){  const item=STATE.events[idx];  const days=[...(item.recurringDays||[])];  const i=days.indexOf(dow);  if(i>=0) days.splice(i,1); else days.push(dow);  item.recurringDays=days.length?days:[];  item.date=''; item.endDate='';  const modal=document.querySelector('#event-modal-overlay .event-modal');  if(modal) modal.innerHTML=eventModalBodyHtml(idx);}function openEventModal(idx){  eventImageTab = 'link';  const wrap = document.createElement('div');  wrap.className = 'event-modal-overlay';  wrap.id = 'event-modal-overlay';  wrap.innerHTML = `<div class="event-modal">${eventModalBodyHtml(idx)}</div>`;  wrap.addEventListener('click', (ev) => { if (ev.target === wrap) { closeEventModal(); refreshEvents(); } });  document.body.appendChild(wrap);}function closeEventModal(){  const el = $('event-modal-overlay');  if (el) el.remove();}function switchEventImageTab(idx, tab){  if (tab === 'upload' && !IS_PAID){    closeEventModal();    switchTab('billing');    return;  }  eventImageTab = tab;  const modal = document.querySelector('#event-modal-overlay .event-modal');  if (modal) modal.innerHTML = eventModalBodyHtml(idx);}function onEventDateChange(idx, field, value){  const item = STATE.events[idx];  item[field] = value;  if (field === 'date' && evEndDate(item) < value) item.endDate = value;  if (field === 'endDate' && value < item.date) item.date = value;}function onEventImageFileChange(ev, idx){  const file = ev.target.files && ev.target.files[0];  if (!file) return;  if (!file.type.startsWith('image/')) { alert('Please select an image file.'); return; }  const reader =
