<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Whop Community App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070910;
        --cyan: #27e3ff;
        --gold: #f4c441;
        --silver: #cbd5e1;
        --bronze: #e1955a;
        --diamond: #9beaff;
        --red: #ff2d4b;
        --muted: #a3acc2;
        --text: #eef2f8;
        --line2: rgba(39, 227, 255, 0.3);
        --ctrl-bg: rgba(255, 255, 255, 0.03);
        --ctrl-border: rgba(255, 255, 255, 0.12);
        --card1: #16202f;
        --card2: #0a0f18;
        --card-border: rgba(255, 255, 255, 0.08);
        --card-text: #eef2f8;
        --card-muted: #8a93a6;
        --chip-bg: rgba(0, 0, 0, 0.25);
        --modal-bg: #0a0f18;
        --modal-border: rgba(255, 255, 255, 0.12);
      } /* Light mode: đổi đồng bộ nền trang + nền card/panel/input/modal + màu nhấn —     giữ đúng "mood" ánh xanh-than + màu nhấn neon của bản tối, chỉ giảm độ     sáng cho đủ tương phản trên nền sáng (xem index.html cho giải thích đầy đủ). */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #eef1f7;
          --muted: #5d6478;
          --text: #161c2c;
          --red: #e0123a;
          --cyan: #0098bb;
          --gold: #c9860a;
          --silver: #5d6b80;
          --bronze: #a85a1f;
          --diamond: #0090b0;
          --line2: rgba(0, 152, 187, 0.32);
          --ctrl-bg: rgba(22, 28, 44, 0.04);
          --ctrl-border: rgba(22, 28, 44, 0.14);
          --card1: #ffffff;
          --card2: #eef2f9;
          --card-border: rgba(22, 28, 44, 0.09);
          --card-text: #161c2c;
          --card-muted: #5d6478;
          --chip-bg: #e4e9f2;
          --modal-bg: #ffffff;
          --modal-border: rgba(22, 28, 44, 0.12);
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--text);
        min-height: 100vh;
        padding: 30px 18px 100px;
        background:
          radial-gradient(
            120% 70% at 50% -10%,
            rgba(255, 45, 75, 0.13),
            var(--bg) 55%
          ),
          var(--bg);
        background-attachment: fixed;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        font-family: "Oswald", sans-serif;
        font-size: 20px;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      p.hint {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 18px;
      }
      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 22px;
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 10px 0;
        z-index: 10;
      }
      .nav a {
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--ctrl-border);
        background: var(--ctrl-bg);
        color: var(--muted);
        text-decoration: none;
      }
      .nav a:hover {
        border-color: var(--line2);
        color: var(--cyan);
      }
      .nav a.active {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(244, 196, 65, 0.12);
      }
      .tab-panel {
        animation: tabIn 0.25s ease;
      }
      @keyframes tabIn {
        from {
          opacity: 0;
          transform: translateX(14px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .sect {
        font-family: "Oswald", sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 16px;
        color: var(--gold);
        margin: 26px 0 12px;
        scroll-margin-top: 60px;
      }
      .panel {
        background: linear-gradient(160deg, var(--card1), var(--card2));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
        margin-bottom: 8px;
        color: var(--card-text);
      }
      label {
        display: block;
        font-size: 11.5px;
        letter-spacing: 0.04em;
        color: var(--gold);
        margin: 10px 0 4px;
        text-transform: uppercase;
        font-family: "Oswald", sans-serif;
      }
      label:first-of-type {
        margin-top: 0;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 9px 11px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--chip-bg);
        color: var(--card-text);
        font:
          500 13px "Be Vietnam Pro",
          sans-serif;
        outline: none;
      }
      textarea {
        min-height: 60px;
        resize: vertical;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--cyan);
      }
      .hint-small {
        font-size: 12px;
        color: var(--card-muted);
        margin-top: 3px;
        line-height: 1.5;
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        margin-top: 10px;
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid var(--line2);
        background: rgba(39, 227, 255, 0.12);
        color: var(--cyan);
        font:
          700 13px "Oswald",
          sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .btn:hover:not(:disabled) {
        background: rgba(39, 227, 255, 0.22);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.del {
        border-color: rgba(255, 45, 75, 0.4);
        background: rgba(255, 45, 75, 0.1);
        color: #ffb0bd;
      }
      .btn.big {
        width: 100%;
        margin-top: 18px;
        padding: 13px;
        font-size: 13px;
      }
      .item {
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        background: var(--chip-bg);
      }
      .chest-tier-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .chest-tier-row .chest-preview {
        width: 64px;
        height: 64px;
        flex: none;
        border-radius: 10px;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0) 70%
        );
      }
      .chest-tier-row .tier-fields {
        flex: 1;
        min-width: 0;
      }
      .chest-tier-row .tier-fields label:first-of-type {
        margin-top: 0;
      }
      .row3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 560px) {
        .row3 {
          grid-template-columns: 1fr;
        }
      }
      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .item-head b {
        font-size: 13px;
      }
      details.item summary {
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        list-style: none;
      }
      details.item summary::-webkit-details-marker {
        display: none;
      }
      details.item summary::before {
        content: "▸ ";
        color: var(--cyan);
      }
      details.item[open] summary::before {
        content: "▾ ";
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        min-height: 1.2em;
      }
      .msg.ok {
        color: #7ee787;
      }
      .msg.err {
        color: #ff8896;
      }
      .state {
        text-align: center;
        padding: 40px 0;
        color: var(--muted);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 10px;
      }
      .status.on {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.4);
      }
      .status.off {
        background: rgba(255, 45, 75, 0.12);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.4);
      }
      .calgrid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .calgrid .cell {
        text-align: center;
      }
      .calgrid .cell label {
        margin: 0 0 2px;
        font-size: 9px;
      }
      .calgrid input {
        padding: 6px;
        text-align: center;
        font-size: 12px;
      }
      .calgrid .cell.milestone {
        background: linear-gradient(135deg,rgba(244,196,65,.12),rgba(244,196,65,.04));
        border: 1px solid rgba(244,196,65,.45);
        border-radius: 8px;
        cursor: pointer;
        transition: border-color .2s, box-shadow .2s;
        padding: 4px;
      }
      .calgrid .cell.milestone:hover {
        border-color: rgba(244,196,65,.85);
        box-shadow: 0 0 10px rgba(244,196,65,.3);
      }
      .calgrid .cell.milestone label {
        color: var(--gold);
        font-size: 8px;
      }
      .calgrid .cell.day30m {
        background: linear-gradient(135deg,rgba(244,196,65,.2),rgba(244,196,65,.08));
        border-color: rgba(244,196,65,.7);
      }
      .calgrid .day-upgrade-btn, .calgrid .day-downgrade-btn {
        display: block; width: 100%; margin-top: 3px; padding: 2px 0;
        font-size: 9px; font-family: 'Oswald', sans-serif; letter-spacing: .04em;
        border-radius: 4px; cursor: pointer; transition: background .15s, color .15s;
      }
      .calgrid .day-upgrade-btn {
        background: rgba(100,180,255,.1); border: 1px solid rgba(100,180,255,.25);
        color: rgba(150,200,255,.6);
      }
      .calgrid .day-upgrade-btn:hover { background: rgba(100,180,255,.22); color: rgba(150,220,255,.9); }
      .calgrid .day-downgrade-btn {
        background: rgba(255,100,100,.1); border: 1px solid rgba(255,100,100,.2);
        color: rgba(255,150,150,.6);
      }
      .calgrid .day-downgrade-btn:hover { background: rgba(255,100,100,.2); color: rgba(255,180,180,.9); }
      @media (max-width: 560px) {
        .calgrid {
          grid-template-columns: repeat(5, 1fr);
        }
        .row2 {
          grid-template-columns: 1fr;
        }
      }
      .thumb {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        background: var(--card2);
        object-fit: cover;
        display: block;
        margin-bottom: 6px;
        border: 1px solid var(--card-border);
      }
      .save-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 18px;
        background: var(--modal-bg);
        border-top: 1px solid var(--card-border);
        display: flex;
        justify-content: center;
        gap: 10px;
        z-index: 20;
        backdrop-filter: blur(6px);
      }
      .save-bar .btn.big {
        margin: 0;
        max-width: 400px;
      }
      .checkout-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .checkout-modal {
        background: var(--modal-bg);
        border: 1px solid var(--modal-border);
        border-radius: 16px;
        padding: 18px;
        max-width: 460px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        position: relative;
        color: var(--card-text);
      }
      .checkout-modal .x {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        color: var(--card-muted);
        font-size: 18px;
      }
      .checkout-modal .x:hover {
        color: var(--card-text);
      }
      .pricing-card {
        max-width: 340px;
        margin: 0 auto;
        border-radius: 16px;
        padding: 22px;
        text-align: center;
        position: relative;
        background: linear-gradient(
          160deg,
          rgba(244, 196, 65, 0.1),
          rgba(39, 227, 255, 0.06)
        );
        border: 1px solid rgba(244, 196, 65, 0.4);
      }
      .pricing-card.is-active {
        border-color: rgba(34, 197, 94, 0.5);
        background: linear-gradient(
          160deg,
          rgba(34, 197, 94, 0.1),
          rgba(39, 227, 255, 0.06)
        );
      }
      .pricing-badge {
        display: inline-block;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 20px;
        background: var(--gold);
        color: #1a1200;
        font-weight: 700;
        margin-bottom: 14px;
      }
      .pricing-card.is-active .pricing-badge {
        background: #34d37a;
        color: #06210f;
      }
      .pricing-name {
        font-family: "Oswald", sans-serif;
        font-size: 18px;
        letter-spacing: 0.04em;
        color: var(--card-text);
        margin-bottom: 4px;
      }
      .pricing-price {
        font-family: "Oswald", sans-serif;
        font-size: 38px;
        font-weight: 700;
        color: var(--gold);
        line-height: 1;
      }
      .pricing-price span {
        font-size: 14px;
        color: var(--card-muted);
        font-weight: 400;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .pricing-features {
        list-style: none;
        margin: 18px 0;
        padding: 0;
        text-align: left;
        display: inline-block;
      }
      .pricing-features li {
        font-size: 13px;
        color: var(--card-text);
        padding: 5px 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pricing-features li::before {
        content: "✓";
        color: #34d37a;
        font-weight: 700;
      }
      .pricing-cta {
        width: 100%;
        margin-top: 6px;
        padding: 13px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font:
          700 13px "Oswald",
          sans-serif;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold), #d39a11);
        color: #1a1200;
      }
      .pricing-cta:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .pricing-cta.is-active {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.4);
        cursor: default;
      } /* ===== Live preview (mirrors store.html / index.html / daily.html markup+CSS) ===== */
      .edit-row {
        display: grid;
        grid-template-columns: 1fr 200px;
        gap: 14px;
        align-items: start;
        margin-top: 10px;
      }
      @media (max-width: 680px) {
        .edit-row {
          grid-template-columns: 1fr;
        }
      }
      .prev-col {
        position: sticky;
        top: 70px;
      }
      .prev-label {
        font-size: 9.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
        text-align: center;
        font-family: "Oswald", sans-serif;
      }
      .pv-card {
        position: relative;
        background: linear-gradient(160deg, var(--card1), var(--card2));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        color: var(--card-text);
      }
      .pv-card .thumb2 {
        position: relative;
        width: 100%;
        aspect-ratio: 1/1;
        background: var(--card2) center/cover no-repeat;
        border-bottom: 1px solid var(--card-border);
      }
      .pv-card .body2 {
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      .pv-card h3 {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .pv-card p {
        font-size: 12.5px;
        color: var(--card-muted);
        flex: 1;
        line-height: 1.5;
      }
      .pv-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 5px 9px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
        z-index: 2;
      }
      .pv-badge.hot {
        background: rgba(255, 45, 75, 0.18);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.5);
      }
      .pv-badge.new {
        background: rgba(39, 227, 255, 0.18);
        color: var(--cyan);
        border: 1px solid rgba(39, 227, 255, 0.5);
      }
      .pv-badge.vip {
        background: rgba(244, 196, 65, 0.18);
        color: var(--gold);
        border: 1px solid rgba(244, 196, 65, 0.5);
      }
      .pv-badge.bestseller {
        background: rgba(178, 102, 255, 0.2);
        color: #d5b8ff;
        border: 1px solid rgba(178, 102, 255, 0.5);
      }
      .pv-badge.limited {
        background: rgba(255, 45, 75, 0.18);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.5);
      }
      .pv-stock {
        position: absolute;
        top: 10px;
        right: 10px;
        font-family: "Oswald", sans-serif;
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 9px;
        border-radius: 6px;
        background: rgba(10, 15, 24, 0.7);
        color: #ffb0bd;
        border: 1px solid rgba(255, 45, 75, 0.45);
        backdrop-filter: blur(4px);
        z-index: 2;
      }
      .pv-cost-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-top: 2px;
      }
      .pv-cost {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        color: var(--gold);
        font-size: 18px;
        letter-spacing: 0.04em;
      }
      .pv-price-anchor {
        font-size: 11px;
        color: var(--card-muted);
        letter-spacing: 0.04em;
      }
      .pv-price-anchor s {
        color: rgba(255, 255, 255, 0.55);
      }
      .pv-price-anchor b {
        color: var(--cyan);
        font-weight: 600;
      }
      .pv-btn {
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        font-weight: 600;
        padding: 10px;
        border-radius: 9px;
        border: 1px solid var(--line2);
        background: rgba(39, 227, 255, 0.1);
        color: var(--cyan);
        text-align: center;
        margin-top: 4px;
      }
      .pv-btn.primary {
        background: linear-gradient(
          135deg,
          rgba(244, 196, 65, 0.18),
          rgba(39, 227, 255, 0.18)
        );
        border-color: rgba(244, 196, 65, 0.5);
        color: var(--gold);
      }
      .pv-toggle {
        margin-top: 6px;
        font-size: 10px;
        padding: 6px 10px;
      }
      .pv-back {
        position: relative;
        display: flex;
        flex-direction: column;
        background: linear-gradient(165deg, #0e1622 0%, #1a0a2e 100%);
        border: 1px solid rgba(244, 196, 65, 0.55);
        border-radius: 16px;
        box-shadow: 0 0 0 1px rgba(244, 196, 65, 0.18) inset;
        padding: 18px 16px;
        overflow: hidden;
      }
      .pv-fb-hdr {
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .pv-fb-tag {
        display: inline-block;
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(244, 196, 65, 0.18);
        color: var(--gold);
        border: 1px solid rgba(244, 196, 65, 0.4);
      }
      .pv-fb-title {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 16px;
        color: #fff;
        margin-top: 8px;
        letter-spacing: 0.04em;
        line-height: 1.25;
      }
      .pv-fb-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        z-index: 1;
        margin: 12px 0;
        width: 100%;
      }
      .pv-fb-code {
        font-family: "Oswald", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.14em;
        background: #0a0f18;
        border: 1.5px dashed var(--gold);
        border-radius: 10px;
        padding: 12px 14px;
        text-align: center;
        width: 100%;
        word-break: break-all;
      }
      .pv-fb-copy {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: transparent;
        border: 1px solid rgba(244, 196, 65, 0.5);
        color: var(--gold);
        padding: 7px 14px;
        border-radius: 8px;
        width: 100%;
      }
      .pv-fb-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 13px;
        border-radius: 10px;
        background: linear-gradient(
          135deg,
          rgba(178, 102, 255, 0.18),
          rgba(244, 196, 65, 0.12)
        );
        border: 1px solid rgba(178, 102, 255, 0.5);
        color: #fff;
        font-weight: 600;
        font-size: 12.5px;
        width: 100%;
        box-sizing: border-box;
      }
      .pv-fb-link small {
        display: block;
        font-size: 10px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 2px;
      }
      .pv-prize {
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 11px;
        padding: 11px 13px;
      }
      .pv-prize .pp {
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .pv-prize .pxu {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 20px;
        line-height: 1;
      }
      .pv-prize.r1 .pp,
      .pv-prize.r1 .pxu {
        color: var(--gold);
      }
      .pv-prize.r2 .pp,
      .pv-prize.r2 .pxu {
        color: var(--silver);
      }
      .pv-prize.r3 .pp,
      .pv-prize.r3 .pxu {
        color: var(--bronze);
      }
      .pv-prize.r4 .pp,
      .pv-prize.r4 .pxu,
      .pv-prize.r5 .pp,
      .pv-prize.r5 .pxu,
      .pv-prize.r6 .pp,
      .pv-prize.r6 .pxu {
        color: var(--diamond);
      }
      .pv-quest {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 11px;
      }
      .pv-quest .ic {
        font-size: 20px;
      }
      .pv-quest .info {
        flex: 1;
        min-width: 0;
      }
      .pv-quest .nm {
        font-size: 13px;
        font-weight: 600;
        color: var(--card-text);
        margin-bottom: 2px;
      }
      .pv-quest .rw {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        color: var(--gold);
        letter-spacing: 0.05em;
      }
      .pv-day {
        position: relative;
        aspect-ratio: 1;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--chip-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        margin-top: 4px;
      }
      .pv-day .n {
        font-size: 8px;
        color: var(--card-muted);
        letter-spacing: 0.04em;
      }
      .pv-day .r {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--card-text);
      } /* ===== #events — lịch kéo-thả ===== */
      .events-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        gap: 10px;
      }
      .events-nav .lbl {
        font-family: "Oswald", sans-serif;
        font-size: 12px;
        letter-spacing: 0.06em;
        color: var(--card-muted);
        text-transform: uppercase;
      }
      .ev-calendar {
        min-height: 90px;
        position: relative;
      }
      .ev-head-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 10px;
        user-select: none;
      }
      .ev-head-cell {
        text-align: center;
        font-family: "Oswald", sans-serif;
        font-size: 10px;
        letter-spacing: 0.05em;
        color: var(--card-muted);
        text-transform: uppercase;
        padding: 6px 2px;
        border-radius: 6px;
      }
      .ev-head-cell.today {
        color: var(--cyan);
        background: rgba(39, 227, 255, 0.08);
      }
      .ev-head-cell .dd {
        font-size: 12px;
        color: var(--card-text);
        font-weight: 700;
        margin-top: 2px;
      }
      .ev-track {
        position: relative;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 8px;
        min-height: 34px;
      }
      .evt-bar {
        position: relative;
        border-radius: 8px;
        padding: 7px 22px;
        font-size: 12.5px;
        font-weight: 600;
        display: flex;
        align-items: center;
        overflow: hidden;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
      }
      .evt-bar.quest {
        background: rgba(39, 227, 255, 0.18);
        border: 1px solid rgba(39, 227, 255, 0.5);
        color: var(--cyan);
      }
      .evt-bar.code {
        background: rgba(255, 45, 75, 0.18);
        border: 1px solid rgba(255, 45, 75, 0.5);
        color: #ffb0bd;
      }
      .evt-bar .grip {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 9px;
        cursor: grab;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.04);
      }
      .evt-bar .grip:hover {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.75);
      }
      .evt-bar .grip:active {
        cursor: grabbing;
      }
      .evt-bar .grip-l {
        left: 0;
      }
      .evt-bar .grip-r {
        right: 0;
      }
      .evt-name-inline {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .evt-bar .ex {
        font-size: 10px;
        line-height: 1;
        opacity: 0.6;
        cursor: pointer;
        padding: 2px;
        flex-shrink: 0;
        margin-left: 4px;
      }
      .evt-bar .ex:hover {
        opacity: 1;
      }
      .event-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .event-modal {
        background: var(--modal-bg);
        border: 1px solid var(--modal-border);
        border-radius: 16px;
        padding: 18px;
        max-width: 460px;
        width: 100%;
        position: relative;
        color: var(--card-text);
      }
      .event-modal .x {
        position: absolute;
        top: 10px;
        right: 14px;
        cursor: pointer;
        color: var(--card-muted);
        font-size: 18px;
      }
      .event-modal .x:hover {
        color: var(--card-text);
      }
      .event-modal .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
        flex-wrap: wrap;
      }
      .event-modal .modal-actions .btn {
        margin-top: 0;
        flex: 1;
      }
      .event-modal .name-input {
        font-size: 17px;
        font-weight: 700;
        font-family: "Oswald", sans-serif;
        text-align: center;
        letter-spacing: 0.02em;
      }
      .event-modal .img-box {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 10px;
        overflow: hidden;
        background: var(--chip-bg);
        border: 1px dashed var(--card-border);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .event-modal .img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .event-modal .img-box .ph {
        color: var(--card-muted);
        font-size: 12px;
        text-align: center;
        padding: 10px;
        font-style: italic;
      }
      .event-modal .img-toggle {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .event-modal .img-toggle .btn {
        flex: 1;
        margin-top: 0;
        padding: 7px 8px;
        font-size: 11px;
      }
      .event-modal .img-toggle .btn.locked {
        opacity: 0.55;
      }
      .event-modal .img-toggle .btn.on {
        background: rgba(39, 227, 255, 0.3);
        border-color: var(--cyan);
      }
      .ev-empty {
        text-align: center;
        color: var(--card-muted);
        font-size: 12px;
        padding: 10px 0;
      }
      .unscheduled-tray {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12.5px;
        font-weight: 600;
        padding: 6px 11px;
        border-radius: 999px;
        margin: 0 6px 6px 0;
        cursor: grab;
        user-select: none;
        width: 160px;
      }
      .chip .evt-name-inline {
        width: auto;
      }
      .chip .ex {
        opacity: 0.7;
        cursor: pointer;
      }
      .flash {
        animation: flash-pulse 1.5s ease-out;
        border-radius: 12px;
      }
      @keyframes flash-pulse {
        0%,
        30% {
          box-shadow: 0 0 0 2px var(--cyan);
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
      }
      .chip.quest {
        background: rgba(39, 227, 255, 0.1);
        border: 1px solid rgba(39, 227, 255, 0.4);
        color: var(--cyan);
      }
      .chip.code {
        background: rgba(255, 45, 75, 0.1);
        border: 1px solid rgba(255, 45, 75, 0.4);
        color: #ffb0bd;
      }
      /* ===== Khối giới thiệu/hướng dẫn đầu mỗi tab + cảnh báo reward rỗng + mini preview ===== */
      .intro-card {
        background: rgba(39, 227, 255, 0.06);
        border: 1px solid rgba(39, 227, 255, 0.25);
        border-radius: 12px;
        padding: 13px 15px;
        margin-bottom: 14px;
      }
      .intro-what {
        font-size: 13px;
        color: var(--card-text);
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .intro-steps {
        margin: 0;
        padding-left: 20px;
        font-size: 12.5px;
        color: var(--card-muted);
        line-height: 1.8;
      }
      .intro-steps li {
        margin-bottom: 2px;
      }
      .reward-empty {
        background: rgba(255, 45, 75, 0.08);
        border: 1px solid rgba(255, 45, 75, 0.3);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
        margin-bottom: 12px;
      }
      .reward-empty p {
        font-size: 13px;
        color: #ffd0d8;
        margin-bottom: 8px;
        line-height: 1.5;
      }
      .step-head {
        font-family: "Oswald", sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--gold);
        margin: 18px 0 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 14px;
      }
      .spin-pct {
        font-size: 11px;
        color: var(--cyan);
        margin-top: 4px;
        font-family: "Oswald", sans-serif;
        letter-spacing: 0.04em;
      }
      .mini-preview {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--chip-bg);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 10px;
        margin: 8px 0;
      }
      .mini-preview img {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--card2);
      }
      .mini-preview .ic {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--card2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .mini-preview .nm {
        font-size: 13px;
        font-weight: 600;
      }
      .mini-preview .sub {
        font-size: 10.5px;
        color: var(--card-muted);
        margin-top: 1px;
      }
      /* ===== Milestone Roadmap ===== */
      .ms-track { position:relative; padding-left:28px; margin-top:8px; }
      .ms-track::before { content:''; position:absolute; left:9px; top:0; bottom:0; width:2px; background:var(--card-border); border-radius:2px; }
      .ms-node { position:relative; margin-bottom:6px; }
      .ms-node::before { content:'●'; position:absolute; left:-22px; top:11px; color:var(--gold,#f5c518); font-size:16px; line-height:1; }
      .ms-card { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--chip-bg); border:1px solid var(--card-border); border-radius:10px; }
      .ms-thresh { font-size:14px; font-weight:700; color:var(--gold,#f5c518); white-space:nowrap; }
      .ms-sep { color:var(--card-border); }
      .ms-lbl { font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .ms-rew { font-size:12px; color:var(--card-muted); white-space:nowrap; }
      .ms-actions { display:flex; gap:4px; flex-shrink:0; }
      .ms-edit-panel { background:var(--card2,#1a1a2e); border:1px solid var(--card-border); border-top:none; border-radius:0 0 10px 10px; padding:12px; margin-top:-4px; margin-bottom:8px; }
      .ms-type-row { display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
      .ms-type-row label { display:flex; align-items:center; gap:5px; font-size:12px; text-transform:none; font-family:inherit; cursor:pointer; color:var(--card-text); }
      .ms-start { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--card-muted); margin-bottom:6px; padding-left:0; }
      .ms-start::before { content:'🏁'; font-size:16px; }

      .mini-preview.big img,
      .mini-preview.big .ic {
        width: 64px;
        height: 64px;
        font-size: 30px;
      } /* ===== Khối "Mức dùng hiện tại" (giới hạn bản Free) — tab Billing ===== */
      .usage-card {
        background: rgba(255, 45, 75, 0.06);
        border: 1px solid rgba(255, 45, 75, 0.25);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .usage-card h4 {
        font-family: "Oswald", sans-serif;
        font-size: 12.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ffb0bd;
        margin-bottom: 10px;
      }
      .usage-row {
        margin-bottom: 10px;
      }
      .usage-row .lbl {
        display: flex;
        justify-content: space-between;
        font-size: 12.5px;
        color: var(--card-text);
        margin-bottom: 4px;
      }
      .usage-row .lbl b {
        color: var(--gold);
      }
      .usage-bar {
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .usage-bar .fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cyan), var(--gold));
      }
      .usage-locked {
        list-style: none;
        margin: 10px 0 4px;
        padding: 0;
      }
      .usage-locked li {
        font-size: 12.5px;
        color: var(--card-muted);
        padding: 5px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .usage-locked li:first-child {
        border-top: none;
      }
      .usage-locked b {
        color: #ffb0bd;
      }
      .usage-check-btn {
        margin-top: 4px;
      }
      .usage-member-result {
        font-size: 12px;
        color: var(--cyan);
        margin-top: 6px;
      }
      @media (prefers-color-scheme: light) {
        .panel {
          box-shadow: 0 4px 14px rgba(22, 28, 44, 0.07);
        }
        .item {
          box-shadow: 0 2px 8px rgba(22, 28, 44, 0.05);
        }
        .err,
        .btn.del,
        .status.off,
        .pv-badge.hot,
        .pv-badge.limited,
        .evt-bar.code,
        .chip.code,
        .reward-empty p,
        .usage-card h4,
        .usage-locked b {
          color: #9a2030;
        }
      }
      /* ===== Pricing Grid ===== */
      .pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
      @media(max-width:640px){.pricing-grid{grid-template-columns:1fr}}
      .pricing-card2{border-radius:14px;padding:18px;text-align:center;position:relative;background:linear-gradient(160deg,rgba(244,196,65,0.07),rgba(39,227,255,0.04));border:1px solid rgba(244,196,65,0.3)}
      .pricing-card2.is-current{border-color:rgba(34,197,94,0.55);background:linear-gradient(160deg,rgba(34,197,94,0.1),rgba(39,227,255,0.05))}
      .pricing-card2 .pc-badge{display:inline-block;font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--gold);color:#1a1200;font-weight:700;margin-bottom:10px}
      .pricing-card2.is-current .pc-badge{background:#34d37a;color:#06210f}
      .pricing-card2 .pc-name{font-family:"Oswald",sans-serif;font-size:16px;color:var(--card-text);margin-bottom:4px}
      .pricing-card2 .pc-price{font-family:"Oswald",sans-serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1}
      .pricing-card2 .pc-price span{font-size:12px;color:var(--card-muted);font-weight:400;font-family:"Be Vietnam Pro",sans-serif}
      .pricing-card2 ul{list-style:none;margin:12px 0;padding:0;text-align:left}
      .pricing-card2 ul li{font-size:11.5px;color:var(--card-text);padding:3px 0;display:flex;align-items:center;gap:6px}
      .pricing-card2 ul li::before{content:"✓";color:#34d37a;font-weight:700}
      .pricing-card2 .pc-cta{width:100%;margin-top:8px;padding:11px;border-radius:8px;border:none;cursor:pointer;font:700 12px "Oswald",sans-serif;letter-spacing:0.06em;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),#d39a11);color:#1a1200}
      .pricing-card2 .pc-cta:disabled{opacity:0.55;cursor:not-allowed}
      .pricing-card2 .pc-cta.is-active{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.4);cursor:default}
      /* ===== Wizard Modal ===== */
      .wizard-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
      .wizard-modal{background:var(--modal-bg);border:1px solid var(--modal-border);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow:auto;padding:28px;position:relative;color:var(--card-text)}
      .wizard-modal .wz-skip{position:absolute;top:14px;right:16px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline}
      .wizard-modal .wz-skip:hover{color:var(--card-text)}
      .wz-steps{display:flex;gap:6px;margin-bottom:22px}
      .wz-step-dot{flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,0.1)}
      .wz-step-dot.done{background:var(--gold)}
      .wz-step-dot.active{background:var(--cyan)}
      .wz-title{font-family:"Oswald",sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--gold);margin-bottom:8px}
      .wz-subtitle{font-size:13px;color:var(--card-muted);margin-bottom:20px;line-height:1.5}
      .wz-actions{display:flex;gap:8px;margin-top:20px}
      .wz-actions .btn{flex:1;margin-top:0}
      /* ---- Reward Card Editor (rce) ---- */
      .rce-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:20px}
      .rce{position:relative;background:linear-gradient(160deg,var(--card1),var(--card2));border:1px solid var(--card-border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;color:var(--card-text);transition:border-color .2s}
      .rce:hover{border-color:rgba(39,227,255,.22)}
      .rce-thumb{position:relative;width:100%;aspect-ratio:1/1;background:var(--card2) center/cover no-repeat;border-bottom:1px solid var(--card-border);display:flex;align-items:flex-end;justify-content:flex-end}
      .rce-thumb-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:11.5px;text-align:center;padding:12px;pointer-events:none;line-height:1.5}
      .rce-img-btn{margin:10px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px);transition:.15s}
      .rce-img-btn:hover{background:rgba(0,0,0,.92)}
      .rce-img-row{padding:8px 14px 10px;display:none;background:rgba(0,0,0,.35);border-bottom:1px solid var(--card-border)}

function usageBarRow(label,used,limit){  const pct=Math.min(100,(used/limit)*100);  return `<div class="usage-row"><div class="lbl"><span>${label}</span><b>${used}/${limit}</b></div><div class="usage-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;}function renderUsagePanel(){  if(TIER_LEVEL>0) return '';  const eventsUsed=(STATE.events||[]).length;  const rewardsUsed=(STATE.rewards||[]).length;  return `<div class="usage-card">    <h4>⚠ You're on the Free plan — here's what's limited right now</h4>    ${usageBarRow('🗓 Event slots',eventsUsed,3)}    ${usageBarRow('🎁 Reward Store items',rewardsUsed,2)}    <div class="usage-row">      <div class="lbl"><span>👥 Members shown on leaderboard</span><b>up to 50</b></div>      <button class="btn usage-check-btn" type="button" onclick="checkMemberCap(this)">🔄 Check how many of my real members are hidden</button>      <div class="usage-member-result" id="usage-member-result"></div>    </div>    <ul class="usage-locked">      <li>🔒 <b>Reward Store</b> — only 2 items visible, upgrade to show more</li>    </ul>  </div>`;}async function checkMemberCap(btn){  btn.disabled=true;const old=btn.textContent;btn.textContent='Checking…';  const out=$('usage-member-result');  try{    const r=await tenantFetch('/.netlify/functions/whop-data');const j=await r.json();    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));    const real=j.stats?.totalMembersReal??0;const shown=j.stats?.totalMembers??0;const hidden=Math.max(0,real-shown);    out.textContent=hidden>0?`You have ${real} real members — ${hidden} are currently hidden from the leaderboard.`:`You have ${real} real members — none are hidden yet.`;  }catch(e){out.textContent='⚠ '+e.message;}finally{btn.disabled=false;btn.textContent=old;}}

ards, 500 members, custom branding","Pro ($29/mo): unlimited everything + priority support","Click Upgrade → you are redirected to a secure Whop checkout → plan activates automatically after payment"])}      ${renderUsagePanel()}      <div class="pricing-grid">${cardsHtml}</div>    </div>`;}async function startUpgrade(targetTier,btn){  if(btn){btn.disabled=true;btn.textContent='Loading…';}  try{    const r=await tenantFetch('/.netlify/functions/create-upgrade-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({targetTier:targetTier||'growth'})});    const j=await r.json();    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));    openCheckoutModal(j.sessionId,j.planId);  }catch(e){    alert('⚠ Could not start checkout: '+e.message);    if(btn){btn.disabled=false;btn.textContent='⭐ Upgrade';}  }}function openCheckoutModal(sessionId,planId){  const wrap=document.createElement('div');  wrap.className='checkout-overlay';wrap.id='checkout-overlay';  wrap.innerHTML=`<div class="checkout-modal"><span class="x" onclick="closeCheckoutModal()">✕</span><div data-whop-checkout-session="${esc(sessionId)}" data-whop-checkout-plan-id="${esc(planId)}" data-whop-checkout-return-url="${esc(location.origin+location.pathname)}"></div></div>`;  wrap.addEventListener('click',(e)=>{if(e.target===wrap)closeCheckoutModal();});  document.body.appendChild(wrap);}function closeCheckoutModal(){const el=$('checkout-overlay');if(el)el.remove();load();}// ===== #season =====

d={kind:'link',url:STATE.rewards[${i}].payload?.url||'',label:STATE.rewards[${i}].payload?.label||''};else if(_v==='ea')STATE.rewards[${i}].payload={kind:'ea',ea:STATE.rewards[${i}].payload?.ea||'',setup:STATE.rewards[${i}].payload?.setup||'',label:STATE.rewards[${i}].payload?.label||''};else STATE.rewards[${i}].payload={kind:'code',code:STATE.rewards[${i}].payload?.code||''};refreshRceBack(${i})"><option value="code" ${p.kind==='code'?'selected':''}>Code (coupon, secret word)</option><option value="link" ${p.kind==='link'?'selected':''}>Link (file, landing page)</option><option value="ea" ${p.kind==='ea'?'selected':''}>Download + setup (EA bot)</option><option value="lucky-box" ${p.kind==='lucky-box'?'selected':''}>🎲 Lucky Box</option></select></div>`;  const hdr=`<div class="pv-fb-hdr"><span class="pv-fb-tag">🎉 Redeemed</span><div class="pv-fb-title">${esc(name||'(Unnamed)')}</div></div>`;  let body='';  if(p.kind==='code'){    body=`<div class="pv-fb-body"><input class="pv-fb-code rce-bp-inp" style="text-align:center" placeholder="Your code here..." value="${esc(p.code||'')}" oninput="setPath(STATE,'rewards.${i}.payload.code',this.value)"/><div class="pv-fb-copy" style="text-align:center;pointer-events:none">📋 Copy code</div></div>`;  }else if(p.kind==='link'){    body=`<div class="pv-fb-body"><div class="pv-fb-link" style="flex-direction:column;align-items:flex-start;gap:8px;width:100%"><div style="display:flex;align-items:center;gap:8px;width:100%"><span style="font-size:18px;flex-shrink:0">🔗</span><input class="rce-bp-inp rce-bp-label" placeholder="Button label..." value="${esc(p.label||'')}" oninput="setPath(STATE,'rewards.${i}.payload.label',this.value)"/></div><input class="rce-bp-inp rce-bp-url" placeholder="https://... (link to open)" value="${esc(p.url||'')}" oninput="setPath(STATE,'rewards.${i}.payload.url',this.value)"/></div></div>`;  }else if(p.kind==='ea'){    body=`<div class="pv-fb-body"><div class="pv-fb-link" style="flex-direction:column;align-i yle="margin-top:10px"><div><label>Stock limit <span style="font-weight:400;text-transform:none;font-family:inherit;font-size:10px">(blank = unlimited)</span></label><input type="number" min="0" value="${r.stock??''}" placeholder="Unlimited" oninput="setPath(STATE,'rewards.${i}.stock',this.value===''?null:Number(this.value))"/></div><div class="rce-vip-row"><input type="checkbox" id="vip-${i}" ${r.vipOnly?'checked':''} onchange="setPath(STATE,'rewards.${i}.vipOnly',this.checked)"/><label for="vip-${i}" style="cursor:pointer;margin:0;text-transform:none;font-family:inherit;font-size:12px">👑 VIP Only</label></div></div><button class="rce-del-btn" onclick="if(!confirm('Delete this reward?'))return;STATE.rewards.splice(${i},1);renderAll()">🗑 Delete this reward</button></div></details></div>`;  }).join('');  const rewardLimit=[3,10,9999,9999][TIER_LEVEL]??3;  const rewardCount=(STATE.rewards||[]).length;  const addRewardOrMsg=rewardCount<rewardLimit    ?`<button class="btn" onclick="STATE.rewards.push({id:'reward_'+Date.now().toString(36),name:'',cost:100,desc:'',image:'',buttonLabel:'BUY',tier:1,payload:{kind:'code',code:''}});renderAll()">+ Add new reward (${rewardCount}/${rewardLimit})</button>`    :`<p class="hint-small">${TIER_LEVEL>0?`Limit reached (${rewardLimit} rewards).`:`Free plan limit (${rewardLimit} rewards) — ⭐ upgrade to Starter or Pro for more.`}</p>`;  return `<div class="sect" id="store">🎁 Reward Store</div><div class="panel">${introBlock("Members spend their earned XU here to claim real rewards. The store is the main reason members want to keep earning — so make the rewards genuinely worth it. Each reward has a front side (what members see before buying) and a back side (what they receive after redeeming: a promo code, a download link, a file, or a lucky-box spin).",["Click + Add new reward, then fill in: name, XU price, and a short description","Expand 🎁 Back side → set the reward type (Code / Link / Download / Lucky Box) and paste the actual content","Set Stock limit if the reward is limited (leave blank for unlimited)","Optional: set a 🔥 Daily Deal at the bottom to discount one item for today only","Save all"])}${toggleRow(STATE.storeEnabled,'STATE.storeEnabled=this.checked;renderAll()','Enabled — Reward Store is visible in member nav.','Disabled — Reward Store link is hidden from members.')}<div class="rce-grid">${cards||'<p class="hint-small">No rewards yet — add one below.</p>'}</div>${addRewardOrMsg}<div class="step-head" style="margin-top:28px">🔥 Daily Deal</div><p class="hint-small">Discount one reward for today only. Resets at midnight UTC. Each member can buy it once per day.</p>${(STATE.rewards||[]).length===0?'<p class="hint-small">Add rewards first.</p>':`<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-top:10px"><div style="flex:2;min-width:160px"><label>Today's deal reward</label><select onchange="if(!STATE.dailyDeal)STATE.dailyDeal={discountPct:30};STATE.dailyDeal.rewardId=this.value;renderAll()"><option value="">None</option>${(STATE.rewards||[]).map(r=>`<option value="${esc(r.id)}" ${STATE.dailyDeal?.rewardId===r.id?'selected':''}>${esc(r.name||'(Unnamed)')} — ${r.cost||0} XU</option>`).join('')}</select></div><div style="flex:1;min-width:90px"><label>Discount %</label><input type="number" min="5" max="80" value="${STATE.dailyDeal?.discountPct||30}" placeholder="30" oninput="if(!STATE.dailyDeal)STATE.dailyDeal={};STATE.dailyDeal.discountPct=Number(this.value)||0"/></div>${STATE.dailyDeal?.rewardId?`<div style="padding-bottom:6px"><button class="btn del" onclick="STATE.dailyDeal=null;renderAll()">✕ Clear</button></div>`:''}</div>${STATE.dailyDeal?.rewardId?`<p class="hint-small" style="margin-top:6px;color:var(--gold)">🔥 Active deal: <b>${esc((STATE.rewards||[]).find(r=>r.id===STATE.dailyDeal.rewardId)?.name||'')}</b> → <b>${Math.max(1,Math.round(((STATE.rewards||[]).find(r=>r.id===STATE.dailyDeal.rewardId)?.cost||0)*(1-(STATE.dailyDeal.discountPct||0)/100)))} XU</b> (${STATE.dailyDeal.discountPct||0}% off)</p>`:''}`}</div>`;}// ===== #codes =====
