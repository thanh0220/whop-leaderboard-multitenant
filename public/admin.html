<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--cyan:#27e3ff;--gold:#f4c441;--silver:#cbd5e1;--bronze:#e1955a;--diamond:#9beaff;--red:#ff2d4b;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:30px 18px 100px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:.06em;margin-bottom:6px}
  p.hint{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:11px;
    padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);
    color:var(--muted);text-decoration:none}
  .nav a:hover{border-color:var(--line2);color:var(--cyan)}
  .sect{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:14px;color:var(--gold);margin:26px 0 12px;scroll-margin-top:60px}
  .panel{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:8px}
  label{display:block;font-size:11px;letter-spacing:.04em;color:var(--gold);margin:10px 0 4px;text-transform:uppercase;font-family:'Oswald',sans-serif}
  label:first-of-type{margin-top:0}
  input,select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
    background:#070b16;color:var(--text);font:500 13px 'Be Vietnam Pro',sans-serif;outline:none}
  textarea{min-height:60px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
  .hint-small{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{margin-top:10px;padding:9px 14px;border-radius:8px;border:1px solid var(--line2);
    background:rgba(39,227,255,.12);color:var(--cyan);font:700 11.5px 'Oswald',sans-serif;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer}
  .btn:hover:not(:disabled){background:rgba(39,227,255,.22)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.del{border-color:rgba(255,45,75,.4);background:rgba(255,45,75,.1);color:#ffb0bd}
  .btn.big{width:100%;margin-top:18px;padding:13px;font-size:13px}
  .item{border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;margin-bottom:10px;background:rgba(255,255,255,.02)}
  .item-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .item-head b{font-size:13px}
  details.item summary{cursor:pointer;font-weight:600;font-size:13px;list-style:none}
  details.item summary::-webkit-details-marker{display:none}
  details.item summary::before{content:'▸ ';color:var(--cyan)}
  details.item[open] summary::before{content:'▾ '}
  .msg{margin-top:10px;font-size:13px;min-height:1.2em}
  .msg.ok{color:#7ee787}
  .msg.err{color:#ff8896}
  .state{text-align:center;padding:40px 0;color:var(--muted)}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:999px;margin-bottom:10px}
  .status.on{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.4)}
  .status.off{background:rgba(255,45,75,.12);color:#ffb0bd;border:1px solid rgba(255,45,75,.4)}
  .calgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .calgrid .cell{text-align:center}
  .calgrid .cell label{margin:0 0 2px;font-size:9px}
  .calgrid input{padding:6px;text-align:center;font-size:12px}
  @media(max-width:560px){.calgrid{grid-template-columns:repeat(5,1fr)}.row2{grid-template-columns:1fr}}
  .thumb{width:64px;height:64px;border-radius:8px;background:#0a0f18;object-fit:cover;display:block;margin-bottom:6px;border:1px solid rgba(255,255,255,.1)}
  .save-bar{position:fixed;left:0;right:0;bottom:0;padding:12px 18px;background:rgba(7,9,16,.95);
    border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:center;gap:10px;z-index:20;backdrop-filter:blur(6px)}
  .save-bar .btn.big{margin:0;max-width:400px}

  /* ===== Live preview (mirrors store.html / index.html / daily.html markup+CSS) ===== */
  .edit-row{display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:start;margin-top:10px}
  @media(max-width:680px){.edit-row{grid-template-columns:1fr}}
  .prev-col{position:sticky;top:70px}
  .prev-label{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;text-align:center;font-family:'Oswald',sans-serif}

  .pv-card{position:relative;background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:0;display:flex;flex-direction:column;overflow:hidden}
  .pv-card .thumb2{position:relative;width:100%;aspect-ratio:1/1;background:#0a0f18 center/cover no-repeat;border-bottom:1px solid rgba(255,255,255,.06)}
  .pv-card .body2{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .pv-card h3{font-size:15px;font-weight:700;line-height:1.3}
  .pv-card p{font-size:12.5px;color:var(--muted);flex:1;line-height:1.5}
  .pv-badge{position:absolute;top:10px;left:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:5px 9px;border-radius:6px;backdrop-filter:blur(4px);z-index:2}
  .pv-badge.hot{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}
  .pv-badge.new{background:rgba(39,227,255,.18);color:var(--cyan);border:1px solid rgba(39,227,255,.5)}
  .pv-badge.vip{background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.5)}
  .pv-badge.bestseller{background:rgba(178,102,255,.2);color:#d5b8ff;border:1px solid rgba(178,102,255,.5)}
  .pv-badge.limited{background:rgba(255,45,75,.18);color:#ffb0bd;border:1px solid rgba(255,45,75,.5)}
  .pv-stock{position:absolute;top:10px;right:10px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:6px;background:rgba(10,15,24,.7);color:#ffb0bd;border:1px solid rgba(255,45,75,.45);backdrop-filter:blur(4px);z-index:2}
  .pv-cost-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:2px}
  .pv-cost{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);font-size:18px;letter-spacing:.04em}
  .pv-price-anchor{font-size:11px;color:var(--muted);letter-spacing:.04em}
  .pv-price-anchor s{color:rgba(255,255,255,.55)}
  .pv-price-anchor b{color:var(--cyan);font-weight:600}
  .pv-btn{font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:12px;font-weight:600;
    padding:10px;border-radius:9px;border:1px solid var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);text-align:center;margin-top:4px}
  .pv-btn.primary{background:linear-gradient(135deg,rgba(244,196,65,.18),rgba(39,227,255,.18));border-color:rgba(244,196,65,.5);color:var(--gold)}
  .pv-toggle{margin-top:6px;font-size:10px;padding:6px 10px}

  .pv-back{position:relative;display:flex;flex-direction:column;background:linear-gradient(165deg,#0e1622 0%,#1a0a2e 100%);
    border:1px solid rgba(244,196,65,.55);border-radius:16px;box-shadow:0 0 0 1px rgba(244,196,65,.18) inset;padding:18px 16px;overflow:hidden}
  .pv-fb-hdr{text-align:center;position:relative;z-index:1}
  .pv-fb-tag{display:inline-block;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.2em;padding:4px 10px;border-radius:6px;background:rgba(244,196,65,.18);color:var(--gold);border:1px solid rgba(244,196,65,.4)}
  .pv-fb-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-top:8px;letter-spacing:.04em;line-height:1.25}
  .pv-fb-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1;margin:12px 0;width:100%}
  .pv-fb-code{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:.14em;background:#0a0f18;border:1.5px dashed var(--gold);border-radius:10px;padding:12px 14px;text-align:center;width:100%;word-break:break-all}
  .pv-fb-copy{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:1px solid rgba(244,196,65,.5);color:var(--gold);padding:7px 14px;border-radius:8px;width:100%}
  .pv-fb-link{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:linear-gradient(135deg,rgba(178,102,255,.18),rgba(244,196,65,.12));border:1px solid rgba(178,102,255,.5);color:#fff;font-weight:600;font-size:12.5px;width:100%;box-sizing:border-box}
  .pv-fb-link small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.55);margin-top:2px}

  .pv-prize{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:11px 13px}
  .pv-prize .pp{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
  .pv-prize .pxu{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;line-height:1}
  .pv-prize.r1 .pp,.pv-prize.r1 .pxu{color:var(--gold)}
  .pv-prize.r2 .pp,.pv-prize.r2 .pxu{color:var(--silver)}
  .pv-prize.r3 .pp,.pv-prize.r3 .pxu{color:var(--bronze)}
  .pv-prize.r4 .pp,.pv-prize.r4 .pxu,.pv-prize.r5 .pp,.pv-prize.r5 .pxu,.pv-prize.r6 .pp,.pv-prize.r6 .pxu{color:var(--diamond)}

  .pv-quest{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px}
  .pv-quest .ic{font-size:20px}
  .pv-quest .info{flex:1;min-width:0}
  .pv-quest .nm{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
  .pv-quest .rw{font-family:'Oswald',sans-serif;font-size:11px;color:var(--gold);letter-spacing:.05em}

  .pv-day{position:relative;aspect-ratio:1;border-radius:8px;border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;margin-top:4px}
  .pv-day .n{font-size:8px;color:var(--muted);letter-spacing:.04em}
  .pv-day .r{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ Settings — Quản trị Community</h1>
  <p class="hint">Chỉ admin nên mở trang này — đừng chia sẻ link này cho member.</p>
  <div class="nav">
    <a href="#conn">🔌 Kết nối</a>
    <a href="#season">🏆 Mùa giải</a>
    <a href="#daily">📅 Điểm danh</a>
    <a href="#quests">✅ Nhiệm vụ</a>
    <a href="#store">🎁 Cửa hàng</a>
    <a href="#codes">🔑 Code</a>
  </div>
  <div id="content"><div class="state">Đang tải...</div></div>
</div>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return Number(n||0).toLocaleString('vi-VN');}

// ===== Preview render (thuần, không đụng DOM) — mirror đúng markup store.html/index.html/daily.html =====
const BADGE_LABEL={hot:'🔥 Hot',new:'⚡ Mới',vip:'👑 VIP',bestseller:'⭐ Bán chạy',limited:'⏳ Giới hạn'};

function storeCardHtml(r){
  const thumb=r.image?`<div class="thumb2" style="background-image:url('${esc(r.image)}')"></div>`:`<div class="thumb2" style="background:linear-gradient(135deg,#1a2236,#0a0f18)"></div>`;
  const badge=r.badge?`<span class="pv-badge ${esc(r.badge)}">${BADGE_LABEL[r.badge]||r.badge}</span>`:'';
  const stockPill=(r.stock!=null&&r.stock<=10)?`<span class="pv-stock">Còn ${r.stock}</span>`:'';
  const priceAnchor=r.originalPrice?`<div class="pv-price-anchor"><s>${esc(r.originalPrice)}</s> · <b>tiết kiệm 100%</b></div>`:'';
  return `<div class="pv-card">
    ${thumb}${badge}${stockPill}
    <div class="body2">
      <h3>${esc(r.name||'(Chưa đặt tên)')}</h3>
      <p>${esc(r.desc||'')}</p>
      <div class="pv-cost-row"><span class="pv-cost">${fmt(r.cost)} XU</span>${priceAnchor}</div>
      <div class="pv-btn ${(r.tier>=4)?'primary':''}">🎁 Đổi ngay</div>
    </div>
  </div>`;
}
function storeBackHtml(r){
  const p=r.payload||{kind:'code',code:''};
  let backBody='';
  if(p.kind==='ea'){
    backBody=`<div class="pv-fb-link"><span style="font-size:18px">📥</span><span>Tải file<small>${esc(p.label||'')}</small></span></div>
      <div class="pv-fb-link"><span style="font-size:18px">🛠</span><span>Hướng dẫn Setup<small>Cài đặt &amp; kích hoạt</small></span></div>`;
  }else if(p.kind==='link'){
    backBody=`<div class="pv-fb-link"><span style="font-size:18px">🔗</span><span>Mở phần thưởng<small>${esc(p.label||'')}</small></span></div>`;
  }else{
    backBody=`<div class="pv-fb-code">${esc(p.code||'')}</div><div class="pv-fb-copy">📋 Sao chép mã</div>`;
  }
  return `<div class="pv-back">
    <div class="pv-fb-hdr"><span class="pv-fb-tag">🎉 Đã đổi</span><div class="pv-fb-title">${esc(r.name||'')}</div></div>
    <div class="pv-fb-body">${backBody}</div>
  </div>`;
}
function seasonTileHtml(r,i){
  return `<div class="pv-prize r${i+1}"><div class="pp">${esc(r.rank||'')}</div><div class="pxu">🪙 ${esc(r.prize||'')}</div></div>`;
}
function questCardHtml(q){
  return `<div class="pv-quest"><div class="ic">${esc(q.icon||'⭐')}</div><div class="info"><div class="nm">${esc(q.name||'(chưa đặt tên)')}</div><div class="rw">+${fmt(q.reward)} xu</div></div></div>`;
}
function dayCellHtml(v,i){
  return `<div class="pv-day"><div class="n">Ngày ${i+1}</div><div class="r">+${fmt(v)}</div></div>`;
}

function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }

// STATE = toàn bộ config tenant đang chỉnh trong bộ nhớ. Input đơn giản
// (text/number/textarea) ghi trực tiếp vào STATE qua setPath() KHÔNG render
// lại — tránh mất focus/con trỏ khi đang gõ. Hành động cấu trúc (thêm/xoá
// dòng, đổi loại payload, upload ảnh xong) mới gọi renderAll().
let STATE = null;
let CONFIGURED = false;
let typedApiKey = ''; // ô API key không bind vào STATE (nhạy cảm) — phải giữ
                       // riêng 1 biến, không thì renderAll() do section khác
                       // gọi sẽ xoá mất giá trị đang gõ trong ô này.

function setPath(obj, path, value){
  const parts = path.split('.');
  let cur = obj;
  for (let i=0;i<parts.length-1;i++) cur = cur[parts[i]];
  cur[parts[parts.length-1]] = value;
}

async function loadOnce(){
  const r = await tenantFetch('/.netlify/functions/admin-config');
  const j = await r.json();
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  return j;
}
async function load(){
  const maxTries = 6;
  let lastErr = null;
  for (let i = 0; i < maxTries; i++) {
    try{
      const j = await loadOnce();
      CONFIGURED = j.configured;
      typedApiKey = '';
      STATE = {
        whopCompanyId: j.whopCompanyId || '',
        seasonTopRewards: j.seasonTopRewards || [],
        checkinRewards: j.checkinRewards || [],
        dailyQuests: j.dailyQuests || [],
        rewards: j.rewards || [],
        redeemCodesList: Object.entries(j.redeemCodes || {}).map(([code,v])=>
          typeof v === 'number' ? {code,xu:v} : {code,xu:v.xu,startDate:v.startDate||'',endDate:v.endDate||''}),
      };
      renderAll();
      return;
    }catch(e){
      lastErr = e;
      $('content').innerHTML = `<div class="state">Đang chờ Whop xác thực... (${i+1}/${maxTries})</div>`;
      await new Promise(res=>setTimeout(res,1200));
    }
  }
  $('content').innerHTML = `<div class="panel"><div class="msg err">⚠ ${lastErr.message}</div></div>`;
}

function renderAll(){
  $('content').innerHTML =
    renderConn() + renderSeason() + renderDaily() + renderQuests() + renderStore() + renderCodes() +
    `<div class="save-bar"><button class="btn big" id="save-all">💾 Lưu tất cả</button></div>`;
  $('save-all').onclick = saveAll;
}

// ===== #conn =====
function renderConn(){
  const statusHtml = CONFIGURED
    ? `<span class="status on">✅ Đã kết nối — Company ID: ${esc(STATE.whopCompanyId)}</span>`
    : `<span class="status off">⚠ Chưa kết nối</span>`;
  return `
    <div class="sect" id="conn">🔌 Kết nối Whop</div>
    <div class="panel">
      ${statusHtml}
      <label>Company API key (để trống nếu không đổi)</label>
      <input id="conn-key" type="password" placeholder="apik_..." autocomplete="off" value="${esc(typedApiKey)}" oninput="typedApiKey=this.value"/>
      <div class="hint-small">Lấy tại Whop của bạn: Settings → Developer → API keys.</div>
      <label>Company ID</label>
      <input id="conn-id" type="text" value="${esc(STATE.whopCompanyId)}" oninput="STATE.whopCompanyId=this.value" autocomplete="off"/>
      <div class="hint-small">Xem trong URL khi mở Dashboard business của bạn: whop.com/dashboard/<b>biz_xxx</b>/</div>
    </div>`;
}

// ===== #season =====
function renderSeason(){
  const rows = (STATE.seasonTopRewards||[]).map((r,i)=>`
    <div class="edit-row">
      <div>
        <div class="row2">
          <div><label>Hạng</label><input value="${esc(r.rank)}" oninput="setPath(STATE,'seasonTopRewards.${i}.rank',this.value);$('prev-season-${i}').innerHTML=seasonTileHtml(STATE.seasonTopRewards[${i}],${i})"/></div>
          <div><label>Giải thưởng</label><input value="${esc(r.prize)}" oninput="setPath(STATE,'seasonTopRewards.${i}.prize',this.value);$('prev-season-${i}').innerHTML=seasonTileHtml(STATE.seasonTopRewards[${i}],${i})"/></div>
        </div>
        <button class="btn del" onclick="STATE.seasonTopRewards.splice(${i},1);renderAll()">🗑 Xoá hạng này</button>
      </div>
      <div class="prev-col">
        <div class="prev-label">Preview</div>
        <div id="prev-season-${i}">${seasonTileHtml(r,i)}</div>
      </div>
    </div>
  `).join('<hr style="border:none;border-top:1px solid rgba(255,255,255,.08);margin:10px 0">');
  return `
    <div class="sect" id="season">🏆 Mùa Giải</div>
    <div class="panel">
      ${rows || '<p class="hint-small">Chưa có hạng nào.</p>'}
      <button class="btn" onclick="STATE.seasonTopRewards.push({rank:'🏅 Top mới',prize:''});renderAll()">+ Thêm hạng</button>
    </div>`;
}

// ===== #daily (checkinRewards — 30 ô cố định) =====
function renderDaily(){
  const cells = (STATE.checkinRewards||[]).map((v,i)=>`
    <div class="cell">
      <label>Ngày ${i+1}</label>
      <input type="number" value="${v}" oninput="setPath(STATE,'checkinRewards.${i}',Number(this.value)||0);$('prev-day-${i}').innerHTML=dayCellHtml(STATE.checkinRewards[${i}],${i})"/>
      <div id="prev-day-${i}">${dayCellHtml(v,i)}</div>
    </div>`).join('');
  return `
    <div class="sect" id="daily">📅 Điểm Danh Hằng Ngày</div>
    <div class="panel">
      <p class="hint-small" style="margin-bottom:10px">Số xu cho mỗi ngày trong chu kỳ 30 ngày (lặp lại khi hết chuỗi).</p>
      <div class="calgrid">${cells}</div>
    </div>`;
}

// ===== #quests =====
function renderQuests(){
  const rows = (STATE.dailyQuests||[]).map((q,i)=>`
    <div class="item">
      <div class="edit-row">
        <div>
          <div class="row2">
            <div><label>ID (không đổi nếu đã có)</label><input value="${esc(q.id)}" oninput="setPath(STATE,'dailyQuests.${i}.id',this.value)"/></div>
            <div><label>Icon</label><input value="${esc(q.icon)}" oninput="setPath(STATE,'dailyQuests.${i}.icon',this.value);$('prev-quest-${i}').innerHTML=questCardHtml(STATE.dailyQuests[${i}])"/></div>
          </div>
          <label>Tên nhiệm vụ</label>
          <input value="${esc(q.name)}" oninput="setPath(STATE,'dailyQuests.${i}.name',this.value);$('prev-quest-${i}').innerHTML=questCardHtml(STATE.dailyQuests[${i}])"/>
          <label>Xu thưởng</label>
          <input type="number" value="${q.reward}" oninput="setPath(STATE,'dailyQuests.${i}.reward',Number(this.value)||0);$('prev-quest-${i}').innerHTML=questCardHtml(STATE.dailyQuests[${i}])"/>
          <div class="row2">
            <div><label>Bắt đầu (để trống = luôn chạy)</label><input type="date" value="${esc(q.startDate||'')}" oninput="setPath(STATE,'dailyQuests.${i}.startDate',this.value)"/></div>
            <div><label>Kết thúc (để trống = không hết hạn)</label><input type="date" value="${esc(q.endDate||'')}" oninput="setPath(STATE,'dailyQuests.${i}.endDate',this.value)"/></div>
          </div>
          <div class="hint-small">Đặt ngày để nhiệm vụ này hiện trên 🗓 Lịch sự kiện như 1 sự kiện giới hạn thời gian.</div>
          <button class="btn del" onclick="STATE.dailyQuests.splice(${i},1);renderAll()">🗑 Xoá nhiệm vụ</button>
        </div>
        <div class="prev-col">
          <div class="prev-label">Preview</div>
          <div id="prev-quest-${i}">${questCardHtml(q)}</div>
        </div>
      </div>
    </div>`).join('');
  return `
    <div class="sect" id="quests">✅ Nhiệm Vụ Hằng Ngày</div>
    <div class="panel">
      ${rows || '<p class="hint-small">Chưa có nhiệm vụ nào.</p>'}
      <button class="btn" onclick="STATE.dailyQuests.push({id:'quest_'+Date.now().toString(36),name:'',reward:1,icon:'⭐'});renderAll()">+ Thêm nhiệm vụ</button>
    </div>`;
}

// ===== #store (rewards) =====
function payloadFields(p, i){
  const kind = p.kind || 'code';
  if (kind === 'link') return `
    <label>Link mở khi đổi quà</label>
    <input value="${esc(p.url||'')}" oninput="setPath(STATE,'rewards.${i}.payload.url',this.value);refreshStorePreview(${i})"/>
    <label>Label nút</label>
    <input value="${esc(p.label||'')}" oninput="setPath(STATE,'rewards.${i}.payload.label',this.value);refreshStorePreview(${i})"/>`;
  if (kind === 'ea') return `
    <label>Link file (vd: EA bot / sản phẩm tải về)</label>
    <input value="${esc(p.ea||'')}" oninput="setPath(STATE,'rewards.${i}.payload.ea',this.value);refreshStorePreview(${i})"/>
    <label>Link hướng dẫn setup</label>
    <input value="${esc(p.setup||'')}" oninput="setPath(STATE,'rewards.${i}.payload.setup',this.value);refreshStorePreview(${i})"/>
    <label>Label nút</label>
    <input value="${esc(p.label||'')}" oninput="setPath(STATE,'rewards.${i}.payload.label',this.value);refreshStorePreview(${i})"/>`;
  return `
    <label>Mã code nhận được</label>
    <input value="${esc(p.code||'')}" oninput="setPath(STATE,'rewards.${i}.payload.code',this.value);refreshStorePreview(${i})"/>`;
}

function refreshStorePreview(i){
  const r = STATE.rewards[i];
  const el = $('prev-store-'+i);
  if (el.dataset.face === 'back') el.innerHTML = storeBackHtml(r);
  else el.innerHTML = storeCardHtml(r);
}
function toggleStoreFace(i){
  const el = $('prev-store-'+i);
  el.dataset.face = el.dataset.face === 'back' ? 'front' : 'back';
  refreshStorePreview(i);
}
function renderStore(){
  const cards = (STATE.rewards||[]).map((r,i)=>{
    const p = r.payload || (r.payload = { kind: 'code', code: '' });
    return `
    <details class="item">
      <summary>${esc(r.name||'(Chưa đặt tên)')} — ${r.cost||0} xu</summary>
      <div class="edit-row">
        <div>
          <label>Tên quà</label>
          <input value="${esc(r.name)}" oninput="setPath(STATE,'rewards.${i}.name',this.value);refreshStorePreview(${i})"/>
          <div class="row2">
            <div><label>Giá (xu)</label><input type="number" value="${r.cost||0}" oninput="setPath(STATE,'rewards.${i}.cost',Number(this.value)||0);refreshStorePreview(${i})"/></div>
            <div><label>Tồn kho (để trống = không giới hạn)</label><input type="number" value="${r.stock??''}" oninput="setPath(STATE,'rewards.${i}.stock',this.value===''?null:Number(this.value));refreshStorePreview(${i})"/></div>
          </div>
          <label>Mô tả</label>
          <textarea oninput="setPath(STATE,'rewards.${i}.desc',this.value);refreshStorePreview(${i})">${esc(r.desc)}</textarea>
          <label>Ảnh quà (dán link ảnh)</label>
          <img class="thumb" id="thumb-${i}" src="${esc(r.image||'')}" alt="" style="${r.image?'':'display:none'}"/>
          <input value="${esc(r.image||'')}" placeholder="https://..." oninput="setPath(STATE,'rewards.${i}.image',this.value);const t=$('thumb-${i}');t.src=this.value;t.style.display=this.value?'':'none';refreshStorePreview(${i})"/>
          <div class="hint-small">Tự host ảnh ở nơi khác (Imgur, Cloudinary free, link sản phẩm có sẵn...) rồi dán URL vào đây.</div>
          <div class="row2">
            <div><label>Badge</label>
              <select onchange="setPath(STATE,'rewards.${i}.badge',this.value);refreshStorePreview(${i})">
                ${['','hot','new','vip','bestseller','limited'].map(b=>`<option value="${b}" ${r.badge===b?'selected':''}>${b||'(không có)'}</option>`).join('')}
              </select>
            </div>
            <div><label>Giá gốc hiển thị (vd $97)</label><input value="${esc(r.originalPrice||'')}" oninput="setPath(STATE,'rewards.${i}.originalPrice',this.value);refreshStorePreview(${i})"/></div>
          </div>
          <label>Loại quà sau khi đổi</label>
          <select onchange="setPath(STATE,'rewards.${i}.payload.kind',this.value);renderAll()">
            <option value="code" ${p.kind==='code'?'selected':''}>Mã code</option>
            <option value="link" ${p.kind==='link'?'selected':''}>Link (file/trang đích)</option>
            <option value="ea" ${p.kind==='ea'?'selected':''}>File + hướng dẫn setup riêng</option>
          </select>
          ${payloadFields(p, i)}
          <button class="btn del" onclick="STATE.rewards.splice(${i},1);renderAll()">🗑 Xoá quà này</button>
        </div>
        <div class="prev-col">
          <div class="prev-label">Preview</div>
          <div id="prev-store-${i}">${storeCardHtml(r)}</div>
          <button class="btn pv-toggle" onclick="toggleStoreFace(${i})">🔄 Xem mặt sau</button>
        </div>
      </div>
    </details>`;
  }).join('');
  return `
    <div class="sect" id="store">🎁 Cửa Hàng Đổi Quà</div>
    <div class="panel">
      ${cards || '<p class="hint-small">Chưa có quà nào trong cửa hàng.</p>'}
      <button class="btn" onclick="STATE.rewards.push({id:'reward_'+Date.now().toString(36),name:'',cost:100,desc:'',image:'',badge:'',originalPrice:'',stock:null,tier:1,payload:{kind:'code',code:''}});renderAll()">+ Thêm quà mới</button>
    </div>`;
}

// ===== #codes =====
function renderCodes(){
  const rows = (STATE.redeemCodesList||[]).map((c,i)=>`
    <div class="row2">
      <div><label>Code</label><input value="${esc(c.code)}" oninput="setPath(STATE,'redeemCodesList.${i}.code',this.value)"/></div>
      <div><label>Xu nhận được</label><input type="number" value="${c.xu}" oninput="setPath(STATE,'redeemCodesList.${i}.xu',Number(this.value)||0)"/></div>
    </div>
    <div class="row2">
      <div><label>Bắt đầu (để trống = dùng được ngay)</label><input type="date" value="${esc(c.startDate||'')}" oninput="setPath(STATE,'redeemCodesList.${i}.startDate',this.value)"/></div>
      <div><label>Kết thúc (để trống = không hết hạn)</label><input type="date" value="${esc(c.endDate||'')}" oninput="setPath(STATE,'redeemCodesList.${i}.endDate',this.value)"/></div>
    </div>
    <div class="hint-small">Đặt ngày để code này hiện trên 🗓 Lịch sự kiện như 1 khuyến mãi giới hạn thời gian.</div>
    <button class="btn del" onclick="STATE.redeemCodesList.splice(${i},1);renderAll()">🗑 Xoá code</button>
  `).join('<hr style="border:none;border-top:1px solid rgba(255,255,255,.08);margin:10px 0">');
  return `
    <div class="sect" id="codes">🔑 Code Đặc Biệt</div>
    <div class="panel">
      ${rows || '<p class="hint-small">Chưa có code nào.</p>'}
      <button class="btn" onclick="STATE.redeemCodesList.push({code:'',xu:0});renderAll()">+ Thêm code</button>
    </div>`;
}

// ===== Lưu tất cả =====
async function saveAll(){
  const btn = $('save-all');
  btn.disabled = true; const old = btn.textContent; btn.textContent = 'Đang lưu...';

  const redeemCodes = {};
  (STATE.redeemCodesList||[]).forEach(c=>{
    const code = (c.code||'').trim().toLowerCase();
    if (!code) return;
    const entry = { xu: Number(c.xu)||0 };
    if (c.startDate) entry.startDate = c.startDate;
    if (c.endDate) entry.endDate = c.endDate;
    redeemCodes[code] = entry;
  });

  const payload = {
    seasonTopRewards: STATE.seasonTopRewards,
    checkinRewards: STATE.checkinRewards,
    dailyQuests: STATE.dailyQuests,
    rewards: STATE.rewards,
    redeemCodes,
  };
  if (typedApiKey.trim()) payload.whopApiKey = typedApiKey.trim();
  if ((STATE.whopCompanyId||'').trim()) payload.whopCompanyId = STATE.whopCompanyId.trim();

  try{
    const r = await tenantFetch('/.netlify/functions/admin-config', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    btn.textContent = '✅ Đã lưu!';
    setTimeout(load, 700);
  }catch(e){
    alert('⚠ Lưu lỗi: '+e.message);
    btn.disabled = false; btn.textContent = old;
  }
}

setTimeout(load, 300);
</script>
</body>
