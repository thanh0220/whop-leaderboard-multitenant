<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:30px 18px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:.06em;margin-bottom:6px}
  p.hint{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px}
  .panel{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px}
  label{display:block;font-size:12px;letter-spacing:.05em;color:var(--gold);margin:14px 0 6px;text-transform:uppercase;font-family:'Oswald',sans-serif}
  label:first-of-type{margin-top:0}
  input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.12);
    background:#070b16;color:var(--text);font:500 14px 'Be Vietnam Pro',sans-serif;outline:none}
  input:focus{border-color:var(--cyan)}
  .hint-small{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
  button{margin-top:18px;width:100%;padding:12px;border-radius:10px;border:1px solid var(--line2);
    background:rgba(39,227,255,.12);color:var(--cyan);font:700 13px 'Oswald',sans-serif;letter-spacing:.08em;
    text-transform:uppercase;cursor:pointer}
  button:hover:not(:disabled){background:rgba(39,227,255,.22)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:12px;font-size:13px;min-height:1.2em}
  .msg.ok{color:#7ee787}
  .msg.err{color:#ff8896}
  .state{text-align:center;padding:40px 0;color:var(--muted)}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:999px;margin-bottom:14px}
  .status.on{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.4)}
  .status.off{background:rgba(255,45,75,.12);color:#ffb0bd;border:1px solid rgba(255,45,75,.4)}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ Settings — Kết nối Whop</h1>
  <p class="hint">Dán Company API key + Company ID của bạn để app lấy đúng dữ liệu thành viên/thanh toán thật của community này. Chỉ admin nên mở trang này — đừng chia sẻ link này cho member.</p>
  <div id="content"><div class="state">Đang tải...</div></div>
</div>
<script>
const $=id=>document.getElementById(id);
function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }

async function load(){
  try{
    const r = await tenantFetch('/.netlify/functions/admin-config');
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    render(j);
  }catch(e){
    $('content').innerHTML = `<div class="panel"><div class="msg err">⚠ ${e.message}</div></div>`;
  }
}

function render(j){
  const statusHtml = j.configured
    ? `<span class="status on">✅ Đã kết nối — Company ID: ${j.whopCompanyId}</span>`
    : `<span class="status off">⚠ Chưa kết nối</span>`;
  $('content').innerHTML = `
    <div class="panel">
      ${statusHtml}
      ${j.configured ? `<label>Mật khẩu Settings hiện tại</label><input id="cur-secret" type="password" placeholder="Nhập mật khẩu đã đặt lần trước"/>` : ''}
      <label>Company API key</label>
      <input id="api-key" type="password" placeholder="apik_..." autocomplete="off"/>
      <div class="hint-small">Lấy tại Whop của bạn: Settings → Developer → API keys.</div>
      <label>Company ID</label>
      <input id="company-id" type="text" placeholder="biz_..." autocomplete="off"/>
      <div class="hint-small">Xem trong URL khi mở Dashboard business của bạn: whop.com/dashboard/<b>biz_xxx</b>/</div>
      <label>${j.configured ? 'Đổi mật khẩu Settings (để trống = giữ nguyên)' : 'Đặt mật khẩu Settings (để lần sau chỉ bạn sửa được)'}</label>
      <input id="new-secret" type="password" placeholder="Tự đặt 1 mật khẩu bất kỳ"/>
      <button id="save-btn">💾 Lưu cấu hình</button>
      <div class="msg" id="msg"></div>
    </div>`;

  $('save-btn').onclick = async () => {
    const btn = $('save-btn');
    const msg = $('msg');
    btn.disabled = true; const old = btn.textContent; btn.textContent = 'Đang lưu...';
    msg.textContent=''; msg.className='msg';
    try{
      const body = {
        whopApiKey: $('api-key').value.trim(),
        whopCompanyId: $('company-id').value.trim(),
      };
      if (j.configured) body.setupSecret = ($('cur-secret')?.value || '').trim();
      const newSecret = $('new-secret').value.trim();
      if (newSecret) body.newSetupSecret = newSecret;

      const r = await tenantFetch('/.netlify/functions/admin-config', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const jj = await r.json();
      if(!r.ok) throw new Error(jj.error||('HTTP '+r.status));
      msg.textContent = '✅ Đã lưu thành công!'; msg.className='msg ok';
      setTimeout(load, 600);
    }catch(e){
      msg.textContent = '⚠ '+e.message; msg.className='msg err';
    }finally{
      btn.disabled=false; btn.textContent=old;
    }
  };
}

load();
</script>
</body>
</html>
