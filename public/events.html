<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Events — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:960px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .counter{font-size:13px;color:var(--muted);margin-bottom:14px}
  .counter b{color:var(--cyan)}

  .panel{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px}
  .head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
  .head-cell{text-align:center;font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .head-cell.today{color:var(--cyan)}
  .head-cell .dd{font-size:13px;color:var(--text);font-weight:700;margin-top:2px}
  .head-cell.today .dd{color:var(--cyan)}

  .track{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;min-height:38px}
  .evt{border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;
    background:rgba(39,227,255,.16);border:1px solid rgba(39,227,255,.5);color:var(--cyan);cursor:pointer}
  .evt span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .evt small{font-weight:400;opacity:.8;font-size:10.5px}
  .event-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .event-modal{background:#0e1622;border:1px solid var(--line2);border-radius:16px;padding:20px;max-width:420px;width:100%;position:relative;text-align:center}
  .event-modal .x{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--muted);font-size:18px}
  .event-modal .x:hover{color:var(--text)}
  .event-modal .ev-modal-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:var(--cyan);margin:6px 0 8px}
  .event-modal .ev-modal-date{font-size:13px;color:var(--muted)}
  .event-modal .ev-modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin-bottom:6px}
  .event-modal .ev-modal-desc{font-size:13px;color:var(--text);line-height:1.5;margin-top:12px;text-align:left;white-space:pre-wrap}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:14px 0}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}
  .powered-badge{position:fixed;bottom:10px;right:12px;z-index:60;font-size:11px;color:var(--muted);
    background:rgba(10,14,24,.7);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:4px 9px;
    display:none;pointer-events:none}
</style>
</head>
<body>
<div class="powered-badge" id="powered-badge">⚡ Powered by GTVăn</div>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Leaderboard</a>
    <a href="/daily.html">📅 Daily</a>
    <a href="/store.html">🎁 Store</a>
    <a href="/events.html" class="on">🗓 Events</a>
    <a href="/mailbox.html">📬 Mailbox</a>
    <a href="/milestones.html">🎯 Milestones</a>
    <a href="/spin.html">🎰 Lucky Spin</a>
    <a href="/auction.html">🔨 Auction</a>
  </div>
  <div class="top"><span class="s">♦</span> <b>Events</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,
      '/spin.html': j.spinEnabled, '/auction.html': j.auctionEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) a.remove();
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/events');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    $('powered-badge').style.display=(j.isPaid&&j.branding?.logoUrl)?'none':'block';
    render(j);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

// Tuần hiện tại (Chủ Nhật -> Thứ Bảy, theo ngày UTC để khớp utcDayKey() backend)
function weekDates(todayKey){
  const today = new Date(todayKey + 'T00:00:00Z');
  const dow = today.getUTCDay(); // 0=CN
  const start = new Date(today); start.setUTCDate(today.getUTCDate() - dow);
  const days = [];
  for(let i=0;i<7;i++){ const d=new Date(start); d.setUTCDate(start.getUTCDate()+i); days.push(d.toISOString().slice(0,10)); }
  return days;
}
function dayCol(dateKey, week){ return week.indexOf(dateKey); } // -1 nếu ngoài tuần

// Cột hiển thị trong tuần đang xem, CLIP nếu event nhiều ngày bắt đầu/kết thúc
// lệch ra ngoài tuần — so sánh thẳng chuỗi "YYYY-MM-DD" (đúng thứ tự ISO).
function weekOverlapCols(item, week){
  const start = item.date, end = item.endDate || item.date;
  if(!start) return null;
  const weekStart = week[0], weekEnd = week[6];
  if(end < weekStart || start > weekEnd) return null;
  const clipStart = start < weekStart ? weekStart : start;
  const clipEnd = end > weekEnd ? weekEnd : end;
  return { startCol: week.indexOf(clipStart), endCol: week.indexOf(clipEnd) };
}

let CURRENT_EVENTS = [];

function evtRow(item, week, idx){
  const overlap = weekOverlapCols(item, week);
  if(!overlap) return ''; // ngoài tuần đang xem
  const { startCol, endCol } = overlap;
  return `<div class="track"><div class="evt" style="grid-column:${startCol+1} / ${endCol+2}" onclick="openEventModal(${idx})"><span class="nm">${esc(item.name)}</span></div></div>`;
}

function fmtEventDate(dateKey){
  const [y,m,d] = dateKey.split('-');
  return `${d}/${m}/${y}`;
}
function fmtEventDateRange(item){
  const end = item.endDate || item.date;
  return end === item.date ? fmtEventDate(item.date) : `${fmtEventDate(item.date)} - ${fmtEventDate(end)}`;
}
function openEventModal(idx){
  const item = CURRENT_EVENTS[idx];
  const wrap = document.createElement('div');
  wrap.className = 'event-modal-overlay';
  wrap.id = 'event-modal-overlay';
  const imgHtml = item.image ? `<img class="ev-modal-img" src="${esc(item.image)}"/>` : '';
  const descHtml = item.desc ? `<div class="ev-modal-desc">${esc(item.desc)}</div>` : '';
  wrap.innerHTML = `
    <div class="event-modal">
      <span class="x" onclick="closeEventModal()">✕</span>
      ${imgHtml}
      <div class="ev-modal-name">${esc(item.name)}</div>
      <div class="ev-modal-date">📅 ${fmtEventDateRange(item)}</div>
      ${descHtml}
    </div>`;
  wrap.addEventListener('click', (ev) => { if (ev.target === wrap) closeEventModal(); });
  document.body.appendChild(wrap);
}
function closeEventModal(){
  const el = $('event-modal-overlay');
  if (el) el.remove();
}

function render(d){
  const events = (d.events || []).filter(e=>e.date);
  CURRENT_EVENTS = events;
  const today = new Date().toISOString().slice(0,10);
  const week = weekDates(today);
  const dowLabel=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const headCells = week.map((dk,i)=>{
    const isToday = dk===today;
    const [,m,dd] = dk.split('-');
    return `<div class="head-cell ${isToday?'today':''}">${dowLabel[i]}<div class="dd">${dd}/${m}</div></div>`;
  }).join('');

  const rows = events.map((e,idx)=>evtRow(e, week, idx)).filter(Boolean).join('');

  const html = `
    <div class="counter">📅 <b>${events.length}</b> upcoming events</div>
    <div class="panel">
      <div class="head-row">${headCells}</div>
      ${rows || '<div class="empty">No events scheduled this week.</div>'}
    </div>`;
  $('content').innerHTML = html;
}

load();
</script>
</body>
</html>
