<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lịch Sự Kiện — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070910;--red:#ff2d4b;--cyan:#27e3ff;--gold:#f4c441;--muted:#8a93a6;--text:#eef2f8;--line2:rgba(39,227,255,.3)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(120% 70% at 50% -10%,rgba(255,45,75,.13),var(--bg) 55%),var(--bg);background-attachment:fixed}
  .wrap{max-width:960px;margin:0 auto;padding:22px 18px}
  .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav a{font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:11px;
    padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);color:var(--muted);text-decoration:none;transition:.15s}
  .nav a.on{border-color:var(--line2);background:rgba(39,227,255,.1);color:var(--cyan);box-shadow:0 0 14px rgba(39,227,255,.25)}
  .top{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;font-size:16px;margin-bottom:14px}
  .top .s{color:var(--red);font-size:18px;text-shadow:0 0 12px rgba(255,45,75,.7)}
  .top b{color:var(--red)}

  .counter{font-size:13px;color:var(--muted);margin-bottom:14px}
  .counter b{color:var(--cyan)}

  .panel{background:linear-gradient(160deg,#16202f,#0a0f18);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px}
  .head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
  .head-cell{text-align:center;font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase}
  .head-cell.today{color:var(--cyan)}
  .head-cell .dd{font-size:13px;color:var(--text);font-weight:700;margin-top:2px}
  .head-cell.today .dd{color:var(--cyan)}

  .track{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;min-height:38px}
  .evt{border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;
    background:rgba(39,227,255,.16);border:1px solid rgba(39,227,255,.5);color:var(--cyan)}
  .evt-thumb{width:20px;height:20px;border-radius:5px;object-fit:cover;flex-shrink:0}
  .evt small{font-weight:400;opacity:.8;font-size:10.5px}

  .below{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .ev-card{display:flex;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
  .ev-card img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
  .ev-card .nm{font-weight:600;font-size:14px;color:#fff}
  .ev-card .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .ev-card .ds{font-size:12.5px;color:var(--muted);margin-top:4px}
  .ev-card a.lk{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan);text-decoration:none;display:inline-block;margin-top:6px}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:14px 0}

  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(39,227,255,.2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.12);border:1px solid rgba(255,45,75,.4);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a href="/">🏆 Bảng xếp hạng</a>
    <a href="/daily.html">📅 Hằng ngày</a>
    <a href="/store.html">🎁 Cửa hàng</a>
    <a href="/events.html" class="on">🗓 Lịch sự kiện</a>
    <a href="/mailbox.html">📬 Hộp thư</a>
  </div>
  <div class="top"><span class="s">♦</span> Lịch <b>Sự Kiện</b></div>
  <div id="content"><div class="state"><div class="spinner"></div>Đang tải...</div></div>
</div>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function tenantQS(){
  const u = new URL(location.href);
  const exp = u.searchParams.get('experienceId') || '';
  const co  = u.searchParams.get('companyId') || '';
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }

async function load(){
  $('content').innerHTML=`<div class="state"><div class="spinner"></div>Đang tải...</div>`;
  try{
    const r=await tenantFetch('/.netlify/functions/events');
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    render(j);
  }catch(e){
    $('content').innerHTML=`<div class="err"><b>⚠ Không tải được dữ liệu:</b> ${e.message}<br><br>Hãy mở trang này bên trong Whop.</div>`;
  }
}

// Tuần hiện tại (Chủ Nhật -> Thứ Bảy, theo ngày UTC để khớp utcDayKey() backend)
function weekDates(todayKey){
  const today = new Date(todayKey + 'T00:00:00Z');
  const dow = today.getUTCDay(); // 0=CN
  const start = new Date(today); start.setUTCDate(today.getUTCDate() - dow);
  const days = [];
  for(let i=0;i<7;i++){ const d=new Date(start); d.setUTCDate(start.getUTCDate()+i); days.push(d.toISOString().slice(0,10)); }
  return days;
}
function dayCol(dateKey, week){ return week.indexOf(dateKey); } // -1 nếu ngoài tuần
function addDays(dateKey, n){ const d=new Date(dateKey+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function dayDelta(a,b){ return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000); }

// Lặp lại: quét vài chu kỳ quanh tuần đang xem, trả về [start,end] của các
// lần lặp có chạm vào tuần hiển thị (không lặp = đúng 1 lần).
function occurrencesInWeek(item, week){
  if(!item.startDate || !item.endDate) return [];
  const start = item.startDate, end = item.endDate;
  if(!item.repeatDays) return [[start,end]];
  const winLen = dayDelta(start, end);
  const results = [];
  let k = Math.floor(dayDelta(start, week[0]) / item.repeatDays) - 1;
  for(let n=0; n<4; n++, k++){
    const occStart = addDays(start, k*item.repeatDays);
    const occEnd = addDays(occStart, winLen);
    if(occEnd >= week[0] && occStart <= week[6]) results.push([occStart, occEnd]);
  }
  return results;
}

function evtRows(item, week, cls, label){
  const thumb = item.image ? `<img class="evt-thumb" src="${esc(item.image)}"/>` : '';
  return occurrencesInWeek(item, week).map(([occStart,occEnd])=>{
    let startCol = dayCol(occStart, week);
    let endCol = dayCol(occEnd, week);
    // clip vào tuần hiện tại: nếu mốc nằm ngoài tuần ở 1 phía, kéo về biên tuần
    if(startCol===-1) startCol = occStart < week[0] ? 0 : 7;
    if(endCol===-1) endCol = occEnd > week[6] ? 6 : -1;
    if(startCol>6 || endCol<0 || startCol>endCol) return ''; // hoàn toàn ngoài tuần này
    return `<div class="track"><div class="evt ${cls}" style="grid-column:${startCol+1} / ${endCol+2}">${thumb}${label}</div></div>`;
  }).filter(Boolean).join('');
}

function render(d){
  const events = d.events || [];
  const today = new Date().toISOString().slice(0,10);
  const week = weekDates(today);
  const dowLabel=['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];

  const headCells = week.map((dk,i)=>{
    const isToday = dk===today;
    const [,m,dd] = dk.split('-');
    return `<div class="head-cell ${isToday?'today':''}">${dowLabel[i]}<div class="dd">${dd}/${m}</div></div>`;
  }).join('');

  const rows = events.map(e=>evtRows(e, week, 'evt', `${e.time?`🕒 ${esc(e.time)} `:''}${esc(e.name)}`)).join('');

  const cards = events.map(e=>`
    <div class="ev-card">
      ${e.image?`<img src="${esc(e.image)}"/>`:''}
      <div>
        <div class="nm">${esc(e.name)}</div>
        <div class="meta">${e.time?`🕒 ${esc(e.time)} · `:''}${esc(e.startDate)}${e.endDate!==e.startDate?' → '+esc(e.endDate):''}${e.repeatDays?` · lặp mỗi ${e.repeatDays} ngày`:''}</div>
        ${e.desc?`<div class="ds">${esc(e.desc)}</div>`:''}
        ${e.link?`<a class="lk" href="${esc(e.link)}" target="_blank" rel="noopener">🔗 Mở link</a>`:''}
      </div>
    </div>`).join('');

  const html = `
    <div class="counter">📅 <b>${events.length}</b> sự kiện sắp tới</div>
    <div class="panel">
      <div class="head-row">${headCells}</div>
      ${rows || '<div class="empty">Không có sự kiện nào trong tuần này.</div>'}
      <div class="below">${cards || ''}</div>
    </div>`;
  $('content').innerHTML = html;
}

load();
</script>
</body>
</html>
