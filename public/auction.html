<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auction — Whop Community App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--violet:#a855f7;--gold:#ffd966;--gold2:#f4c441;--green:#22c55e;--red:#ff2d4b;--muted:#a9a4c2;--text:#f3f0ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Be Vietnam Pro',sans-serif;color:var(--text);min-height:100vh;padding:0 0 60px;
    background:radial-gradient(60% 50% at 50% 0%,rgba(168,85,247,.18),transparent 60%),#05050a;background-attachment:fixed}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .nav a{position:relative;font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;font-size:10.5px;
    padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.04);color:var(--muted);text-decoration:none;transition:.15s}
  .nav-badge{position:absolute;top:-5px;right:-5px;background:#e53935;color:#fff;border-radius:999px;font-size:9px;font-family:'Oswald',sans-serif;font-weight:700;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none;line-height:1}
  .nav a.on{border-color:var(--violet);background:rgba(168,85,247,.18);color:#e9d5ff;box-shadow:0 0 14px rgba(168,85,247,.4)}

  .stage{position:relative;border-radius:20px;overflow:hidden;background:#0a0712;border:1px solid rgba(168,85,247,.3);
    padding:30px 20px 24px;text-align:center;margin-bottom:16px}
  .stage::before{content:'';position:absolute;top:-30%;left:50%;width:140%;height:140%;transform:translateX(-50%);
    background:radial-gradient(circle,rgba(255,255,255,.16),transparent 60%);pointer-events:none}
  .item-spot{position:relative;width:140px;height:140px;margin:0 auto 14px;border-radius:16px;
    background:radial-gradient(circle,rgba(255,217,102,.18),transparent 70%);display:flex;align-items:center;justify-content:center;
    z-index:1}
  .item-spot img{width:120px;height:120px;object-fit:cover;border-radius:14px;box-shadow:0 0 30px rgba(255,217,102,.45)}
  .item-spot .ic{font-size:64px;filter:drop-shadow(0 0 18px rgba(255,217,102,.6))}
  .item-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:.03em;position:relative;z-index:1}
  .item-desc{font-size:12px;color:var(--muted);margin-top:4px;position:relative;z-index:1}
  .countdown{font-family:'Oswald',sans-serif;font-size:13px;color:#e9d5ff;margin-top:10px;letter-spacing:.05em;position:relative;z-index:1}
  .countdown b{color:var(--gold)}
  .bid-now{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:18px;position:relative;z-index:1}
  .bid-amt{font-family:'Oswald',sans-serif;font-weight:700;font-size:46px;color:var(--gold);line-height:1;margin-top:2px;
    text-shadow:0 0 18px rgba(255,217,102,.7),0 0 40px rgba(255,217,102,.4);position:relative;z-index:1}
  .bid-by{font-size:12.5px;color:var(--muted);margin-top:4px;position:relative;z-index:1}
  .badge-row{margin-top:10px;position:relative;z-index:1}
  .badge{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    padding:5px 12px;border-radius:999px}
  .badge.mine{background:rgba(34,197,94,.18);color:#86efac;border:1px solid rgba(34,197,94,.4)}
  .badge.win{background:rgba(255,217,102,.18);color:var(--gold);border:1px solid rgba(255,217,102,.5)}
  .au-live{display:inline-flex;align-items:center;gap:6px;font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#c026d3,#a855f7);
    padding:5px 12px;border-radius:999px;margin-bottom:14px;box-shadow:0 3px 10px rgba(168,85,247,.4);position:relative;z-index:1}
  .au-live .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:auPulse 1.2s ease-in-out infinite}
  @keyframes auPulse{0%,100%{opacity:1}50%{opacity:.3}}

  .bid-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .quick-btn{flex:1;min-width:70px;font-family:'Oswald',sans-serif;letter-spacing:.04em;font-size:12.5px;font-weight:700;
    padding:11px 6px;border-radius:10px;border:1px solid rgba(168,85,247,.4);background:rgba(168,85,247,.12);color:#e9d5ff;
    cursor:pointer;transition:.15s}
  .quick-btn:hover{background:rgba(168,85,247,.25)}
  .custom-row{display:flex;gap:8px;margin-bottom:12px}
  .custom-row input{flex:1;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#100a1c;color:var(--text);
    font:600 14px 'Be Vietnam Pro',sans-serif}
  .place-btn{width:100%;font-family:'Oswald',sans-serif;letter-spacing:.06em;text-transform:uppercase;font-size:15px;font-weight:700;
    padding:15px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#c026d3,var(--violet));color:#fff;
    box-shadow:0 4px 0 #6b21a8,0 8px 18px rgba(0,0,0,.4);transition:.15s}
  .place-btn:disabled{opacity:.5;cursor:not-allowed}
  .place-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 #6b21a8}

  .history{margin-top:18px}
  .history-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .bid-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:10px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;font-size:13px;
    animation:slideIn .35s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .bid-row .nm{color:#e9d5ff;font-weight:600}
  .bid-row .amt{font-family:'Oswald',sans-serif;color:var(--gold);font-weight:700}

  .empty{text-align:center;font-size:13px;padding:50px 20px;background:rgba(255,255,255,.03);border-radius:16px;color:var(--muted)}
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:2px solid rgba(168,85,247,.25);border-top-color:var(--violet);border-radius:50%;margin:0 auto 14px;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{background:rgba(255,45,75,.1);border:1px solid rgba(255,45,75,.35);border-radius:14px;padding:20px;color:#ffd0d8;font-size:14px;line-height:1.6;text-align:left}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;
    background:#150e26;border:1px solid var(--violet);border-radius:12px;padding:14px 22px;color:#e9d5ff;
    font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.05em;box-shadow:0 0 30px rgba(168,85,247,.4);transition:.3s;z-index:80}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

  /* Light mode: giữ tinh thần "sân khấu đấu giá" nhưng đổi nền đen-tím sang
     trắng-tím nhạt + thêm viền gradient vàng-tím quanh stage để sản phẩm
     đấu giá nổi bật, không bị "chìm" trên nền trắng — trang này có theme
     riêng, không dùng hệ biến chung. */
  @media (prefers-color-scheme: light){
    body{color:#2a1840;
      background:radial-gradient(60% 50% at 50% 0%,rgba(168,85,247,.14),transparent 60%),#f8f6fc;
      background-attachment:fixed}
    .nav a{border-color:rgba(168,85,247,.2);background:rgba(255,255,255,.6);color:#5a2a8c}
    .nav a.on{border-color:#a855f7;background:rgba(255,255,255,.85);color:#3a1b5c;box-shadow:0 0 12px rgba(168,85,247,.3)}
    .stage{border:2px solid transparent;
      background:linear-gradient(#fff,#fff) padding-box,linear-gradient(135deg,#ffd966,#a855f7) border-box;
      box-shadow:0 14px 40px rgba(168,85,247,.18),0 4px 14px rgba(201,134,10,.12)}
    .stage::before{background:radial-gradient(circle,rgba(255,217,102,.3),transparent 60%)}
    .item-spot{background:radial-gradient(circle,rgba(255,217,102,.4),transparent 72%)}
    .item-spot .ic{filter:drop-shadow(0 0 18px rgba(201,134,10,.5))}
    .item-name{color:#2a1840}
    .item-desc{color:#8a6ab0}
    .countdown{color:#5a2a8c}
    .countdown b{color:#c9860a}
    .bid-now{color:#8a6ab0}
    .bid-amt{background:linear-gradient(135deg,#c9860a,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none}
    .bid-by{color:#8a6ab0}
    .badge.mine{background:rgba(34,197,94,.12);color:#15803d;border-color:rgba(34,197,94,.4)}
    .badge.win{background:rgba(201,134,10,.14);color:#9a6500;border-color:rgba(201,134,10,.4)}
    .quick-btn{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08);color:#5a2a8c}
    .quick-btn:hover{background:rgba(168,85,247,.18)}
    .custom-row input{background:#fff;border-color:rgba(168,85,247,.2);color:#2a1840}
    .history-title{color:#8a6ab0}
    .bid-row{background:rgba(168,85,247,.05);border-color:rgba(168,85,247,.12)}
    .bid-row .nm{color:#3a1b5c}
    .bid-row .amt{color:#c9860a}
    .empty{background:rgba(255,255,255,.6);color:#8a6ab0}
    .state{color:#8a6ab0}
    .spinner{border-color:rgba(168,85,247,.2);border-top-color:#a855f7}
    .err{background:rgba(255,255,255,.7);border-color:rgba(255,45,75,.3);color:#9a2030}
    .toast{background:#fff;border-color:#a855f7;color:#5a2a8c;box-shadow:0 0 24px rgba(168,85,247,.25)}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav" data-shared></div>
  <script src="/_nav.js"></script>
  <div id="content"><div class="state"><div class="spinner"></div>Loading...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600);}
function fmtMoney(n){return Number(n||0).toLocaleString('en-US');}

function tenantQS(){
  const u = new URL(location.href);
  let exp = u.searchParams.get('experienceId') || '';
  let co  = u.searchParams.get('companyId') || '';
  if (!exp) { const m = location.pathname.match(/\/experiences\/([^/]+)/); if (m) exp = m[1]; }
  if (!co)  { const m = location.pathname.match(/\/dashboard\/([^/]+)/);  if (m) co  = m[1]; }
  const p = new URLSearchParams();
  if (exp) p.set('experienceId', exp);
  if (co)  p.set('companyId', co);
  const s = p.toString();
  return s ? '?' + s : '';
}
function tenantFetch(path, opts){ return fetch(path + tenantQS(), opts); }
(function propagateTenantQS(){
  const qs = tenantQS();
  if (!qs) return;
  document.querySelectorAll('a[href^="/"]').forEach(a=>{
    if (!a.getAttribute('href').includes('?')) a.href = a.getAttribute('href') + qs;
  });
})();
(async function applyNavVisibility(){
  try{
    const r = await tenantFetch('/.netlify/functions/nav-flags');
    const j = await r.json();
    if(!r.ok) return;
    const map = { '/events.html': j.eventsEnabled, '/milestones.html': j.milestonesEnabled,

      '/daily.html': j.dailyEnabled, '/store.html': j.storeEnabled, '/mailbox.html': j.mailboxEnabled };
    document.querySelectorAll('.nav a').forEach(a=>{
      const href = a.getAttribute('href').split('?')[0];
      if(href in map && !map[href]) { a.remove(); return; }
      const badge = href === '/daily.html' && j.dailyPending ? 1
                  : href === '/mailbox.html' && j.mailboxCount > 0 ? j.mailboxCount : 0;
      if (badge) { const b = document.createElement('span'); b.className = 'nav-badge'; b.textContent = badge > 99 ? '99+' : String(badge); a.appendChild(b); }
    });
    if(!j.codesEnabled){ const fab=document.querySelector('.code-fab'); if(fab) fab.remove(); }
  }catch(_){}
})();

let pollTimer = null;

function fmtCountdown(endsAt){
  const ms = endsAt - Date.now();
  if (ms <= 0) return 'Ending...';
  const d = Math.floor(ms/86400000), h = Math.floor((ms%86400000)/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  if (d > 0) return `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function load(silent){
  if (!silent) $('content').innerHTML = `<div class="state"><div class="spinner"></div>Loading...</div>`;
  try{
    const r = await tenantFetch('/.netlify/functions/auction');
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    render(j);
  }catch(e){
    $('content').innerHTML = `<div class="err"><b>⚠ Could not load data:</b> ${e.message}<br><br>Please open this page inside Whop.</div>`;
  }
}

function render(j){
  clearInterval(pollTimer);

  if (!j.enabled || !j.item){
    $('content').innerHTML = '<div class="empty">🔨 No auction is running right now. Check back soon!</div>';
    return;
  }

  const itemVisual = j.item.image
    ? `<img src="${esc(j.item.image)}" alt=""/>`
    : `<div class="ic">🏺</div>`;

  let badges = '';
  if (j.settled){
    badges = j.winnerName ? `<div class="badge-row"><span class="badge win">🏆 Winner: ${esc(j.winnerName)}</span></div>` : '';
  } else if (j.isMeHighest){
    badges = `<div class="badge-row"><span class="badge mine">👑 You're the highest bidder</span></div>`;
  }

  const history = j.bids.length
    ? j.bids.map(b => `<div class="bid-row"><span class="nm">${esc(b.name)}</span><span class="amt">${fmtMoney(b.amount)} XU</span></div>`).join('')
    : '<p class="empty" style="padding:20px">No bids yet — be the first!</p>';

  const quickAmounts = [j.nextMinBid, j.nextMinBid + j.minIncrement, j.nextMinBid + j.minIncrement*4];

  const controls = j.active ? `
    <div class="bid-controls">
      ${quickAmounts.map(a=>`<button class="quick-btn" onclick="placeBid(${a})">${fmtMoney(a)} XU</button>`).join('')}
    </div>
    <div class="custom-row">
      <input type="number" id="custom-amt" min="${j.nextMinBid}" placeholder="Custom amount (min ${fmtMoney(j.nextMinBid)})"/>
    </div>
    <button class="place-btn" id="place-btn" onclick="placeBidCustom()">🔨 PLACE BID</button>
  ` : `<div class="empty">${j.settled ? 'This auction has ended.' : 'Auction not started yet.'}</div>`;

  $('content').innerHTML = `
    <div class="stage">
      ${j.active ? `<div class="au-live"><span class="dot"></span> LIVE AUCTION</div>` : ''}
      <div class="item-spot">${itemVisual}</div>
      <div class="item-name">${esc(j.item.name)}</div>
      ${j.item.desc ? `<div class="item-desc">${esc(j.item.desc)}</div>` : ''}
      ${j.active ? `<div class="countdown">Ends in <b>${fmtCountdown(j.endsAt)}</b></div>` : ''}
      <div class="bid-now">${j.highestBid>0 ? 'Current highest bid' : 'Starting bid'}</div>
      <div class="bid-amt">${fmtMoney(j.highestBid>0 ? j.highestBid : j.startingBid)} XU</div>
      ${j.highestBidderName ? `<div class="bid-by">by ${esc(j.highestBidderName)}</div>` : ''}
      ${badges}
    </div>
    ${controls}
    <div class="history">
      <div class="history-title">📜 Bid history</div>
      ${history}
    </div>
  `;

  if (j.active){
    pollTimer = setInterval(() => load(true), 4000);
  }
}

async function placeBid(amount){
  const btn = $('place-btn');
  if (btn) btn.disabled = true;
  try{
    const r = await tenantFetch('/.netlify/functions/auction', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'bid', amount})});
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||'Error');
    toast(`🔨 Bid placed: ${fmtMoney(amount)} XU!`);
    render(j);
  }catch(e){
    toast('⚠ '+e.message);
    if (btn) btn.disabled = false;
  }
}
function placeBidCustom(){
  const v = Number($('custom-amt').value);
  if (!v) { toast('⚠ Enter a bid amount.'); return; }
  placeBid(v);
}

load();
</script>
</body>
</html>
